<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Philadelphia AI - Studio</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
    <style>
        /* --- REFINED DARK SPACE THEME --- */
        :root {
            --bg-deep: #030305;
            --bg-surface: rgba(10, 11, 18, 0.85);
            --bg-glass: rgba(20, 22, 35, 0.4);
            --accent-primary: #00e5ff;
            --accent-secondary: #bd00ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border-glow: rgba(0, 229, 255, 0.2);
            --border-dim: rgba(255, 255, 255, 0.08);
            --user-bubble: rgba(30, 41, 59, 0.7);
            --ai-bubble: transparent;
            --code-bg: #0d1117;
            --panel-bg: rgba(5, 6, 10, 0.98);
            
            /* Animation timings */
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-med: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- COSMIC BACKGROUND --- */
        #cosmos-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at top right, #0a0f1c, #030305 70%);
            overflow: hidden;
        }

        .nebula {
            position: absolute;
            inset: -50%;
            opacity: 0.2;
            background: 
                radial-gradient(circle at 30% 30%, var(--accent-secondary), transparent 40%),
                radial-gradient(circle at 70% 70%, var(--accent-primary), transparent 40%);
            filter: blur(80px);
            animation: nebulaFloat 40s infinite alternate ease-in-out;
        }

        @keyframes nebulaFloat {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(10deg) scale(1.1); }
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }

        /* --- UI CONTAINER --- */
        .ui-container {
            width: 96vw;
            height: 96vh;
            max-width: 1400px;
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-dim);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px var(--border-glow);
            position: relative;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-dim);
            background: rgba(10, 11, 18, 0.5);
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .brand-logo i { color: #fff; font-size: 18px; }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-dim);
            background: var(--bg-glass);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .btn-icon:hover {
            color: var(--accent-primary);
            border-color: var(--accent-primary);
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- CHAT AREA --- */
        #chat-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 32px 10%;
            display: flex;
            flex-direction: column;
            gap: 32px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-dim) transparent;
        }

        #chat-viewport::-webkit-scrollbar { width: 6px; }
        #chat-viewport::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 10px; }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: msgSlideUp 0.4s ease-out;
        }

        @keyframes msgSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.ai { align-self: flex-start; }

        .bubble {
            padding: 16px 24px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.6;
            position: relative;
        }

        .user .bubble {
            background: var(--user-bubble);
            border: 1px solid var(--border-dim);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .ai .bubble {
            background: var(--ai-bubble);
            padding: 0;
            color: var(--text-main);
        }

        /* --- WOW FEATURE 1: DYNAMIC THINKING COMPONENT --- */
        .thinking-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid var(--accent-primary);
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 0 12px 12px 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            display: none;
        }

        .thinking-card.active { display: block; animation: fadeIn 0.3s ease; }
        
        .thinking-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: var(--accent-primary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        /* --- WOW FEATURE 2: ADVANCED TYPEWRITER WITH SPEED CONTROL --- */
        .typewriter-text { display: inline; }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--accent-primary);
            margin-left: 2px;
            vertical-align: middle;
            animation: cursorBlink 0.8s infinite;
        }
        @keyframes cursorBlink { 50% { opacity: 0; } }

        /* --- WOW FEATURE 3: LIVE BROWSER FETCH NOTIFICATIONS --- */
        .fetch-toast {
            position: absolute;
            top: 80px;
            right: 32px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--accent-primary);
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent-primary);
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        .fetch-toast.show { transform: translateX(0); }

        /* --- INPUT AREA --- */
        .input-container {
            padding: 24px 32px;
            background: rgba(10, 11, 18, 0.8);
            border-top: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: var(--bg-glass);
            border: 1px solid var(--border-dim);
            border-radius: 20px;
            padding: 12px 16px;
            transition: var(--transition-fast);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            max-height: 200px;
            padding: 8px 0;
            outline: none;
        }

        .input-actions {
            display: flex;
            gap: 8px;
            padding-bottom: 4px;
        }

        .btn-send {
            width: 40px;
            height: 40px;
            background: var(--accent-primary);
            color: var(--bg-deep);
            border: none;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-primary);
        }

        /* --- WOW FEATURE 4: CODE BLOCK GLOW & COPY --- */
        pre {
            background: var(--code-bg) !important;
            border-radius: 12px;
            margin: 1.5em 0;
            position: relative;
            border: 1px solid var(--border-dim);
            overflow: hidden;
        }
        
        pre::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0.5;
        }

        code { font-family: 'JetBrains Mono', monospace !important; font-size: 0.9rem !important; }

        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-dim);
            color: var(--text-muted);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            opacity: 0;
            transition: 0.2s;
        }

        pre:hover .copy-btn { opacity: 1; }

        /* --- WOW FEATURE 5: SMART PROFILE DRAWER --- */
        .drawer {
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 320px;
            background: var(--panel-bg);
            border-left: 1px solid var(--border-dim);
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            padding: 40px 24px;
        }

        .drawer.open { transform: translateX(0); box-shadow: -20px 0 50px rgba(0,0,0,0.5); }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            margin: 0 auto 16px;
            position: relative;
        }

        .avatar-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--bg-deep);
            object-fit: cover;
        }

        /* --- UTILS --- */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #10b981;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>
    <div id="cosmos-container">
        <div class="nebula"></div>
    </div>

    <div class="ui-container">
        <!-- Fetch Toast -->
        <div id="fetch-toast" class="fetch-toast">
            <i class="fa-solid fa-satellite-dish fa-spin"></i>
            <span id="fetch-status">Fetching data from browser...</span>
        </div>

        <header>
            <div class="brand">
                <div class="brand-logo"><i class="fa-solid fa-bolt"></i></div>
                <div class="brand-name">PHILADELPHIA STUDIO</div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" title="Notifications" id="notif-toggle">
                    <i class="fa-solid fa-bell"></i>
                </button>
                <button class="btn-icon" title="Tools" id="tools-toggle">
                    <i class="fa-solid fa-layer-group"></i>
                </button>
                <button class="btn-icon" title="Profile" id="profile-toggle">
                    <i class="fa-solid fa-user-astronaut"></i>
                </button>
            </div>
        </header>

        <main id="chat-viewport">
            <!-- Welcome Message -->
            <div class="message ai">
                <div class="bubble">
                    <div class="thinking-card active">
                        <div class="thinking-header"><i class="fa-solid fa-brain"></i> System Initialization</div>
                        All systems operational. Neural interface connected. Welcome back, Commander.
                    </div>
                    <div class="typewriter-text" id="welcome-text"></div>
                </div>
            </div>
        </main>

        <footer class="input-container">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Type your command..." rows="1"></textarea>
                <div class="input-actions">
                    <button class="btn-icon" title="Upload"><i class="fa-solid fa-paperclip"></i></button>
                    <button class="btn-send" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted);">
                <span><span class="status-dot"></span> System: Ready</span>
                <span id="clock">00:00:00</span>
            </div>
        </footer>

        <!-- Profile Drawer -->
        <div class="drawer" id="profile-drawer">
            <div class="profile-header">
                <div class="avatar-ring">
                    <img src="https://i.ibb.co/YTkKPfvf/IMG-20250715-102103-129.jpg" alt="Profile">
                </div>
                <h2 style="font-family: 'Orbitron'; margin-bottom: 4px;">Commander</h2>
                <p style="color: var(--accent-primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Level 99 Architect</p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="btn-icon" style="width: 100%; justify-content: flex-start; gap: 12px; padding: 0 16px;">
                    <i class="fa-solid fa-gear"></i> Settings
                </button>
                <button class="btn-icon" style="width: 100%; justify-content: flex-start; gap: 12px; padding: 0 16px;">
                    <i class="fa-solid fa-clock-rotate-left"></i> History
                </button>
                <button class="btn-icon" style="width: 100%; justify-content: flex-start; gap: 12px; padding: 0 16px; color: #ef4444; border-color: rgba(239, 68, 68, 0.2);">
                    <i class="fa-solid fa-power-off"></i> Disconnect
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        // --- CORE INITIALIZATION ---
        const $ = id => document.getElementById(id);
        const chatViewport = $('chat-viewport');
        const userInput = $('user-input');
        const sendBtn = $('send-btn');
        const clock = $('clock');
        const profileToggle = $('profile-toggle');
        const profileDrawer = $('profile-drawer');
        const fetchToast = $('fetch-toast');
        const fetchStatus = $('fetch-status');
        const notifToggle = $('notif-toggle');

        let notificationsEnabled = false;

        // --- COSMIC BACKGROUND ENGINE ---
        function createStars() {
            const container = $('cosmos-container');
            const starCount = window.innerWidth < 768 ? 80 : 150;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                star.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(star);
            }
        }

        // --- ADVANCED TYPEWRITER ENGINE (WOW FEATURE 2) ---
        async function typeText(element, text, speed = 15) {
            // Clear but keep cursor
            element.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            element.appendChild(cursor);
            
            // Handle HTML or Code blocks if present in text
            // For simplicity, we'll treat text as plain text but check for markdown-like code blocks
            let isCode = false;
            let currentText = "";
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                currentText += char;
                
                // Update display
                const textNode = document.createTextNode(char);
                element.insertBefore(textNode, cursor);
                
                // Auto-scroll
                chatViewport.scrollTop = chatViewport.scrollHeight;
                
                // Dynamic speed: punctuation takes longer
                let currentSpeed = speed;
                if (['.', '!', '?'].includes(char)) currentSpeed = speed * 15;
                if ([','].includes(char)) currentSpeed = speed * 5;
                
                await new Promise(r => setTimeout(r, currentSpeed));
            }
            
            // Optional: Remove cursor after typing
            // cursor.remove();
        }

        // --- NOTIFICATION SYSTEM (WOW FEATURE 3) ---
        notifToggle.onclick = async () => {
            if (!("Notification" in window)) {
                alert("This browser does not support desktop notifications");
                return;
            }
            
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                notificationsEnabled = true;
                notifToggle.style.color = 'var(--accent-primary)';
                notifToggle.style.boxShadow = '0 0 10px var(--accent-glow)';
                new Notification("Philadelphia AI", { 
                    body: "Neural notifications established. You will be alerted when I respond.",
                    icon: "https://i.ibb.co/YTkKPfvf/IMG-20250715-102103-129.jpg"
                });
            }
        };

        function sendNotification(title, body) {
            if (notificationsEnabled && document.hidden) {
                new Notification(title, { body, icon: "https://i.ibb.co/YTkKPfvf/IMG-20250715-102103-129.jpg" });
            }
        }

        // --- BROWSER FETCH SIMULATOR (WOW FEATURE 3 - EXTENDED) ---
        async function simulateBrowserFetch(query) {
            fetchStatus.textContent = `Searching browser links for: "${query}"...`;
            fetchToast.classList.add('show');
            await new Promise(r => setTimeout(r, 2000));
            fetchStatus.textContent = `Retrieved 5 links. Analyzing content...`;
            await new Promise(r => setTimeout(r, 1500));
            fetchToast.classList.remove('show');
        }

        // --- UI UTILS ---
        function updateClock() {
            const now = new Date();
            clock.textContent = now.toLocaleTimeString('en-US', { hour12: false }) + ":" + String(now.getMilliseconds()).padStart(3, '0').substring(0,2);
        }
        setInterval(updateClock, 100);

        profileToggle.onclick = (e) => {
            e.stopPropagation();
            profileDrawer.classList.toggle('open');
        };

        document.addEventListener('click', (e) => {
            if (!profileDrawer.contains(e.target) && e.target !== profileToggle) {
                profileDrawer.classList.remove('open');
            }
        });

        userInput.oninput = () => {
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
        };

        // --- CHAT CORE LOGIC ---
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // User Message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `<div class="bubble">${text}</div>`;
            chatViewport.appendChild(userMsg);
            
            userInput.value = '';
            userInput.style.height = 'auto';
            chatViewport.scrollTop = chatViewport.scrollHeight;

            // AI Logic
            await processAIResponse(text);
        }

        async function processAIResponse(userText) {
            // 1. Create AI Message Container
            const aiMsg = document.createElement('div');
            aiMsg.className = 'message ai';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            // 2. Thinking Phase (WOW FEATURE 1)
            const thinking = document.createElement('div');
            thinking.className = 'thinking-card active';
            thinking.innerHTML = `<div class="thinking-header"><i class="fa-solid fa-brain"></i> Initializing Neural Response</div>Accessing memory banks...`;
            
            const content = document.createElement('div');
            content.className = 'typewriter-text';
            
            bubble.appendChild(thinking);
            bubble.appendChild(content);
            aiMsg.appendChild(bubble);
            chatViewport.appendChild(aiMsg);
            chatViewport.scrollTop = chatViewport.scrollHeight;

            // 3. Conditional Browser Fetching
            if (userText.toLowerCase().includes('search') || userText.toLowerCase().includes('who') || userText.toLowerCase().includes('what')) {
                await simulateBrowserFetch(userText);
                thinking.innerHTML = `<div class="thinking-header"><i class="fa-solid fa-brain"></i> Synthesis Complete</div>Browser data integrated. Formulating response.`;
            } else {
                await new Promise(r => setTimeout(r, 1200));
                thinking.innerHTML = `<div class="thinking-header"><i class="fa-solid fa-brain"></i> Thought Process</div>Processing logic patterns...`;
            }

            await new Promise(r => setTimeout(r, 800));

            // 4. Typewriter Response (WOW FEATURE 2)
            let response = "";
            if (userText.toLowerCase().includes('code')) {
                response = "Certainly. Here is a professional code snippet for your request. I've applied the requested highlights and professional excellence.";
                await typeText(content, response);
                
                // Add Code Block (WOW FEATURE 4)
                const codeContainer = document.createElement('div');
                codeContainer.style.marginTop = "16px";
                codeContainer.innerHTML = `
                    <pre><button class="copy-btn" onclick="copyCode(this)">Copy</button><code class="language-javascript">
// Professional Excellence Module
class PhiladelphiaStudio {
    constructor() {
        this.status = 'Badass Developer Mode';
        this.features = ['Dynamic Thinking', 'Ultra-Typewriter', 'Browser Sync'];
    }

    ignite() {
        console.log(\`System Online: \${this.status}\`);
        this.features.forEach(f => this.activate(f));
    }

    activate(feature) {
        // Advanced logic implementation
        return \`Feature \${feature} Glowing!\`;
    }
}

const studio = new PhiladelphiaStudio();
studio.ignite();</code></pre>`;
                bubble.appendChild(codeContainer);
                hljs.highlightElement(codeContainer.querySelector('code'));
            } else {
                response = "The system has been fully revamped. You now have access to dynamic thinking cards, browser-integrated fetching, neural notifications, and an allure-driven dark interface. Every animation has been tuned for professional excellence.";
                await typeText(content, response);
            }

            sendNotification("Philadelphia AI", "Response transmitted successfully.");
        }

        function copyCode(btn) {
            const code = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(code);
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            btn.style.color = "var(--accent-primary)";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.color = "";
            }, 2000);
        }

        // --- STARTUP ---
        window.onload = async () => {
            createStars();
            updateClock();
            
            // Initial Welcome
            const welcomeText = $('welcome-text');
            await typeText(welcomeText, "Philadelphia AI Studio online. Neural interface stable. All systems are glowing. How can I assist your vision today, Commander?");
        };

        sendBtn.onclick = handleSend;
        userInput.onkeydown = (e) => { 
            if (e.key === 'Enter' && !e.shiftKey) { 
                e.preventDefault(); 
                handleSend(); 
            } 
        };
    </script>
</body>
</html>
