<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philadelphia Studio - Clean Workspace</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f1115;
            --surface: #1e2128;
            --surface-hover: #2a2e37;
            --border: #2a2e37;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #d4af37; /* Gold */
            --accent-hover: #f1c40f;
            --top-nav-height: 60px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation */
        .top-nav {
            height: var(--top-nav-height);
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
        }

        .brand { font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; color: var(--accent); }

        .nav-actions button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.2s;
        }
        .nav-actions button:hover { background: var(--accent-hover); }
        .nav-actions .btn-secondary { background: var(--surface-hover); color: var(--text-main); }
        .nav-actions .btn-secondary:hover { background: var(--border); }

        /* Main Workspace Area */
        .workspace {
            display: flex;
            flex-grow: 1;
            height: calc(100vh - var(--top-nav-height));
        }

        /* Left Sidebar - Add Tools */
        .left-sidebar {
            width: 80px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 16px;
            flex-shrink: 0;
        }

        .tool-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            width: 100%;
            padding: 16px 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .tool-btn i { font-size: 1.5rem; }
        .tool-btn:hover, .tool-btn.active { color: var(--accent); background: var(--surface-hover); }

        /* Center Canvas Area */
        .canvas-area {
            flex-grow: 1;
            background-color: #0a0b0e; /* Darker to make canvas pop */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 40px;
            position: relative;
        }

        .canvas-wrapper {
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: white;
        }

        /* Right Sidebar - Dynamic Properties */
        .right-sidebar {
            width: 300px;
            background-color: var(--surface);
            border-left: 1px solid var(--border);
            padding: 20px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .panel-section { display: none; }
        .panel-section.active { display: block; }

        .panel-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .prop-group { margin-bottom: 16px; }
        .prop-group label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: var(--text-muted); }
        .prop-group input[type="color"], 
        .prop-group select, 
        .prop-group input[type="text"] {
            width: 100%;
            padding: 10px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 4px;
        }

        /* 3D Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        
        .modal-header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: flex-end;
            position: absolute;
            top: 0;
        }
        .close-btn {
            background: none; border: none; color: white; font-size: 2rem; cursor: pointer;
        }
        #scene-container { width: 80vw; height: 80vh; }

    </style>
</head>
<body>

    <div class="top-nav">
        <div class="brand"><i class="fas fa-book-open"></i> Philadelphia Studio</div>
        <div class="nav-actions">
            <button class="btn-secondary" onclick="undo()"><i class="fas fa-undo"></i></button>
            <button class="btn-secondary" onclick="open3DPreview()"><i class="fas fa-cube"></i> View 3D</button>
            <button onclick="exportPNG()"><i class="fas fa-download"></i> Export PNG</button>
        </div>
    </div>

    <div class="workspace">
        
        <div class="left-sidebar">
            <button class="tool-btn active" onclick="setMode('select')">
                <i class="fas fa-mouse-pointer"></i> Select
            </button>
            <button class="tool-btn" onclick="addText()">
                <i class="fas fa-font"></i> Text
            </button>
            <button class="tool-btn" onclick="setMode('erase')">
                <i class="fas fa-eraser"></i> Erase
            </button>
            <button class="tool-btn" onclick="loadBlankTemplate()">
                <i class="fas fa-border-all"></i> Wrap
            </button>
        </div>

        <div class="canvas-area">
            <div class="canvas-wrapper">
                <canvas id="mainCanvas"></canvas>
            </div>
        </div>

        <div class="right-sidebar">
            
            <div id="panel-canvas" class="panel-section active">
                <div class="panel-title">Canvas Setup</div>
                <div class="prop-group">
                    <label>Background Color</label>
                    <input type="color" id="canvas-bg" value="#111827" onchange="updateCanvasBg(this.value)">
                </div>
                <div class="prop-group" style="font-size: 0.8rem; color: var(--text-muted);">
                    Click "Wrap" on the left to load spine guides, or add elements to begin designing. Select an item to edit its properties here.
                </div>
            </div>

            <div id="panel-text" class="panel-section">
                <div class="panel-title">Edit Text</div>
                <div class="prop-group">
                    <label>Content</label>
                    <input type="text" id="text-content" oninput="updateSelectedText('text', this.value)">
                </div>
                <div class="prop-group">
                    <label>Font Family</label>
                    <select id="text-font" onchange="updateSelectedText('fontFamily', this.value)">
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Arial">Arial</option>
                        <option value="Impact">Impact</option>
                    </select>
                </div>
                <div class="prop-group">
                    <label>Text Color</label>
                    <input type="color" id="text-color" onchange="updateSelectedText('fill', this.value)">
                </div>
                <button onclick="deleteSelected()" style="width: 100%; padding: 10px; background: #ef4444; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 20px;">
                    <i class="fas fa-trash"></i> Delete Element
                </button>
            </div>

        </div>
    </div>

    <div class="modal-overlay" id="modal-3d">
        <div class="modal-header">
            <button class="close-btn" onclick="close3DPreview()"><i class="fas fa-times"></i></button>
        </div>
        <div id="scene-container"></div>
    </div>

    <script>
        /* --- 1. INITIALIZE FABRIC.JS CANVAS --- */
        // Sized for a full wrap (Back + Spine + Front)
        const canvasWidth = 1200; 
        const canvasHeight = 800;
        
        const canvas = new fabric.Canvas('mainCanvas', {
            width: canvasWidth,
            height: canvasHeight,
            backgroundColor: '#111827',
            preserveObjectStacking: true
        });

        let canvasHistory = [];
        function saveState() {
            canvasHistory.push(JSON.stringify(canvas));
            if(canvasHistory.length > 15) canvasHistory.shift();
        }

        function undo() {
            if(canvasHistory.length > 0) {
                canvas.loadFromJSON(canvasHistory.pop(), canvas.renderAll.bind(canvas));
            }
        }

        // Save initial state
        saveState();
        canvas.on('object:modified', saveState);
        canvas.on('object:added', saveState);

        /* --- 2. PROGRESSIVE DISCLOSURE (RIGHT SIDEBAR LOGIC) --- */
        canvas.on('selection:created', handleSelection);
        canvas.on('selection:updated', handleSelection);
        canvas.on('selection:cleared', function() {
            showPanel('panel-canvas');
        });

        function handleSelection(e) {
            const selectedObject = e.selected[0];
            if (selectedObject.type === 'i-text') {
                showPanel('panel-text');
                document.getElementById('text-content').value = selectedObject.text;
                document.getElementById('text-color').value = selectedObject.fill;
                document.getElementById('text-font').value = selectedObject.fontFamily;
            } else {
                showPanel('panel-canvas'); // Fallback for images/shapes
            }
        }

        function showPanel(panelId) {
            document.querySelectorAll('.panel-section').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

        /* --- 3. CANVAS TOOLS --- */
        function updateCanvasBg(color) {
            canvas.backgroundColor = color;
            canvas.renderAll();
            saveState();
        }

        function addText() {
            const text = new fabric.IText('New Title', {
                left: canvasWidth / 2, top: canvasHeight / 2,
                fontFamily: 'Times New Roman', fill: '#ffffff',
                fontSize: 60, originX: 'center', originY: 'center'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function updateSelectedText(property, value) {
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                activeObj.set(property, value);
                canvas.renderAll();
                saveState();
            }
        }

        function deleteSelected() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) { canvas.remove(object); });
                saveState();
            }
        }

        function loadBlankTemplate() {
            canvas.clear();
            canvas.backgroundColor = '#1e2128';
            
            // Spine Math (Center 100px)
            const spineLeft = (canvasWidth / 2) - 50;
            const spineRight = (canvasWidth / 2) + 50;

            const guideLeft = new fabric.Line([spineLeft, 0, spineLeft, canvasHeight], { 
                stroke: '#d4af37', strokeDashArray: [5, 5], selectable: false 
            });
            const guideRight = new fabric.Line([spineRight, 0, spineRight, canvasHeight], { 
                stroke: '#d4af37', strokeDashArray: [5, 5], selectable: false 
            });

            const frontText = new fabric.IText('FRONT TITLE', {
                left: spineRight + ((canvasWidth - spineRight)/2), top: 100, fill: '#fff', originX: 'center'
            });

            const backText = new fabric.IText('Back Cover Synopsis...', {
                left: spineLeft / 2, top: 100, fill: '#fff', fontSize: 20, originX: 'center'
            });

            canvas.add(guideLeft, guideRight, frontText, backText);
            saveState();
        }

        function setMode(mode) {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if (mode === 'select') {
                canvas.isDrawingMode = false;
            } else if (mode === 'erase') {
                canvas.isDrawingMode = true;
                // Perfect Eraser Logic
                canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
                canvas.freeDrawingBrush.width = 30;
                canvas.freeDrawingBrush.color = 'rgba(0,0,0,1)';
                canvas.contextTop.globalCompositeOperation = 'destination-out';
            }
        }

        canvas.on('path:created', function(e) {
            if (canvas.isDrawingMode) {
                e.path.globalCompositeOperation = 'destination-out';
                canvas.renderAll();
                saveState();
            }
        });

        function exportPNG() {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1 });
            const link = document.createElement('a');
            link.download = 'philadelphia-cover.png';
            link.href = dataURL;
            link.click();
        }

        /* --- 4. THREE.JS 3D RENDERER (NO CLIPPING FIX) --- */
        let scene, camera, renderer, bookMesh;

        function init3D() {
            const container = document.getElementById('scene-container');
            scene = new THREE.Scene();
            
            // Fixed Camera: Pulled back on Z-axis, appropriate FOV
            camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 6; 
            camera.position.y = 0;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.innerHTML = ''; // Clear previous
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            // Proportions matching standard book (Width, Height, Depth/Spine)
            const geometry = new THREE.BoxGeometry(2, 3, 0.3);
            
            // Generate Texture from Fabric Canvas
            const textureLoader = new THREE.TextureLoader();
            const canvasData = canvas.toDataURL({ format: 'png' });
            
            textureLoader.load(canvasData, function(texture) {
                const materialCover = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.4 });
                const materialPages = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.9 });
                
                // Materials Array mapping to BoxGeometry faces
                const materials = [
                    materialCover, // Right (Spine in full wrap maps here usually, needs UV tweaking for perfection)
                    materialPages, // Left (Pages)
                    materialPages, // Top
                    materialPages, // Bottom
                    materialCover, // Front
                    materialCover  // Back
                ];

                bookMesh = new THREE.Mesh(geometry, materials);
                bookMesh.rotation.y = -0.5; // Initial tilt
                scene.add(bookMesh);
                
                animate3D();
            });
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            if (bookMesh) {
                bookMesh.rotation.y += 0.005; // Auto-spin
            }
            renderer.render(scene, camera);
        }

        function open3DPreview() {
            document.getElementById('modal-3d').classList.add('active');
            // Small timeout allows DOM to render before measuring container clientWidth
            setTimeout(init3D, 50); 
        }

        function close3DPreview() {
            document.getElementById('modal-3d').classList.remove('active');
            if (renderer) renderer.dispose();
        }

    </script>
</body>
</html>
