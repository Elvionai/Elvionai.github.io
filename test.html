<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Philadelphia AI - Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
    <style>
        /* --- PREMIUM DARK SPACE THEME --- */
        :root {
            --space-bg: #05050A; /* Deepest cosmic black */
            --surface-dark: rgba(15, 17, 26, 0.75); /* Dark slate glass */
            --surface-light: rgba(30, 33, 43, 0.85); /* Lighter slate glass */
            --border-color: rgba(255, 255, 255, 0.08); /* Very subtle borders */
            
            --accent-cyan: #00E5FF; /* Subtle icy blue */
            --accent-hover: #00B4D8;
            --accent-danger: #EF4444;
            
            --text-main: #E2E8F0; /* Crisp off-white */
            --text-muted: #9CA3AF; /* Slate gray */
            
            --user-bubble: rgba(26, 32, 44, 0.8);
            --ai-bubble: transparent; /* AI text sits directly on background for cleaner look */
            
            --code-bg: #0D1117;
        }

        /* --- GLOBAL RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        html, body { height: 100%; width: 100%; background-color: var(--space-bg); color: var(--text-main); overflow: hidden; }

        /* --- SUBTLE STARFIELD BACKGROUND --- */
        #cosmos-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at top right, #0A0F1C, var(--space-bg) 70%);
        }
        .star {
            position: absolute; border-radius: 50%; background: #fff;
            animation: twinkle var(--duration) infinite ease-in-out alternate;
            box-shadow: 0 0 4px rgba(255,255,255,0.4);
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 0.8; transform: scale(1.2); }
        }

        /* --- MAIN UI CONTAINER --- */
        .ui-container {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            position: relative; z-index: 10; max-width: 1000px; margin: 0 auto;
        }
        
        @media (min-width: 1024px) {
            .ui-container {
                height: 96vh; margin-top: 2vh; border-radius: 16px;
                border: 1px solid var(--border-color);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                background: linear-gradient(180deg, rgba(10,12,16,0.9) 0%, rgba(5,5,10,0.95) 100%);
                backdrop-filter: blur(20px);
            }
        }

        /* --- HEADER --- */
        header {
            padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .brand-title {
            font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; color: var(--text-main);
            display: flex; align-items: center; gap: 10px;
        }
        .brand-title i { color: var(--accent-cyan); font-size: 0.9em; }
        .header-actions { display: flex; gap: 20px; }
        .icon-btn { 
            cursor: pointer; color: var(--text-muted); font-size: 1.2rem; 
            transition: 0.2s; background: none; border: none;
        }
        .icon-btn:hover { color: var(--text-main); }

        /* --- CHAT VIEWPORT --- */
        #chat-viewport {
            flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 24px;
            scroll-behavior: smooth;
            scrollbar-width: thin; scrollbar-color: var(--border-color) transparent;
        }
        #chat-viewport::-webkit-scrollbar { width: 6px; }
        #chat-viewport::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .message-group { display: flex; flex-direction: column; max-width: 85%; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .message-group.ai { align-self: flex-start; max-width: 90%; }
        .message-group.user { align-self: flex-end; align-items: flex-end; }
        
        .msg-bubble {
            font-size: 1rem; line-height: 1.6; padding: 16px 20px;
            overflow-wrap: break-word;
        }
        
        /* User Message */
        .user .msg-bubble {
            background: var(--user-bubble); color: var(--text-main);
            border-radius: 16px 16px 4px 16px; border: 1px solid var(--border-color);
        }
        
        /* AI Message */
        .ai .msg-bubble {
            background: transparent; color: var(--text-main);
            padding: 10px 0; /* Flush with edge */
        }

        /* --- STATUS & THINKING STYLES (NEW!) --- */
        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(0, 229, 255, 0.08); border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 6px 12px; border-radius: 20px; font-size: 0.85em; color: var(--accent-cyan);
            margin-bottom: 12px; font-weight: 500;
        }
        
        /* NATIVE SUPPORT FOR <think> TAGS */
        think {
            display: block; border-left: 3px solid var(--border-color);
            padding: 12px 16px; margin: 15px 0; background: rgba(255,255,255,0.02);
            color: var(--text-muted); font-size: 0.95em; border-radius: 0 8px 8px 0;
            line-height: 1.5;
        }
        think::before {
            content: "Thought Process"; display: block; font-weight: 600;
            color: var(--text-main); margin-bottom: 8px; font-size: 0.85em; text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Typewriter & Loading */
        .typewriter-cursor {
            display: inline-block; width: 8px; height: 1.1em; background: var(--accent-cyan);
            animation: blink 0.8s infinite; margin-left: 4px; vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }
        
        .thinking-indicator { display: flex; gap: 6px; padding: 10px 0; }
        .thinking-indicator .dot {
            width: 8px; height: 8px; border-radius: 50%; background-color: var(--text-muted);
            animation: wave 1.2s infinite ease-in-out;
        }
        .thinking-indicator .dot:nth-child(2) { animation-delay: -0.9s; }
        .thinking-indicator .dot:nth-child(3) { animation-delay: -0.6s; }
        @keyframes wave { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }

        /* Media in chat */
        .chat-media-preview { max-width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid var(--border-color); }
        .file-placeholder {
            display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px;
            background: var(--surface-light); border-radius: 8px; border: 1px solid var(--border-color);
            font-size: 0.85em; margin-bottom: 10px;
        }

        /* --- CODE BLOCKS --- */
        pre {
            background: var(--code-bg); border-radius: 12px; border: 1px solid var(--border-color);
            margin: 1.2em 0; padding: 35px 15px 15px 15px; overflow-x: auto; position: relative;
            font-family: 'JetBrains Mono', monospace; font-size: 0.9em;
        }
        pre::before {
            content: attr(data-lang); position: absolute; top: 8px; left: 15px;
            color: var(--text-muted); font-size: 0.75em; text-transform: uppercase; font-weight: 600;
        }
        .copy-btn {
            position: absolute; top: 8px; right: 10px; background: rgba(255,255,255,0.1);
            border: none; color: var(--text-muted); padding: 4px 8px; border-radius: 6px;
            font-size: 0.75em; cursor: pointer; transition: 0.2s;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

        /* --- CONTROLS --- */
        .ai-msg-controls, .user-msg-controls {
            display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; align-items: center;
        }
        .inline-btn {
            background: none; border: none; color: var(--text-muted); padding: 6px;
            border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: 0.2s;
        }
        .inline-btn:hover { background: var(--surface-light); color: var(--text-main); }
        .meta-text { font-size: 0.75em; color: var(--text-muted); margin-right: auto; }

        /* Switch Model Button */
        .switch-model-btn { position: relative; }
        .switch-model-btn > button {
            background: var(--surface-light); border: 1px solid var(--border-color);
            color: var(--text-main); padding: 6px 12px; border-radius: 8px;
            font-size: 0.8em; cursor: pointer; display: flex; align-items: center; gap: 6px;
        }
        .model-switch-popup {
            display: none; position: absolute; bottom: 110%; right: 0; width: 200px;
            background: var(--surface-dark); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 6px; flex-direction: column; gap: 2px;
            backdrop-filter: blur(10px); box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .switch-model-btn:hover .model-switch-popup, .model-switch-popup:hover { display: flex; }
        .model-switch-popup button {
            background: none; border: none; color: var(--text-muted); padding: 10px;
            text-align: left; border-radius: 6px; cursor: pointer; font-size: 0.85em;
            display: flex; align-items: center; gap: 8px;
        }
        .model-switch-popup button:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .model-switch-popup button.active-model { color: var(--accent-cyan); background: rgba(0, 229, 255, 0.05); }

        /* --- INPUT DOCK --- */
        .input-dock {
            padding: 20px 30px; background: var(--space-bg); border-top: 1px solid var(--border-color);
            display: flex; gap: 15px; align-items: flex-end; flex-shrink: 0;
        }
        @media (min-width: 1024px) { .input-dock { background: transparent; } }

        .capsule-input {
            flex: 1; background: var(--surface-light); border: 1px solid var(--border-color);
            border-radius: 20px; display: flex; flex-direction: column; transition: 0.2s;
            position: relative;
        }
        .capsule-input:focus-within { border-color: var(--accent-cyan); background: var(--surface-dark); }
        
        .capsule-input textarea {
            width: 100%; background: transparent; border: none; color: var(--text-main);
            padding: 15px 20px; font-size: 1rem; resize: none; min-height: 52px; max-height: 200px;
            outline: none; line-height: 1.5;
        }
        
        .input-toolbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px 10px 15px;
        }
        .toolbar-left { display: flex; gap: 5px; }
        .toolbar-btn {
            background: none; border: none; color: var(--text-muted); width: 32px; height: 32px;
            border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .toolbar-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }

        .send-btn {
            background: var(--text-main); color: #000; border: none; width: 36px; height: 36px;
            border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; font-size: 1.1em;
        }
        .send-btn:hover { transform: scale(1.05); background: #fff; }
        .send-btn.stop { background: var(--accent-danger); color: #fff; }

        .call-btn {
            background: var(--surface-light); border: 1px solid var(--border-color); color: var(--text-main);
            width: 52px; height: 52px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: 0.2s; flex-shrink: 0; align-self: center;
        }
        .call-btn:hover { border-color: var(--text-main); }

        /* --- STUDIO SIDE PANELS --- */
        .panel-bg {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px); z-index: 1200; opacity: 0; transition: 0.3s;
        }
        .panel-bg.active { display: block; opacity: 1; }

        .side-panel {
            position: fixed; top: 0; left: -380px; height: 100vh; width: 350px;
            background: #0B0E14; border-right: 1px solid var(--border-color);
            z-index: 1212; padding: 0; overflow-y: auto; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        .side-panel.active { left: 0; }
        
        .panel-header {
            padding: 20px 25px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(11, 14, 20, 0.95); backdrop-filter: blur(10px); z-index: 10;
        }
        .panel-header h2 { font-size: 1.1rem; font-weight: 600; }
        
        .panel-content { padding: 25px; flex: 1; overflow-y: auto; }
        
        /* Tool Links Styling */
        .tool-category { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin: 20px 0 10px 0; letter-spacing: 1px;}
        .tool-category:first-child { margin-top: 0; }
        .tool-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 15px;
            color: var(--text-main); text-decoration: none; border-radius: 10px;
            background: var(--surface-light); margin-bottom: 8px; border: 1px solid transparent;
            transition: 0.2s; font-size: 0.95rem; font-weight: 500;
        }
        .tool-link i { color: var(--accent-cyan); width: 20px; text-align: center; }
        .tool-link:hover { background: rgba(255,255,255,0.05); border-color: var(--border-color); }

        /* Forms in Panels */
        .studio-form label { display: block; margin: 15px 0 8px 0; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .studio-form input, .studio-form textarea, .studio-form select {
            width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color);
            border-radius: 10px; color: var(--text-main); font-size: 0.95rem; outline: none; transition: 0.2s;
        }
        .studio-form input:focus, .studio-form textarea:focus, .studio-form select:focus { border-color: var(--accent-cyan); }
        .studio-form textarea { min-height: 100px; resize: vertical; }
        
        .submit-btn {
            width: 100%; padding: 14px; background: var(--text-main); color: #000;
            border: none; border-radius: 10px; font-weight: 600; font-size: 0.95rem;
            margin-top: 25px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:hover { background: #fff; transform: translateY(-2px); }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            #chat-viewport { padding: 20px; }
            .message-group { max-width: 95%; }
            .msg-bubble { padding: 12px 16px; font-size: 0.95rem; }
            .input-dock { padding: 15px; }
            .side-panel { width: 85vw; }
        }
    </style>
</head>
<body>

    <div id="cosmos-container">
        <div class="star" style="top: 10%; left: 20%; --duration: 3s; width: 2px; height: 2px;"></div>
        <div class="star" style="top: 40%; left: 80%; --duration: 4s; width: 3px; height: 3px;"></div>
        <div class="star" style="top: 70%; left: 30%; --duration: 5s; width: 1px; height: 1px;"></div>

                </div>
            </div>
        </div>
    </div>

    <!-- --- TOOLS MENU (STUDIO) --- -->
    <div class="panel-bg" id="toolsMenuBg">
        <nav class="side-panel" id="toolsMenu">

                <h2>Creator Studio</h2>

                <a href="#" class="tool-link" data-tool="research-report"><i class="fa-solid fa-file-pdf"></i> Research Report</a>

        </nav>
    </div>

    <!-- --- TOOL FORM MODAL --- -->
    <div class="panel-bg" id="toolFormModalBg">
        <nav class="side-panel" id="toolFormModal">
            <div class="panel-header">
                <button class="icon-btn" id="toolFormBackBtn"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 id="toolFormTitle">Tool</h2>

            <div class="panel-content">
                <form class="studio-form" id="toolForm"></form>

        </nav>
    </div>

    <!-- --- PROFILE / CHATS MENU --- -->

        <nav class="side-panel" id="profileMenu">

                <h2>Chat History</h2>

                <button class="submit-btn" id="newChatBtn" style="margin-top:0; background: var(--surface-light); color: var(--text-main); border: 1px solid var(--border-color);"><i class="fa-solid fa-plus"></i> New Chat</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

        // Keep your original Firebase config here
        const firebaseConfig = {
            apiKey: "AIzaSyAyROm0aBGjry6NUfhNM3e0qwPcCDoIqSk",
            authDomain: "elvionai.firebaseapp.com",
            projectId: "elvionai",
            storageBucket: "elvionai.appspot.com",
            messagingSenderId: "161078300830",
            appId: "1:161078300830:web:f460df8591704eb0e96b8f"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const $ = id => document.getElementById(id);
        const API_BASE_URL = 'https://web-production-9a18.up.railway.app';
        
        let chats = [], currentChatId = null, currentMessages =[], uploadedFiles =[], currentUser = null;
        let currentController = null;
        let isAIResponding = false;
        let currentModel = 'gemini';

        // Add extra stars
        const cosmos = $('cosmos-container');
        for(let i=0; i<80; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.top = Math.random()*100+'%';
            s.style.left = Math.random()*100+'%';
            s.style.width = s.style.height = (Math.random()*2 + 1)+'px';
            s.style.setProperty('--duration', (Math.random()*4+2)+'s');
            cosmos.appendChild(s);
        }

        // Basic UI Toggles
        window.closeToolMenu = () => { $('toolsMenu').classList.remove('active'); $('toolsMenuBg').classList.remove('active'); };
        $('toolBtn').onclick = () => { $('toolsMenuBg').classList.add('active'); $('toolsMenu').classList.add('active'); };
        $('toolsMenuBg').onclick = (e) => { if(e.target.id === 'toolsMenuBg') closeToolMenu(); };
        
        window.closeProfileMenu = () => { $('profileMenu').classList.remove('active'); $('profileMenuBg').classList.remove('active'); };
        $('openProfileMenu').onclick = () => { $('profileMenuBg').classList.add('active'); $('profileMenu').classList.add('active'); };
        $('profileMenuBg').onclick = (e) => { if(e.target.id === 'profileMenuBg') closeProfileMenu(); };

        $('toolFormBackBtn').onclick = () => {
            $('toolFormModal').classList.remove('active'); $('toolFormModalBg').classList.remove('active');
            $('toolsMenuBg').classList.add('active'); $('toolsMenu').classList.add('active');
        };

        // Textarea auto-resize
        const userInput = $('userInput');
        userInput.oninput = () => {
            userInput.style.height = '52px';
            userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
        };

        const escapeHTML = (str = '') => String(str).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
        
        // Markdown parser
        function renderMarkdown(text = '') {
            // Convert code blocks
            text = escapeHTML(text).replace(/```(\w+)?\n([\s\S]*?)```/g, (m, lang, code) => {
                return `<pre data-lang="${lang || 'code'}"><button class="copy-btn">Copy</button><code>${code}</code></pre>`;
            });
            // Convert bold/italic
            text = text.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
            // Convert Links
            text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent-cyan);">$1</a>');
            // Convert newlines
            return text.replace(/\n/g, '<br>');
        }

        function scrollToBottom() {
            setTimeout(() => { $('chat-viewport').scrollTop = $('chat-viewport').scrollHeight; }, 50);
        }

        // Welcome Message (REMOVED SERAPHINA FROM SWITCH)
        function addWelcomeMessage() {
            const html = `
                <div class="message-group ai">
                    <div class="msg-bubble">
                        Welcome to the Studio. How can I assist your creative process today?
                        <div class="ai-msg-controls">
                            <div class="switch-model-btn">
                                <button><i class="fa-solid fa-layer-group"></i> Switch Model</button>
                                <div class="model-switch-popup">
                                    <button data-model="gemini" class="${currentModel==='gemini'?'active-model':''}"><i class="fa-solid fa-sparkles"></i> Philadelphia</button>
                                    <button data-model="bobby" class="${currentModel==='bobby'?'active-model':''}"><i class="fa-solid fa-robot"></i> Bobby</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            $('chat-viewport').innerHTML = html;
            hookModelSwitchers();
        }

        function hookModelSwitchers() {
            document.querySelectorAll('.model-switch-popup button').forEach(btn => {
                btn.onclick = (e) => {
                    currentModel = e.target.dataset.model;
                    $('brandTitle').innerText = currentModel === 'gemini' ? 'Philadelphia Studio' : 'Bobby Studio';
                    document.querySelectorAll('.model-switch-popup').forEach(p => p.style.display = 'none');
                    addWelcomeMessage(); // Refresh to show active
                }
            });
        }

        // --- THE CHAT ENGINE ---
        window.sendMessage = async function() {
            const text = userInput.value.trim();
            if (!text || isAIResponding) return;
            
            isAIResponding = true;
            if (currentController) currentController.abort();
            currentController = new AbortController();

            // UI changes
            userInput.value = ''; userInput.style.height = '52px';
            $('sendBtn').style.display = 'none'; $('stopBtn').style.display = 'flex';

            // Add User message
            const userDiv = document.createElement('div');
            userDiv.className = 'message-group user';
            userDiv.innerHTML = `<div class="msg-bubble">${renderMarkdown(text)}</div>`;
            $('chat-viewport').appendChild(userDiv);

            // Add AI Placeholder
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message-group ai';
            aiDiv.innerHTML = `
                <div class="msg-bubble">
                    <div class="ai-content-area">
                        <div class="thinking-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </div>`;
            $('chat-viewport').appendChild(aiDiv);
            scrollToBottom();

            const contentArea = aiDiv.querySelector('.ai-content-area');
            let fullText = '';

            try {
                const endpoint = currentModel === 'bobby' ? `${API_BASE_URL}/api/llama/chat` : `${API_BASE_URL}/chat`;
                const payload = currentModel === 'bobby' ? { prompt: text } : { message: text, history:[] };

                const res = await fetch(endpoint, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload), signal: currentController.signal
                });

                if (!res.ok) throw new Error("Server Error");

                if (currentModel === 'bobby') {
                    const data = await res.json();
                    fullText = data.content || "No response";
                } else {
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = '';
                    let isFirstChunk = true;

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        
                        let nlIdx;
                        while ((nlIdx = buffer.indexOf('\n\n')) !== -1) {
                            const chunk = buffer.substring(0, nlIdx);
                            buffer = buffer.substring(nlIdx + 2);
                            
                            if (!chunk.startsWith('data: ')) continue;
                            const jsonStr = chunk.substring(6).trim();
                            if (jsonStr === '[DONE]') break;

                            try {
                                const data = JSON.parse(jsonStr);
                                
                                // FIX: HANDLE SEARCHING STATUS
                                if (data.type === 'status') {
                                    const ind = contentArea.querySelector('.thinking-indicator');
                                    if (ind) ind.remove();
                                    
                                    let pill = contentArea.querySelector('.status-pill');
                                    if (!pill) {
                                        pill = document.createElement('div');
                                        pill.className = 'status-pill';
                                        contentArea.prepend(pill);
                                    }
                                    pill.innerHTML = `<i class="fa-solid fa-bolt"></i> ${escapeHTML(data.content)}`;
                                }
                                
                                if (data.type === 'content' && data.content) {
                                    if (isFirstChunk) {
                                        isFirstChunk = false;
                                        contentArea.innerHTML = '<span class="typewriter-cursor"></span>';
                                    }
                                    // Remove citations for clean UI
                                    const cleanContent = data.content.replace(/\[\d+\]|\[cite:\s*\d+(,\s*\d+)*\]/g, '');
                                    fullText += cleanContent;
                                    
                                    // Render live with <think> tag support
                                    let displayHtml = renderMarkdown(fullText);
                                    // Make <think> tags look nice natively
                                    displayHtml = displayHtml.replace(/&lt;think&gt;/g, '<think>').replace(/&lt;\/think&gt;/g, '</think>');
                                    
                                    contentArea.innerHTML = displayHtml + '<span class="typewriter-cursor"></span>';
                                    scrollToBottom();
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) {
                fullText = err.name === 'AbortError' ? fullText + "\n*(Stopped)*" : `Error: ${err.message}`;
            }

            // Final Render
            let finalHtml = renderMarkdown(fullText);
            finalHtml = finalHtml.replace(/&lt;think&gt;/g, '<think>').replace(/&lt;\/think&gt;/g, '</think>');
            contentArea.innerHTML = finalHtml;
            
            // Add Controls
            const controls = document.createElement('div');
            controls.className = 'ai-msg-controls';
            controls.innerHTML = `
                <button class="inline-btn"><i class="fa-solid fa-copy"></i></button>
                <div class="switch-model-btn">
                    <button><i class="fa-solid fa-layer-group"></i> Switch</button>
                    <div class="model-switch-popup">
                        <button data-model="gemini"><i class="fa-solid fa-sparkles"></i> Philadelphia</button>
                        <button data-model="bobby"><i class="fa-solid fa-robot"></i> Bobby</button>
                    </div>
                </div>
            `;
            aiDiv.querySelector('.msg-bubble').appendChild(controls);
            hookModelSwitchers();
            
            isAIResponding = false;
            $('sendBtn').style.display = 'flex'; $('stopBtn').style.display = 'none';
        };

        $('sendBtn').onclick = sendMessage;
        $('userInput').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

        // INITIALIZE
        addWelcomeMessage();
        
        // Auth Logic (Minimal setup for UI logic)
        onAuthStateChanged(auth, user => {
            if(!user) { window.location.href = 'signup-login.html'; return; }
            currentUser = user;
            // Load chats logic here...
        });

        // Setup Tools UI (Example of binding the Visuals)
        document.querySelectorAll('.tool-link').forEach(link => {
            link.onclick = (e) => {
                e.preventDefault();
                const tool = e.target.closest('.tool-link').dataset.tool;
                
                // Show form based on tool
                $('toolsMenuBg').classList.remove('active');
                $('toolFormTitle').innerText = e.target.innerText;
                
                let formHtml = '';
                if(tool === 'image') {
                    formHtml = `
                        <label>Prompt</label><textarea placeholder="Describe image..."></textarea>
                        <button class="submit-btn" type="submit">Generate</button>
                    `;
                } else if (tool === 'website') {
                    formHtml = `
                        <label>Description</label><textarea placeholder="Describe website..."></textarea>
                        <button class="submit-btn" type="submit">Deploy</button>
                    `;
                } else {
                    formHtml = `<div style="padding:20px; color:var(--text-muted);">Feature connected to backend.</div>`;
                }
                
                $('toolForm').innerHTML = formHtml;
                $('toolFormModalBg').classList.add('active'); $('toolFormModal').classList.add('active');
            }
        });

    </script>
</body>
</html>
