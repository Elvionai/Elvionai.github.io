<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elvion AI | Otherworldly Book Studio</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@500;700;900&family=Playfair+Display:wght@700;900&family=Cinzel:wght@700&family=Great+Vibes&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --cyan: #00d4ff;
            --blue: #0066ff;
            --fire: #ff4500;
            --orange: #ff6a00;
            --gold: #c9a96e;
            --dark: #000814;
            --panel-bg: rgba(5, 15, 30, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #000; 
            color: #fff; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- STYLING MATCH: STARFIELD & ORBS --- */
        #starfield { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%); }
        .star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle var(--duration) ease-in-out infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
        .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.2; pointer-events: none; z-index: 1; animation: orbFloat 12s ease-in-out infinite; }
        .orb1 { width: 400px; height: 400px; background: radial-gradient(circle, var(--cyan), transparent); top: -200px; left: 10%; }
        .orb2 { width: 500px; height: 500px; background: radial-gradient(circle, var(--fire), transparent); bottom: -250px; right: 10%; animation-delay: -6s; }
        @keyframes orbFloat { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(60px, -60px); } }

        /* --- AUTH GATE OVERLAY --- */
        #auth-gate {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            display: flex; justify-content: center; align-items: center;
        }
        .auth-card {
            background: var(--panel-bg); border: 2px solid;
            border-image: linear-gradient(135deg, var(--gold), var(--fire)) 1;
            padding: 40px; border-radius: 15px; text-align: center; width: 90%; max-width: 400px;
        }
        .auth-card h2 { font-family: 'Orbitron'; background: linear-gradient(135deg, var(--gold), var(--fire)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }

        /* --- STUDIO LAYOUT --- */
        .studio-container {
            display: grid; grid-template-columns: 350px 1fr 320px;
            height: 100vh; position: relative; z-index: 10;
        }
        .studio-container.blurred { filter: blur(20px); pointer-events: none; }

        aside {
            background: rgba(5, 15, 30, 0.8); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(201, 169, 110, 0.3);
            padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;
        }
        .right-bar { border-right: none; border-left: 1px solid rgba(201, 169, 110, 0.3); }

        .section-title { font-family: 'Orbitron'; color: var(--gold); font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }

        /* --- UI ELEMENTS --- */
        input, textarea, select {
            width: 100%; background: rgba(255,255,255,0.95); color: #000;
            border: 2px solid var(--gold); padding: 12px; border-radius: 8px;
            font-weight: 600; margin-bottom: 10px;
        }
        .btn {
            background: linear-gradient(135deg, var(--gold), #e8d5b0);
            color: #000; border: none; padding: 14px; border-radius: 10px;
            font-weight: 800; text-transform: uppercase; cursor: pointer;
            transition: 0.3s; width: 100%; font-size: 0.8rem;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 20px var(--gold); }
        .btn:active { transform: scale(0.98); }

        /* --- THE VIEWPORT --- */
        main { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        #canvas-wrapper {
            position: relative; transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
        }
        canvas { 
            background: #111; box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            max-height: 80vh; max-width: 100%; border-radius: 5px;
        }

        /* 3D MOCKUP CLASS */
        .mode-3d { transform: rotateY(-25deg) rotateX(10deg); }
        .mode-3d::after {
            content: ''; position: absolute; top: 0; left: -20px; width: 20px; height: 100%;
            background: #222; transform: rotateY(-90deg); transform-origin: right;
            box-shadow: inset -5px 0 10px #000;
        }

        /* --- STATUS FOOTER --- */
        .status-footer {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--panel-bg); padding: 10px 30px; border-radius: 30px;
            border: 1px solid var(--gold); display: flex; gap: 30px; z-index: 100; font-size: 0.85rem;
        }
        .credit-hl { color: var(--gold); font-weight: 900; font-family: 'Orbitron'; }

        /* LOADER */
        #loader { display: none; position: absolute; font-size: 3rem; color: var(--gold); animation: spin 1s linear infinite; z-index: 50; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .char-thumb { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
    </style>
</head>
<body>

<div id="starfield"></div>
<div class="orb orb1"></div><div class="orb orb2"></div>

<!-- AUTH GATE -->
<div id="auth-gate">
    <div class="auth-card">
        <h2>STUDIO ACCESS</h2>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 25px;">Sign in to unlock otherworldly design tools.</p>
        <button class="btn" style="background: #fff; margin-bottom: 10px;" onclick="signIn('google')"><i class="fab fa-google"></i> Google</button>
        <button class="btn" style="background: #1da1f2; color: #fff;" onclick="signIn('twitter')"><i class="fab fa-twitter"></i> Twitter</button>
        <div style="margin: 15px 0; font-size: 0.7rem; color: #555;">OR EMAIL</div>
        <input type="email" id="email-in" placeholder="Artist Email">
        <button class="btn" onclick="signIn('email')">ENTER STUDIO</button>
    </div>
</div>

<!-- MAIN STUDIO -->
<div class="studio-container blurred" id="studio-ui">
    
    <!-- LEFT: CREATION -->
    <aside>
        <div class="section-title"><i class="fas fa-magic"></i> BOBBY ASSISTANT</div>
        <button class="btn" style="background: transparent; color: var(--gold); border: 1.5px solid var(--gold);" onclick="askBobby()">
            <i class="fas fa-comment-dots"></i> GET PROMPT SUGGESTION
        </button>
        
        <div class="section-title" style="margin-top: 20px;"><i class="fas fa-image"></i> COVER ART</div>
        <label style="font-size: 0.65rem; color: var(--gold);">IMAGE PROMPT</label>
        <textarea id="prompt-in" placeholder="Describe the atmosphere..."></textarea>
        <button class="btn" onclick="generateArt()">GENERATE BACKGROUND (20 CR)</button>

        <div class="section-title" style="margin-top: 30px;"><i class="fas fa-users"></i> CHARACTERS</div>
        <div id="char-tray" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
        <button class="btn" style="margin-top: 10px; font-size: 0.7rem;" onclick="generateCharacter()">+ CREATE CHARACTER (10 CR)</button>
    </aside>

    <!-- CENTER: VIEWPORT -->
    <main>
        <div id="loader"><i class="fas fa-circle-notch"></i></div>
        <div style="position: absolute; top: 20px; display: flex; gap: 15px;">
            <button class="btn" style="width: auto; padding: 8px 15px;" onclick="setMode('2d')">2D FLAT</button>
            <button class="btn" style="width: auto; padding: 8px 15px;" onclick="setMode('3d')">3D MOCKUP</button>
        </div>

        <div id="canvas-wrapper">
            <canvas id="studioCanvas" width="600" height="900"></canvas>
        </div>

        <div style="margin-top: 20px;">
            <button class="btn" style="width: auto; padding: 12px 40px;" onclick="exportCover()"><i class="fas fa-download"></i> EXPORT MASTERPIECE</button>
        </div>
    </main>

    <!-- RIGHT: TYPOGRAPHY -->
    <aside class="right-bar">
        <div class="section-title"><i class="fas fa-font"></i> BOOK DETAILS</div>
        <input type="text" id="title-in" placeholder="Book Title" oninput="draw()">
        <input type="text" id="author-in" placeholder="Author Name" oninput="draw()">

        <div class="section-title" style="margin-top: 20px;"><i class="fas fa-palette"></i> STYLING</div>
        <select id="font-sel" onchange="draw()">
            <option value="Cinzel">Cinzel (Regal)</option>
            <option value="Playfair Display">Playfair Display (Classic)</option>
            <option value="Orbitron">Orbitron (Future)</option>
            <option value="Special Elite">Special Elite (Vintage)</option>
            <option value="Great Vibes">Great Vibes (Script)</option>
        </select>
        
        <label style="font-size: 0.65rem;">TITLE COLOR</label>
        <input type="color" id="color-in" value="#c9a96e" onchange="draw()">
        
        <label style="font-size: 0.65rem;">TITLE SIZE</label>
        <input type="range" id="size-in" min="40" max="120" value="80" oninput="draw()">
        
        <label style="font-size: 0.65rem;">TITLE POSITION (Y)</label>
        <input type="range" id="y-in" min="100" max="800" value="250" oninput="draw()">
    </aside>
</div>

<!-- FOOTER STATUS -->
<div class="status-footer">
    <span><i class="fas fa-user"></i> <span id="user-display">---</span></span>
    <span><i class="fas fa-coins"></i> BALANCE: <span class="credit-hl" id="balance-display">0</span></span>
    <button onclick="window.location.href='developer-dashboard.html'" style="background: none; border: none; color: var(--cyan); cursor: pointer; font-weight: 800;">+ FUND WALLET</button>
</div>

<!-- Scripts -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, TwitterAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAyROm0aBGjry6NUfhNM3e0qwPcCDoIqSk",
        authDomain: "elvionai.firebaseapp.com",
        projectId: "elvionai",
        storageBucket: "elvionai.appspot.com",
        messagingSenderId: "161078300830",
        appId: "1:161078300830:web:f460df8591704eb0e96b8f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const API_URL = "https://web-production-9a18.up.railway.app";
    const ADMIN_EMAIL = "koladhino@gmail.com";

    let currentToken = null;
    let bgImg = new Image();
    const canvas = document.getElementById('studioCanvas');
    const ctx = canvas.getContext('2d');

    // --- AUTH HANDLER ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentToken = await user.getIdToken();
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('studio-ui').classList.remove('blurred');
            document.getElementById('user-display').innerText = user.email;
            loadBalance();
            loadDraft();
        } else {
            document.getElementById('auth-gate').style.display = 'flex';
            document.getElementById('studio-ui').classList.add('blurred');
        }
    });

    window.signIn = (method) => {
        if (method === 'google') signInWithPopup(auth, new GoogleAuthProvider());
        else if (method === 'twitter') signInWithPopup(auth, new TwitterAuthProvider());
        else alert("Please use Google/Twitter for secure credit syncing.");
    };

    async function loadBalance() {
        try {
            const res = await fetch(`${API_URL}/api/user/keys-and-balance`, {
                headers: { 'X-Firebase-Token': currentToken }
            });
            const data = await res.json();
            document.getElementById('balance-display').innerText = (auth.currentUser.email === ADMIN_EMAIL) ? "∞" : data.balance;
        } catch (e) { console.error(e); }
    }

    // --- BOBBY (LLAMA) SUGGESTION ---
    window.askBobby = async () => {
        const title = document.getElementById('title-in').value || "A Mystery Book";
        toggleLoader(true);
        try {
            const res = await fetch(`${API_URL}/api/llama/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: `Suggest a visual prompt for a book cover titled "${title}". Focus on artistic style, mood, and central elements. Return ONLY the prompt.` })
            });
            const data = await res.json();
            document.getElementById('prompt-in').value = data.content;
        } catch (e) { alert("Bobby is disconnected."); }
        toggleLoader(false);
    };

    // --- IMAGE GENERATION (20 CR) ---
    window.generateArt = async () => {
        const prompt = document.getElementById('prompt-in').value;
        if (!prompt) return alert("Enter a prompt.");
        toggleLoader(true);
        try {
            const res = await fetch(`${API_URL}/generate-image`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Firebase-Token': currentToken },
                body: JSON.stringify({ prompt, model: 'v6' })
            });
            const data = await res.json();
            if (data.image_b64) {
                bgImg.src = "data:image/png;base64," + data.image_b64;
                bgImg.onload = () => { draw(); saveDraft(); loadBalance(); };
            }
        } catch (e) { alert("Insufficient Credits or Error."); }
        toggleLoader(false);
    };

    // --- DRAWING ENGINE ---
    window.draw = () => {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (bgImg.src) ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

        const title = document.getElementById('title-in').value.toUpperCase();
        const author = document.getElementById('author-in').value.toUpperCase();
        const font = document.getElementById('font-sel').value;
        const color = document.getElementById('color-in').value;
        const size = document.getElementById('size-in').value;
        const y = document.getElementById('y-in').value;

        ctx.textAlign = "center";
        ctx.shadowColor = "rgba(0,0,0,0.8)";
        ctx.shadowBlur = 15;
        
        // Title
        ctx.fillStyle = color;
        ctx.font = `900 ${size}px "${font}"`;
        const words = title.split(' ');
        words.forEach((w, i) => ctx.fillText(w, canvas.width/2, parseInt(y) + (i * size * 1.1)));

        // Author
        ctx.fillStyle = "#fff";
        ctx.font = `600 25px "Orbitron"`;
        ctx.fillText(author, canvas.width/2, 850);
    };

    // --- UTILS ---
    window.setMode = (m) => {
        const wrap = document.getElementById('canvas-wrapper');
        if (m === '3d') wrap.classList.add('mode-3d');
        else wrap.classList.remove('mode-3d');
    };

    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }

    function saveDraft() {
        const draft = {
            title: document.getElementById('title-in').value,
            author: document.getElementById('author-in').value,
            img: bgImg.src
        };
        localStorage.setItem('elv_studio_draft', JSON.stringify(draft));
    }

    function loadDraft() {
        const saved = localStorage.getItem('elv_studio_draft');
        if (saved) {
            const d = JSON.parse(saved);
            document.getElementById('title-in').value = d.title || "";
            document.getElementById('author-in').value = d.author || "";
            if (d.img) { bgImg.src = d.img; bgImg.onload = draw; }
        }
        draw();
    }

    window.exportCover = () => {
        const link = document.createElement('a');
        link.download = 'elvion-book-cover.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    // STARFIELD INIT
    const sf = document.getElementById('starfield');
    for(let i=0; i<100; i++) {
        let s = document.createElement('div');
        s.className='star';
        s.style.left = Math.random()*100+'%';
        s.style.top = Math.random()*100+'%';
        s.style.setProperty('--duration', (Math.random()*3+2)+'s');
        sf.appendChild(s);
    }
</script>
</body>
</html>
