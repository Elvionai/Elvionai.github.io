<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elvion AI | Otherworldly Book Studio</title>
    
    <!-- External Assets -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Orbitron:wght@400;900&family=Inter:wght@300;600;800&family=Cinzel:wght@700&family=Great+Vibes&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        :root {
            --gold: #c9a96e;
            --gold-glow: rgba(201, 169, 110, 0.4);
            --bg-deep: #050505;
            --panel-bg: rgba(15, 15, 15, 0.95);
            --border: rgba(201, 169, 110, 0.2);
            --accent-cyan: #00d4ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg-deep); 
            color: #efefef; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            height: 100vh;
        }

        /* --- BACKGROUND COSMOS --- */
        #cosmos {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* --- AUTH GATE --- */
        #auth-gate {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
        }
        .auth-card {
            background: var(--panel-bg);
            border: 1px solid var(--gold);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px var(--gold-glow);
            max-width: 400px;
            width: 90%;
        }
        .auth-card h2 { font-family: 'Cinzel'; color: var(--gold); margin-bottom: 20px; letter-spacing: 3px; }
        .auth-btn {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            transition: 0.3s;
        }
        .auth-btn:hover { background: var(--gold); color: black; }

        /* --- MAIN STUDIO LAYOUT --- */
        .studio-wrapper {
            display: grid;
            grid-template-columns: 350px 1fr 320px;
            height: 100vh;
            filter: blur(0px);
            transition: 0.5s;
        }
        .studio-wrapper.locked { filter: blur(25px); pointer-events: none; }

        /* --- SIDEBARS --- */
        aside {
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        .right-bar { border-right: none; border-left: 1px solid var(--border); }

        .section-title {
            font-family: 'Orbitron';
            font-size: 0.75rem;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- TOOL INPUTS --- */
        .tool-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        textarea, input, select {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            margin-bottom: 10px;
        }
        textarea { height: 80px; resize: none; }

        .btn-gold {
            background: linear-gradient(135deg, #c9a96e, #e8d5b0);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--gold-glow); }

        /* --- THE STAGE (CENTER) --- */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        .viewport-controls {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 10px;
        }
        .view-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--gold);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .view-btn.active { background: var(--gold); color: black; }

        /* --- THE BOOK CANVAS --- */
        #canvas-container {
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        canvas {
            display: block;
            border-radius: 4px;
            max-width: 100%;
            max-height: 75vh;
            background: #111;
        }

        /* --- 3D MOCKUP MODES --- */
        .mode-3d {
            transform: rotateY(-25deg) rotateX(10deg) rotateZ(2deg);
        }
        .mode-3d::after {
            content: '';
            position: absolute;
            top: 0; left: -15px; width: 15px; height: 100%;
            background: #222;
            transform: rotateY(-90deg);
            transform-origin: right;
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.5);
        }

        /* --- CHARACTER SAVER --- */
        .char-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .char-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 5px;
            border-radius: 8px;
            text-align: center;
        }
        .char-card img { width: 100%; border-radius: 5px; margin-bottom: 5px; }

        /* --- STATUS BAR --- */
        .status-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--panel-bg);
            border: 1px solid var(--gold);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
            z-index: 500;
        }
        .credit-count { color: var(--gold); font-weight: 800; }

        /* --- LOADER --- */
        #loader {
            display: none;
            position: absolute;
            z-index: 100;
            color: var(--gold);
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="cosmos"></div>

    <!-- Firebase Auth Gate -->
    <div id="auth-gate">
        <div class="auth-card">
            <h2>ELVION STUDIO</h2>
            <p style="font-size: 0.85rem; color: #888; margin-bottom: 30px;">Access the otherworld of cover creation.</p>
            <button class="auth-btn" onclick="login('google')">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            <button class="auth-btn" onclick="login('twitter')">
                <i class="fab fa-twitter"></i> Continue with Twitter
            </button>
            <div style="margin: 20px 0; color: #444;">OR</div>
            <input type="email" id="auth-email" placeholder="Artist Email">
            <button class="btn-gold" onclick="login('email')">Enter Studio</button>
        </div>
    </div>

    <!-- Main Studio -->
    <div class="studio-wrapper locked" id="studio">
        
        <!-- Left Sidebar: The Artist's Desk -->
        <aside>
            <div class="section-title"><i class="fas fa-paint-brush"></i> GENERATION</div>
            
            <div class="tool-group">
                <label>Book Title</label>
                <input type="text" id="book-title" placeholder="e.g. The Zelut's Awakening" oninput="updateCanvas()">
            </div>
            
            <div class="tool-group">
                <label>Author Name</label>
                <input type="text" id="book-author" placeholder="e.g. Kolade Philip Ogunlana" oninput="updateCanvas()">
            </div>

            <div class="tool-group">
                <label>Visual Mood (Prompt)</label>
                <textarea id="image-prompt" placeholder="Describe the scene..."></textarea>
                <button class="btn-gold" style="background: var(--panel-bg); color: var(--gold); border: 1px solid var(--gold); margin-top: 5px;" onclick="askBobby()">
                    <i class="fas fa-magic"></i> Ask Bobby for a Prompt
                </button>
            </div>

            <button class="btn-gold" onclick="generateCover()">
                <i class="fas fa-sparkles"></i> Generate Background (20 CR)
            </button>

            <div style="margin-top: 30px;" class="section-title"><i class="fas fa-users"></i> PERSISTENT CHARACTERS</div>
            <div class="char-grid" id="char-list">
                <!-- Character Cards Appear Here -->
            </div>
            <button class="btn-gold" style="margin-top:10px; background:transparent; border:1px solid var(--border); color: #fff;" onclick="generateCharacter()">
                + Create Character (10 CR)
            </button>
        </aside>

        <!-- Center: The Viewport -->
        <main>
            <div class="viewport-controls">
                <button class="view-btn active" onclick="setView('2d', this)">2D FLAT</button>
                <button class="view-btn" onclick="setView('3d', this)">3D MOCKUP</button>
                <button class="view-btn" onclick="downloadCover()"><i class="fas fa-download"></i> EXPORT</button>
            </div>

            <i class="fas fa-circle-notch" id="loader"></i>

            <div id="canvas-container">
                <canvas id="bookCanvas" width="600" height="900"></canvas>
            </div>
        </main>

        <!-- Right Sidebar: Typography & Effects -->
        <aside class="right-bar">
            <div class="section-title"><i class="fas fa-font"></i> TYPOGRAPHY</div>
            
            <div class="tool-group">
                <label>Title Font</label>
                <select id="title-font" onchange="updateCanvas()">
                    <option value="Playfair Display">Playfair Display</option>
                    <option value="Cinzel">Cinzel (Otherworldly)</option>
                    <option value="Orbitron">Orbitron (Sci-Fi)</option>
                    <option value="Great Vibes">Great Vibes (Calligraphy)</option>
                    <option value="Special Elite">Special Elite (Grungy)</option>
                    <option value="Times New Roman">Times New Roman</option>
                </select>
            </div>

            <div class="tool-group">
                <label>Title Size</label>
                <input type="range" id="title-size" min="20" max="120" value="70" oninput="updateCanvas()">
            </div>

            <div class="tool-group">
                <label>Text Color</label>
                <input type="color" id="text-color" value="#c9a96e" onchange="updateCanvas()">
            </div>

            <div class="tool-group">
                <label>Title Position (Y)</label>
                <input type="range" id="title-y" min="50" max="850" value="200" oninput="updateCanvas()">
            </div>

            <div class="section-title" style="margin-top: 20px;"><i class="fas fa-layer-group"></i> SAVED PROJECTS</div>
            <div id="project-list" style="font-size: 0.8rem; color: #666;">
                Auto-saving to scroll of wisdom...
            </div>
        </aside>
    </div>

    <!-- Bottom Status -->
    <div class="status-bar">
        <span><i class="fas fa-user-circle"></i> <span id="display-email">Artist</span></span>
        <span><i class="fas fa-coins"></i> Credits: <span class="credit-count" id="user-credits">0</span></span>
        <a href="#" onclick="openPayments()" style="color: var(--accent-cyan); text-decoration: none; font-weight: bold;">+ FUND</a>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>

    <script>
        const API_BASE = "https://web-production-9a18.up.railway.app";
        const ADMIN_EMAIL = "koladhino@gmail.com";
        
        let currentUser = null;
        let currentToken = null;
        let backgroundImage = new Image();
        const canvas = document.getElementById('bookCanvas');
        const ctx = canvas.getContext('2d');

        // --- AUTH LOGIC ---
        function login(method) {
            // Simulated login for demo - In production, use your Firebase setup here
            const emailInput = document.getElementById('auth-email').value;
            if (method === 'email' && !emailInput) return alert("Enter email");
            
            const email = method === 'email' ? emailInput : "user@example.com";
            setupUser(email);
        }

        async function setupUser(email) {
            currentUser = { email };
            document.getElementById('auth-gate').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('studio').classList.remove('locked');
            }, 500);
            
            document.getElementById('display-email').innerText = email;
            loadUserBalance(email);
            loadDraft();
        }

        async function loadUserBalance(email) {
            // Reuse your existing developer-console logic to fetch balance
            // For now, simulating 100 or Unlimited for Admin
            const credits = (email.toLowerCase() === ADMIN_EMAIL) ? "∞" : 100;
            document.getElementById('user-credits').innerText = credits;
        }

        // --- BOBBY (LLAMA) INTEGRATION ---
        async function askBobby() {
            const title = document.getElementById('book-title').value;
            if (!title) return alert("Enter a title first so Bobby knows the vibe.");
            
            showLoader(true);
            try {
                const res = await fetch(`${API_BASE}/api/llama/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: `Act as a professional book cover designer. Suggest a highly detailed, otherworldly visual prompt for a book titled "${title}". Focus on lighting, atmosphere, and artistic style (e.g. digital art, oil painting, cinematic). Return ONLY the prompt text.`,
                    })
                });
                const data = await res.json();
                document.getElementById('image-prompt').value = data.content;
            } catch (e) {
                alert("Bobby is meditating. Try again later.");
            }
            showLoader(false);
        }

        // --- IMAGE GENERATION (DEDUCTS 20 CR) ---
        async function generateCover() {
            const prompt = document.getElementById('image-prompt').value;
            if (!prompt) return alert("Describe the vision first.");
            
            showLoader(true);
            try {
                // Call your /generate-image endpoint
                const res = await fetch(`${API_BASE}/generate-image`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, model: 'v6' })
                });
                const data = await res.json();
                
                backgroundImage.crossOrigin = "anonymous";
                backgroundImage.src = `data:image/png;base64,${data.image_b64}`;
                backgroundImage.onload = () => {
                    updateCanvas();
                    saveDraft();
                };
            } catch (e) {
                alert("The otherworldly portal is closed. Check credits.");
            }
            showLoader(false);
        }

        // --- CHARACTER GENERATION (DEDUCTS 10 CR) ---
        async function generateCharacter() {
            const prompt = prompt("Describe the character (e.g. A female warrior with purple eyes):");
            if (!prompt) return;
            // logic similar to generateCover but adds to #char-list
            toast("Character generated! (Simulated)");
        }

        // --- CANVAS RENDERING (PROFESSIONAL JS) ---
        function updateCanvas() {
            // Clear
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Background
            if (backgroundImage.src) {
                ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
            }

            // Typography
            const title = document.getElementById('book-title').value || "THE UNTOLD TALE";
            const author = document.getElementById('book-author').value || "ANONYMOUS AUTHOR";
            const font = document.getElementById('title-font').value;
            const size = document.getElementById('title-size').value;
            const color = document.getElementById('text-color').value;
            const y = document.getElementById('title-y').value;

            // Draw Title
            ctx.textAlign = "center";
            ctx.fillStyle = color;
            ctx.font = `900 ${size}px "${font}"`;
            ctx.shadowColor = "rgba(0,0,0,0.8)";
            ctx.shadowBlur = 15;
            
            // Handle Multi-line title
            const lines = title.split(' ');
            let lineOffset = 0;
            lines.forEach(line => {
                ctx.fillText(line.toUpperCase(), canvas.width/2, parseInt(y) + lineOffset);
                lineOffset += parseInt(size);
            });

            // Draw Author
            ctx.font = `600 24px "Inter"`;
            ctx.fillStyle = "#fff";
            ctx.letterSpacing = "4px";
            ctx.fillText(author.toUpperCase(), canvas.width/2, 850);
            
            saveDraft();
        }

        // --- VIEW CONTROLS ---
        function setView(mode, btn) {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const container = document.getElementById('canvas-container');
            if (mode === '3d') {
                container.classList.add('mode-3d');
            } else {
                container.classList.remove('mode-3d');
            }
        }

        // --- PERSISTENCE ---
        function saveDraft() {
            const state = {
                title: document.getElementById('book-title').value,
                author: document.getElementById('book-author').value,
                img: backgroundImage.src,
                font: document.getElementById('title-font').value,
                size: document.getElementById('title-size').value,
                color: document.getElementById('text-color').value,
                y: document.getElementById('title-y').value
            };
            localStorage.setItem('elvion_studio_draft', JSON.stringify(state));
        }

        function loadDraft() {
            const saved = localStorage.getItem('elvion_studio_draft');
            if (saved) {
                const state = JSON.parse(saved);
                document.getElementById('book-title').value = state.title;
                document.getElementById('book-author').value = state.author;
                document.getElementById('title-font').value = state.font;
                document.getElementById('title-size').value = state.size;
                document.getElementById('text-color').value = state.color;
                document.getElementById('title-y').value = state.y;
                if (state.img) {
                    backgroundImage.src = state.img;
                    backgroundImage.onload = updateCanvas;
                }
            }
            updateCanvas();
        }

        function downloadCover() {
            const link = document.createElement('a');
            link.download = 'elvion-book-cover.png';
            link.href = canvas.toDataURL();
            link.click();
            toast("Downloaded! Your masterpiece is ready.");
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        function toast(msg) {
            alert(msg); // Replace with a pretty toast in final
        }

        // --- 3D ORBS ANIMATION ---
        // Reuse your starfield/orb logic here for aesthetic excellence
    </script>
</body>
</html>
