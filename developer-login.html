<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | Log In — Elvion AI Developer Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign up or log in to the Elvion AI Developer Platform.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --font-brand: 'Playfair Display', serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
      --font-futuristic: 'Orbitron', sans-serif;
      
      --bg-deep: #050505;
      --bg-space: #0a0a08;
      --bg-card: rgba(15, 15, 12, 0.95);
      
      --text: #efefef;
      --muted: #888888;
      
      --accent: #c9a96e;
      --accent-soft: #e8d5b0;
      --danger: #e05a5a;
      --success: #5fb87a;
      --warning: #f59e0b;
      
      --border-glow: 0 0 15px rgba(201, 169, 110, 0.2), 0 0 30px rgba(232, 213, 176, 0.1);
      --hover-glow: 0 0 20px rgba(201, 169, 110, 0.4), 0 0 40px rgba(232, 213, 176, 0.2);
      --gradient-gold: linear-gradient(135deg, #c9a96e 0%, #e8d5b0 50%, #af8f50 100%);
      
      --radius: 16px;
    }

    html, body { height: 100%; margin: 0; }
    
    body {
      min-height: 100vh;
      font-family: var(--font-body);
      background: radial-gradient(circle at center, #11110f 0%, #050505 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient Gold Stars */
    #stars-container {
      position: fixed;
      width: 100vw;
      height: 100vh;
      top: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
    }
    
    .star {
      position: absolute;
      background: var(--accent-soft);
      border-radius: 50%;
      opacity: 0;
      box-shadow: 0 0 8px rgba(201, 169, 110, 0.6);
      animation: twinkle 4.5s infinite linear;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(0.8); }
      50% { opacity: 0.8; transform: scale(1.2); }
    }

    /* Auth Card Container */
    .auth-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid rgba(201, 169, 110, 0.15);
      box-shadow: var(--border-glow);
      padding: 32px 28px;
      width: 100%;
      max-width: 400px;
      z-index: 1;
      animation: fadeIn 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
      backdrop-filter: blur(10px);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header & Branding */
    .header { text-align: center; margin-bottom: 24px; }
    
    .logo-img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 12px auto;
      border: 2px solid var(--accent);
      animation: logoPulse 3s infinite alternate;
    }
    
    @keyframes logoPulse {
      0% { box-shadow: 0 0 10px rgba(201, 169, 110, 0.3); }
      100% { box-shadow: 0 0 25px rgba(232, 213, 176, 0.6); }
    }
    
    .site-heading {
      font-family: var(--font-brand);
      font-size: 1.6em;
      font-weight: 800;
      background: var(--gradient-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      letter-spacing: 0.5px;
    }
    
    .subtitle {
      color: var(--text-secondary);
      font-size: 0.85em;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(201, 169, 110, 0.1);
      border-radius: 12px;
      margin-bottom: 24px;
      padding: 5px;
    }
    
    .auth-tab {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.9em;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .auth-tab.active {
      background: var(--gradient-gold);
      color: #050505;
      box-shadow: 0 2px 10px rgba(201, 169, 110, 0.3);
    }

    /* Forms */
    form { display: flex; flex-direction: column; gap: 16px; }
    
    .input-group { display: flex; flex-direction: column; text-align: left; }
    
    label {
      font-size: 0.8em;
      color: var(--accent-soft);
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    input {
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid rgba(201, 169, 110, 0.2);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text);
      font-size: 0.95em;
      font-family: var(--font-body);
      outline: none;
      transition: all 0.3s ease;
    }
    
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(201, 169, 110, 0.3);
      background: rgba(0, 0, 0, 0.6);
    }
    
    input::placeholder { color: #555; }

    /* Buttons */
    .submit-btn {
      background: var(--gradient-gold);
      color: #050505;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95em;
      font-family: var(--font-body);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(201, 169, 110, 0.2);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 5px;
    }
    
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(201, 169, 110, 0.4);
    }
    
    .submit-btn:disabled {
      background: #333;
      color: #777;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* Separator & OAuth */
    .separator {
      text-align: center;
      color: var(--muted);
      margin: 10px 0;
      font-size: 0.85em;
      position: relative;
    }
    
    .separator::before, .separator::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(201, 169, 110, 0.15);
    }
    .separator::before { left: 0; }
    .separator::after { right: 0; }

    .oauth-group { display: flex; gap: 12px; }
    
    .oauth-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .oauth-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(201, 169, 110, 0.3);
    }
    
    .oauth-btn i { font-size: 1.2em; }
    .fa-google { color: #DB4437; }
    .fa-twitter { color: #1DA1F2; }

    /* Links & Status */
    .form-links { text-align: right; margin-top: -6px; }
    .form-links a { color: var(--accent); text-decoration: none; cursor: pointer; font-size: 0.85em; }
    .form-links a:hover { text-decoration: underline; color: var(--accent-soft); }

    .terms-note { color: var(--muted); font-size: 0.75em; margin-top: 15px; text-align: center; line-height: 1.5; }
    .terms-note a { color: var(--accent); text-decoration: none; }
    .terms-note a:hover { text-decoration: underline; }

    .status-message {
      font-size: 0.85em;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div id="stars-container"></div>

<div class="auth-card">
  <div class="header">
    <img src="https://i.ibb.co/YTkKPfvf/IMG-20250715-102103-129.jpg" class="logo-img" alt="Elvion AI Logo">
    <h1 class="site-heading">Elvion AI</h1>
    <p class="subtitle">Developer Platform</p>
  </div>
  
  <div class="auth-tabs">
    <button class="auth-tab active" id="loginTab">Log In</button>
    <button class="auth-tab" id="signupTab">Sign Up</button>
  </div>
  
  <section class="form-section">
    <!-- Log In Form -->
    <form id="loginForm">
      <div class="input-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="input-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div class="form-links"><a id="forgotPassword">Forgot password?</a></div>
      <button type="submit" class="submit-btn">Log In</button>
      
      <div class="separator">or continue with</div>
      
      <div class="oauth-group">
          <button class="oauth-btn" id="googleLogin" type="button"><i class="fab fa-google"></i></button>
          <button class="oauth-btn" id="twitterLogin" type="button"><i class="fab fa-twitter"></i></button>
      </div>
      <div class="status-message" id="loginStatus" style="color: var(--accent);"></div>
    </form>
    
    <!-- Sign Up Form (hidden) -->
    <form id="signupForm" style="display:none;">
       <div class="input-group">
        <label for="signup-name">Full Name</label>
        <input type="text" id="signup-name" placeholder="John Doe" required autocomplete="name">
      </div>
      <div class="input-group">
        <label for="signup-email">Email Address</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="input-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="submit-btn">Create Account</button>
      
      <div class="separator">or continue with</div>
      
      <div class="oauth-group">
          <button class="oauth-btn" id="googleSignUp" type="button"><i class="fab fa-google"></i></button>
          <button class="oauth-btn" id="twitterSignUp" type="button"><i class="fab fa-twitter"></i></button>
      </div>
      
      <div class="status-message" id="signupStatus" style="color: var(--accent);"></div>
      <div class="terms-note">
        By signing up, you agree to our <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>.
      </div>
    </form>
  </section>
</div>

<script type="module">
  // ==========================================================================
  // --- CONFIGURATION ---
  // ==========================================================================
  const firebaseConfig = {
    apiKey: "AIzaSyAyROm0aBGjry6NUfhNM3e0qwPcCDoIqSk",
    authDomain: "elvionai.firebaseapp.com",
    projectId: "elvionai",
    storageBucket: "elvionai.appspot.com",
    messagingSenderId: "161078300830",
    appId: "1:161078300830:web:f460df8591704eb0e96b8f"
  };
  const REDIRECT_URL = "developer-dashboard.html";

  // ==========================================================================
  // --- FIREBASE IMPORTS & INITIALIZATION ---
  // ==========================================================================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, onAuthStateChanged, createUserWithEmailAndPassword,
    signInWithEmailAndPassword, signInWithPopup, sendEmailVerification,
    sendPasswordResetEmail, GoogleAuthProvider, TwitterAuthProvider, updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ==========================================================================
  // --- UI LOGIC ---
  // ==========================================================================
  const signupTab = document.getElementById('signupTab');
  const loginTab = document.getElementById('loginTab');
  const signupForm = document.getElementById('signupForm');
  const loginForm = document.getElementById('loginForm');

  signupTab.onclick = () => switchTab('signup');
  loginTab.onclick = () => switchTab('login');
  
  function switchTab(tabName) {
    if (tabName === 'signup') {
      signupTab.classList.add('active'); loginTab.classList.remove('active');
      signupForm.style.display = 'flex'; loginForm.style.display = 'none';
    } else {
      loginTab.classList.add('active'); signupTab.classList.remove('active');
      loginForm.style.display = 'flex'; signupForm.style.display = 'none';
    }
  }

  // ==========================================================================
  // --- AUTHENTICATION LOGIC (DEFINITIVE FIX) ---
  // ==========================================================================

  onAuthStateChanged(auth, user => {
    if (user) {
        if (user.emailVerified) {
            console.log("User is logged in and verified. Redirecting to dashboard...");
            window.location.href = REDIRECT_URL;
        } else {
            setStatus('loginStatus', 'Please verify your email before logging in. Check your inbox.', 'var(--warning)');
        }
    } else {
        console.log("No user is logged in.");
    }
  });

  function setStatus(elementId, message, color = 'var(--accent)') {
    const el = document.getElementById(elementId);
    el.textContent = message;
    el.style.color = color;
  }

  async function handleOAuth(provider, statusElementId) {
    setStatus(statusElementId, 'Opening provider sign-in...');
    try {
      const result = await signInWithPopup(auth, provider);
      await setDoc(doc(db, "users", result.user.uid), {
        name: result.user.displayName,
        email: result.user.email,
        createdAt: new Date()
      }, { merge: true });
    } catch (error) {
      if (error.code === 'auth/popup-closed-by-user') {
        setStatus(statusElementId, '');
      } else {
        setStatus(statusElementId, error.message, 'var(--danger)');
      }
    }
  }
  
  document.getElementById('googleSignUp').onclick = () => handleOAuth(new GoogleAuthProvider(), 'signupStatus');
  document.getElementById('googleLogin').onclick = () => handleOAuth(new GoogleAuthProvider(), 'loginStatus');
  document.getElementById('twitterSignUp').onclick = () => handleOAuth(new TwitterAuthProvider(), 'signupStatus');
  document.getElementById('twitterLogin').onclick = () => handleOAuth(new TwitterAuthProvider(), 'loginStatus');

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    
    setStatus('signupStatus', 'Creating account...');
    
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(userCredential.user, { displayName: name });
      await setDoc(doc(db, "users", userCredential.user.uid), { name, email, createdAt: new Date() });
      await sendEmailVerification(userCredential.user);
      
      setStatus('signupStatus', "Success! Please check your inbox to verify your email.", 'var(--success)');
      setTimeout(() => switchTab('login'), 4000);
    } catch (error) {
      setStatus('signupStatus', error.message, 'var(--danger)');
    }
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    
    setStatus('loginStatus', 'Logging in...');

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      if (!userCredential.user.emailVerified) {
         setStatus('loginStatus', 'Please verify your email before logging in. Check your inbox.', 'var(--warning)');
      }
    } catch (error) {
      setStatus('loginStatus', error.message, 'var(--danger)');
    }
  });

  document.getElementById('forgotPassword').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value;
    if (!email) {
      setStatus('loginStatus', 'Please enter your email address first.', 'var(--warning)');
      return;
    }
    setStatus('loginStatus', 'Sending reset link...');
    try {
      await sendPasswordResetEmail(auth, email);
      setStatus('loginStatus', 'Password reset email sent! Check your inbox.', 'var(--success)');
    } catch (error) {
      setStatus('loginStatus', error.message, 'var(--danger)');
    }
  });
  
  // Ambient Star Animation setup
  document.addEventListener('DOMContentLoaded', () => {
    const starsContainer = document.getElementById('stars-container');
    for(let i=0; i < 70; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2 + 1;
      star.style.width = `${size}px`; 
      star.style.height = `${size}px`;
      star.style.left = `${Math.random() * 100}%`; 
      star.style.top = `${Math.random() * 100}%`;
      star.style.animationDelay = `${Math.random() * 4}s`;
      star.style.animationDuration = `${Math.random() * 2 + 3}s`;
      starsContainer.appendChild(star);
    }
  });
</script>

  gtag('js', new Date()); 
  gtag('config', 'G-J1YTKP10ZX');
</script>

</body>
</html>
