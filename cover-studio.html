<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elvion Cover Studio | Professional AI Art</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Fonts: UI and Book Cover Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;600&family=Cinzel:wght@700&family=Great+Vibes&family=Montserrat:wght@700&family=Orbitron:wght@700&family=Merriweather:wght@700&family=Oswald:wght@700&family=Lobster&family=Pacifico&family=Dancing+Script:wght@700&family=Bebas+Neue&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* =====================================================================
       ELVION COVER STUDIO — OTHERWORLDLY GOLD THEME
       ===================================================================== */
    :root {
      --bg-base: #050505;
      --bg-panel: rgba(15, 15, 15, 0.85);
      --accent: #c9a96e;
      --accent-glow: rgba(201, 169, 110, 0.4);
      --text-main: #efefef;
      --text-muted: #888;
      --border: rgba(201, 169, 110, 0.2);
      --radius: 12px;
      --font-ui: 'Inter', sans-serif;
      --font-brand: 'Playfair Display', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    
    body {
      font-family: var(--font-ui);
      background: radial-gradient(circle at 50% 0%, #1a1610 0%, var(--bg-base) 70%);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* --- HEADER --- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    .brand { display: flex; align-items: center; gap: 15px; }
    .brand h1 {
      font-family: var(--font-brand);
      color: var(--accent);
      font-size: 1.5rem;
      letter-spacing: 2px;
      text-shadow: 0 0 15px var(--accent-glow);
    }
    .user-controls { display: flex; align-items: center; gap: 15px; }
    
    .credit-badge {
      background: rgba(201, 169, 110, 0.1);
      border: 1px solid var(--accent);
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: var(--font-ui);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }
    .btn-dark { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }
    .btn-dark:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

    /* --- WORKSPACE LAYOUT --- */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left Panel: Generation Controls */
    .side-panel {
      width: 320px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      z-index: 10;
      backdrop-filter: blur(20px);
    }
    
    .panel-title { font-family: var(--font-brand); color: var(--accent); font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
    
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    textarea, select, input[type="text"] {
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px;
      border-radius: 8px;
      font-family: var(--font-ui);
      resize: vertical;
    }
    textarea:focus, select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
    
    .type-toggle { display: flex; background: rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .type-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.3s; }
    .type-btn.active { background: var(--accent); color: #000; }

    .cost-display { font-size: 0.8rem; text-align: center; color: var(--accent); margin-top: -10px; }
    .free-display { font-size: 0.8rem; text-align: center; color: #00ff88; margin-top: -10px; display: none; }

    /* Center: Canvas Area */
    .canvas-container-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      position: relative;
      overflow: hidden;
    }
    
    /* Checkerboard background for transparency visibility */
    .canvas-bg {
      background-image: linear-gradient(45deg, #111 25%, transparent 25%), linear-gradient(-45deg, #111 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #111 75%), linear-gradient(-45deg, transparent 75%, #111 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
    }

    /* Right Panel: Editor Tools */
    .tools-panel {
      width: 300px;
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      z-index: 10;
      backdrop-filter: blur(20px);
    }

    .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .tool-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: #fff;
      padding: 15px 10px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      transition: 0.3s;
    }
    .tool-btn i { font-size: 1.2rem; color: var(--accent); }
    .tool-btn:hover, .tool-btn.active { background: rgba(201, 169, 110, 0.15); border-color: var(--accent); }

    /* Brush Settings */
    #brush-settings { display: none; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-top: 10px; }
    .color-picker-wrap { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    input[type="color"] { background: none; border: none; width: 40px; height: 40px; cursor: pointer; }

    /* Bottom: Library */
    .library-panel {
      height: 160px;
      background: rgba(10, 10, 10, 0.95);
      border-top: 1px solid var(--border);
      padding: 15px 30px;
      display: flex;
      align-items: center;
      gap: 15px;
      overflow-x: auto;
      z-index: 10;
    }
    .library-item {
      min-width: 90px;
      height: 130px;
      background: #222;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      overflow: hidden;
      transition: 0.3s;
      position: relative;
    }
    .library-item img { width: 100%; height: 100%; object-fit: cover; }
    .library-item:hover { border-color: var(--accent); transform: scale(1.05); }
    .lib-badge { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; color: var(--accent); }

    /* Modals & Loaders */
    .loader-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 50;
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    .spinner {
      width: 50px; height: 50px; border: 3px solid rgba(201, 169, 110, 0.3);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000;
      display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);
    }
    .modal {
      background: var(--bg-panel); border: 1px solid var(--accent); padding: 30px;
      border-radius: 16px; width: 90%; max-width: 400px; text-align: center;
      box-shadow: 0 0 40px rgba(201, 169, 110, 0.2);
    }
    
    /* Login Screen Override */
    #auth-screen {
      position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1610 0%, #050505 100%);
      z-index: 3000; display: flex; align-items: center; justify-content: center;
    }
    .auth-box { text-align: center; max-width: 400px; }
    .auth-box h1 { font-family: var(--font-brand); color: var(--accent); font-size: 2.5rem; margin-bottom: 10px; }

    #toast {
      position: fixed; top: 20px; right: 20px; background: var(--accent); color: #000;
      padding: 12px 24px; border-radius: 8px; font-weight: 700; z-index: 4000;
      transform: translateX(200%); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #toast.show { transform: translateX(0); }
  </style>
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen">
    <div class="auth-box">
      <h1>Elvion Studio</h1>
      <p style="color: var(--text-muted); margin-bottom: 30px;">Professional AI Book Cover Creation</p>
      <button class="btn" style="width: 100%; justify-content: center; font-size: 1.1rem; padding: 15px;" onclick="login()">
        <i class="fab fa-google"></i> Sign In to Studio
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast">Message here</div>

  <!-- Main UI -->
  <header>
    <div class="brand">
      <img src="https://i.ibb.co/YTkKPfvf/IMG-20250715-102103-129.jpg" alt="Logo" style="width:40px; border-radius:8px; border:1px solid var(--accent);">
      <h1>COVER STUDIO</h1>
    </div>
    <div class="user-controls">
      <div class="credit-badge" id="balance-badge">
        <i class="fas fa-coins"></i> <span id="credit-bal">...</span>
      </div>
      <button class="btn btn-dark" onclick="openModal('fund-modal')"><i class="fas fa-plus"></i> Fund Wallet</button>
      <button class="btn-dark btn" style="border:none;" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </header>

  <div class="workspace">
    <!-- Left: Generation -->
    <div class="side-panel">
      <div class="panel-title"><i class="fas fa-wand-magic-sparkles"></i> Create Art</div>
      
      <div class="type-toggle">
        <div class="type-btn active" id="btn-type-cover" onclick="setGenType('cover')">Book Cover</div>
        <div class="type-btn" id="btn-type-char" onclick="setGenType('character')">Character</div>
      </div>
      
      <div id="cost-display" class="cost-display">Cost: 20 Credits</div>
      <div id="free-display" class="free-display">Free Daily Uses Left: <span id="free-count">2</span></div>

      <div class="form-group">
        <label>Prompt / Description</label>
        <textarea id="prompt" rows="5" placeholder="A dark fantasy book cover featuring a glowing purple crystal, thunderstorms, majestic castle..."></textarea>
      </div>

      <div class="form-group">
        <label>AI Model</label>
        <select id="model-select">
          <option value="v6">Thena V6 (Illustration)</option>
          <option value="photoreal">Thena Photoreal (Cinematic)</option>
          <option value="anime_core">Thena Anime (Stylized)</option>
        </select>
      </div>

      <button class="btn" style="justify-content: center; padding: 15px; font-size: 1.1rem; margin-top: 10px;" onclick="generateArt()">
        <i class="fas fa-bolt"></i> Generate Artwork
      </button>
    </div>

    <!-- Center: Canvas -->
    <div class="canvas-container-wrapper" id="canvas-wrapper">
      <div class="loader-overlay" id="gen-loader">
        <div class="spinner"></div>
        <div style="margin-top: 15px; color: var(--accent); font-family: var(--font-brand); font-size: 1.2rem; letter-spacing: 1px;">Conjuring Magic...</div>
      </div>
      <!-- Fabric JS Canvas -->
      <canvas id="studio-canvas" class="canvas-bg"></canvas>
    </div>

    <!-- Right: Editing Tools -->
    <div class="tools-panel">
      <div class="panel-title"><i class="fas fa-layer-group"></i> Editor Tools</div>
      
      <div class="tool-grid">
        <button class="tool-btn" onclick="addText()"><i class="fas fa-font"></i> Add Text</button>
        <button class="tool-btn" id="btn-brush" onclick="toggleBrush()"><i class="fas fa-paint-brush"></i> Brush / Fix</button>
        <button class="tool-btn" onclick="deleteSelected()"><i class="fas fa-trash"></i> Delete Layer</button>
        <button class="tool-btn" onclick="clearCanvas()"><i class="fas fa-file"></i> Clear All</button>
      </div>

      <!-- Text Editing Context Menu (Shows when text is selected) -->
      <div id="text-settings" style="display:none; margin-top: 20px;">
        <div class="panel-title" style="font-size:0.9rem;">Typography</div>
        <div class="form-group">
          <label>Font Family</label>
          <select id="font-family" onchange="updateTextProperty('fontFamily', this.value)">
            <option value="Cinzel">Cinzel (Fantasy/Epic)</option>
            <option value="Playfair Display">Playfair Display (Romance/Classic)</option>
            <option value="Great Vibes">Great Vibes (Elegant Script)</option>
            <option value="Montserrat">Montserrat (Modern Thriller)</option>
            <option value="Orbitron">Orbitron (Sci-Fi)</option>
            <option value="Bebas Neue">Bebas Neue (Bold Action)</option>
            <option value="Oswald">Oswald (Mystery)</option>
            <option value="Cormorant Garamond">Cormorant Garamond (Literary)</option>
          </select>
        </div>
        <div class="color-picker-wrap">
          <label>Color</label>
          <input type="color" id="text-color" value="#ffffff" onchange="updateTextProperty('fill', this.value)">
        </div>
      </div>

      <!-- Brush Context Menu -->
      <div id="brush-settings">
        <div class="form-group">
          <label>Brush Size (<span id="b-size-val">20</span>px)</label>
          <input type="range" id="brush-size" min="5" max="100" value="20" oninput="updateBrush()">
        </div>
        <div class="color-picker-wrap">
          <label>Paint Color (Pick from BG to hide text)</label>
          <input type="color" id="brush-color" value="#000000" onchange="updateBrush()">
        </div>
      </div>

      <div style="flex:1;"></div>
      
      <button class="btn" style="justify-content: center; background: #00ff88; color: #000;" onclick="exportCover()">
        <i class="fas fa-download"></i> Export High-Res
      </button>
      <button class="btn btn-dark" style="justify-content: center; margin-top: 10px;" onclick="saveCurrentToLibrary()">
        <i class="fas fa-save"></i> Save Progress
      </button>
    </div>
  </div>

  <!-- Bottom: Library -->
  <div class="library-panel" id="library-panel">
    <!-- Items populated by JS -->
  </div>

  <!-- Modals -->
  <div class="modal-overlay" id="fund-modal">
    <div class="modal">
      <button class="btn-dark" style="position:absolute; right:15px; top:15px; border-radius:50%; width:30px; height:30px; padding:0;" onclick="closeModal('fund-modal')">&times;</button>
      <i class="fas fa-wallet" style="font-size:3rem; color:var(--accent); margin-bottom:15px;"></i>
      <h2 style="font-family:var(--font-brand); color:var(--accent); margin-bottom: 20px;">Fund Wallet</h2>
      <div class="form-group" style="text-align:left;">
        <label>Amount (NGN)</label>
        <input type="number" id="fund-amount" value="1000" min="100">
      </div>
      <button class="btn" style="width:100%; justify-content:center; margin-top:15px;" onclick="initiatePayment()">Pay with Korapay</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // --- CONFIG & GLOBAL STATE ---
    const API_URL = "https://web-production-9a18.up.railway.app";
    const ADMIN_EMAIL = "koladhino@gmail.com";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAyROm0aBGjry6NUfhNM3e0qwPcCDoIqSk",
      authDomain: "elvionai.firebaseapp.com",
      projectId: "elvionai",
      storageBucket: "elvionai.appspot.com",
      messagingSenderId: "161078300830",
      appId: "1:161078300830:web:f460df8591704eb0e96b8f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let currentToken = null;
    let userBalance = 0;
    
    let genType = 'cover'; // 'cover' | 'character'
    let canvas; 
    let db; // IndexedDB

    // --- INITIALIZATION ---
    window.onload = () => {
      initCanvas();
      initDB();
      checkFreeLimits();
    };

    // --- AUTHENTICATION ---
    window.login = () => {
      signInWithPopup(auth, provider).catch(e => showToast("Login failed", "error"));
    };

    window.logout = () => {
      signOut(auth).then(() => { window.location.reload(); });
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        currentToken = await user.getIdToken(true);
        document.getElementById('auth-screen').style.display = 'none';
        fetchBalance();
        checkFreeLimits();
        loadLibrary();
      } else {
        document.getElementById('auth-screen').style.display = 'flex';
      }
    });

    async function fetchBalance() {
      try {
        const res = await fetch(`${API_URL}/api/user/keys-and-balance`, {
          headers: { 'X-Firebase-Token': currentToken }
        });
        const data = await res.json();
        if(res.ok) {
          userBalance = data.balance || 0;
          document.getElementById('credit-bal').innerText = userBalance;
          if (currentUser.email === ADMIN_EMAIL) {
            document.getElementById('credit-bal').innerText = '∞ ADMIN';
          }
        }
      } catch(e) { console.error("Balance fetch error:", e); }
    }

    // --- PRICING & LIMITS LOGIC ---
    function checkFreeLimits() {
      if(currentUser && currentUser.email === ADMIN_EMAIL) {
        document.getElementById('free-display').style.display = 'block';
        document.getElementById('free-display').innerHTML = "Admin: Unlimited Access";
        return true;
      }

      const today = new Date().toDateString();
      let usage = JSON.parse(localStorage.getItem('elvion_studio_free')) || {};
      
      if(usage.date !== today) {
        usage = { date: today, covers: 0 };
        localStorage.setItem('elvion_studio_free', JSON.stringify(usage));
      }

      const remaining = Math.max(0, 2 - usage.covers);
      
      if(remaining > 0) {
        document.getElementById('free-display').style.display = 'block';
        document.getElementById('cost-display').style.display = 'none';
        document.getElementById('free-count').innerText = remaining;
        return true;
      } else {
        document.getElementById('free-display').style.display = 'none';
        document.getElementById('cost-display').style.display = 'block';
        return false;
      }
    }

    function consumeLimitOrCredits() {
      if(currentUser && currentUser.email === ADMIN_EMAIL) return true;

      const cost = genType === 'cover' ? 20 : 10;
      const today = new Date().toDateString();
      let usage = JSON.parse(localStorage.getItem('elvion_studio_free')) || { date: today, covers: 0 };
      
      // If free uses available
      if (usage.date === today && usage.covers < 2) {
        usage.covers += 1;
        localStorage.setItem('elvion_studio_free', JSON.stringify(usage));
        checkFreeLimits();
        return true;
      }

      // Otherwise check wallet
      if (userBalance >= cost) {
        // Technically, backend should deduct. 
        // For studio simulation based on requirements:
        userBalance -= cost; 
        document.getElementById('credit-bal').innerText = userBalance;
        return true;
      }

      showToast(`Insufficient credits. Need ${cost} credits.`, "error");
      openModal('fund-modal');
      return false;
    }

    window.setGenType = (type) => {
      genType = type;
      document.getElementById('btn-type-cover').classList.remove('active');
      document.getElementById('btn-type-char').classList.remove('active');
      document.getElementById(`btn-type-${type === 'cover' ? 'cover' : 'char'}`).classList.add('active');
      
      if(!checkFreeLimits()) {
        document.getElementById('cost-display').innerText = `Cost: ${type === 'cover' ? 20 : 10} Credits`;
      }
      
      // Update canvas aspect ratio based on type
      resizeCanvas();
    };

    // --- CANVAS ENGINE (FABRIC.JS) ---
    function initCanvas() {
      canvas = new fabric.Canvas('studio-canvas', {
        preserveObjectStacking: true,
        isDrawingMode: false
      });
      
      resizeCanvas();
      
      // Event: Show text editor when text is selected
      canvas.on('selection:created', handleSelection);
      canvas.on('selection:updated', handleSelection);
      canvas.on('selection:cleared', () => {
        document.getElementById('text-settings').style.display = 'none';
      });
    }

    function resizeCanvas() {
      const wrapper = document.getElementById('canvas-wrapper');
      // Logical dimensions for high res export
      let logicalWidth = genType === 'cover' ? 768 : 1024;
      let logicalHeight = genType === 'cover' ? 1152 : 1024;

      // Fit to screen visually
      const padding = 40;
      const availableW = wrapper.clientWidth - padding;
      const availableH = wrapper.clientHeight - padding;
      
      const scale = Math.min(availableW / logicalWidth, availableH / logicalHeight);
      
      canvas.setWidth(logicalWidth * scale);
      canvas.setHeight(logicalHeight * scale);
      canvas.setZoom(scale);
    }

    window.addEventListener('resize', resizeCanvas);

    function handleSelection(e) {
      if(e.selected && e.selected[0].type === 'i-text') {
        const obj = e.selected[0];
        document.getElementById('text-settings').style.display = 'block';
        document.getElementById('font-family').value = obj.fontFamily;
        document.getElementById('text-color').value = obj.fill;
      }
    }

    // --- EDITOR TOOLS ---
    window.addText = () => {
      const text = new fabric.IText('BOOK TITLE', {
        left: canvas.width / (2 * canvas.getZoom()) - 150,
        top: canvas.height / (2 * canvas.getZoom()) - 50,
        fontFamily: 'Cinzel',
        fill: '#ffffff',
        fontSize: 60,
        fontWeight: 'bold',
        shadow: new fabric.Shadow({ color: 'rgba(0,0,0,0.8)', blur: 10, offsetX: 2, offsetY: 2 })
      });
      canvas.add(text);
      canvas.setActiveObject(text);
    };

    window.updateTextProperty = (prop, val) => {
      const active = canvas.getActiveObject();
      if(active && active.type === 'i-text') {
        active.set(prop, val);
        canvas.renderAll();
      }
    };

    window.deleteSelected = () => {
      const active = canvas.getActiveObjects();
      if(active.length) {
        active.forEach(obj => canvas.remove(obj));
        canvas.discardActiveObject();
      }
    };

    window.clearCanvas = () => {
      if(confirm("Clear entire canvas?")) {
        canvas.clear();
        canvas.backgroundColor = null;
        canvas.backgroundImage = null;
      }
    };

    // Brush Tool (For covering up AI artifacts)
    window.toggleBrush = () => {
      canvas.isDrawingMode = !canvas.isDrawingMode;
      const btn = document.getElementById('btn-brush');
      const settings = document.getElementById('brush-settings');
      
      if(canvas.isDrawingMode) {
        btn.classList.add('active');
        settings.style.display = 'block';
        canvas.discardActiveObject();
        updateBrush();
      } else {
        btn.classList.remove('active');
        settings.style.display = 'none';
      }
    };

    window.updateBrush = () => {
      if(!canvas.isDrawingMode) return;
      const size = parseInt(document.getElementById('brush-size').value, 10);
      const color = document.getElementById('brush-color').value;
      
      document.getElementById('b-size-val').innerText = size;
      
      canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
      canvas.freeDrawingBrush.color = color;
      canvas.freeDrawingBrush.width = size / canvas.getZoom(); // adjust brush size to zoom level
    };

    // --- GENERATION LOGIC ---
    window.generateArt = async () => {
      const prompt = document.getElementById('prompt').value.trim();
      if(!prompt) return showToast("Please enter a prompt.", "error");

      if(!consumeLimitOrCredits()) return;

      const model = document.getElementById('model-select').value;
      const w = genType === 'cover' ? 768 : 1024;
      const h = genType === 'cover' ? 1024 : 1024; // Standardize for Thena

      document.getElementById('gen-loader').style.display = 'flex';

      try {
        const payload = {
          prompt: prompt + (genType === 'cover' ? ", dramatic book cover art, high resolution, masterpiece" : ", character design, centered, masterpiece"),
          model: model,
          width: w,
          height: h,
          use_minimax: false
        };

        const response = await fetch(`${API_URL}/generate-image`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Firebase-Token': currentToken || ""
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        if(!response.ok) throw new Error(data.detail || "Failed to generate");

        // Load image into Fabric Canvas
        const b64 = `data:image/png;base64,${data.image_b64}`;
        fabric.Image.fromURL(b64, (img) => {
          // Scale image to fit logical dimensions
          const scale = Math.min((w / canvas.getZoom()) / img.width, (h / canvas.getZoom()) / img.height);
          
          canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
            scaleX: scale,
            scaleY: scale,
            originX: 'center',
            originY: 'center',
            left: (canvas.width / canvas.getZoom()) / 2,
            top: (canvas.height / canvas.getZoom()) / 2
          });
          
          showToast("Generation Complete!", "success");
          
          // Auto save to library
          setTimeout(() => saveCurrentToLibrary(b64, prompt), 500);
        });

      } catch(e) {
        showToast(e.message, "error");
        // Refund if failed
        if(!checkFreeLimits()) { userBalance += (genType==='cover'?20:10); document.getElementById('credit-bal').innerText = userBalance; }
      } finally {
        document.getElementById('gen-loader').style.display = 'none';
      }
    };

    // --- INDEXED DB (LIBRARY SYSTEM) ---
    function initDB() {
      const request = indexedDB.open("ElvionStudioDB", 1);
      request.onupgradeneeded = (e) => {
        db = e.target.result;
        if(!db.objectStoreNames.contains("library")) {
          db.createObjectStore("library", { keyPath: "id", autoIncrement: true });
        }
      };
      request.onsuccess = (e) => { db = e.target.result; if(currentUser) loadLibrary(); };
    }

    window.saveCurrentToLibrary = (b64override = null, promptInfo = "") => {
      if(!db) return;
      // Get base64 of current canvas state
      const dataUrl = b64override || canvas.toDataURL({ format: 'png', multiplier: 1/canvas.getZoom() });
      const jsonState = JSON.stringify(canvas);

      const tx = db.transaction("library", "readwrite");
      const store = tx.objectStore("library");
      
      const item = {
        userId: currentUser ? currentUser.uid : 'guest',
        thumbnail: dataUrl,
        state: jsonState,
        type: genType,
        date: new Date().getTime(),
        prompt: promptInfo
      };

      store.add(item);
      tx.oncomplete = () => { showToast("Saved to Library", "success"); loadLibrary(); };
    };

    function loadLibrary() {
      if(!db || !currentUser) return;
      const tx = db.transaction("library", "readonly");
      const store = tx.objectStore("library");
      const request = store.getAll();

      request.onsuccess = () => {
        const items = request.result.filter(i => i.userId === currentUser.uid).sort((a,b) => b.date - a.date);
        const panel = document.getElementById('library-panel');
        
        panel.innerHTML = items.length === 0 ? '<div style="color:#666; font-size:0.8rem;">No saved projects yet.</div>' : '';
        
        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'library-item';
          div.innerHTML = `
            <img src="${item.thumbnail}" alt="Saved Project">
            <div class="lib-badge">${item.type}</div>
          `;
          div.onclick = () => loadProject(item);
          panel.appendChild(div);
        });
      };
    }

    function loadProject(item) {
      if(confirm("Load this project? Current unsaved progress will be lost.")) {
        canvas.loadFromJSON(item.state, () => {
          canvas.renderAll();
          showToast("Project Loaded", "success");
        });
      }
    }

    // --- EXPORT ---
    window.exportCover = () => {
      // Temporarily remove zoom for export
      const currentZoom = canvas.getZoom();
      canvas.setZoom(1);
      
      const dataURL = canvas.toDataURL({
        format: 'png',
        quality: 1,
        multiplier: 2 // Export at 2x resolution for print/high quality
      });
      
      canvas.setZoom(currentZoom); // Restore zoom

      const link = document.createElement('a');
      link.download = `Elvion_Cover_${new Date().getTime()}.png`;
      link.href = dataURL;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast("Downloading High-Res Cover...", "success");
    };

    // --- KORAPAY FUNDING ---
    window.initiatePayment = async () => {
      try {
        const amt = document.getElementById('fund-amount').value;
        if(amt < 100) throw new Error('Minimum amount is ₦100');
        
        const currentUrl = window.location.href.split('?')[0]; 
        
        const res = await fetch(`${API_URL}/api/payments/initiate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Firebase-Token': currentToken },
          body: JSON.stringify({ amount: parseInt(amt), redirect_url: currentUrl })
        });
        
        const data = await res.json();
        if(!res.ok) throw new Error(data.detail);
        
        window.location.href = data.checkout_url;
      } catch(e) { showToast(e.message, "error"); }
    };

    // Verify Payment on redirect back
    const params = new URLSearchParams(window.location.search);
    const ref = params.get('reference') || params.get('trxref');
    if(ref && currentToken) {
      window.history.replaceState({}, document.title, window.location.pathname);
      verifyPayment(ref);
    }

    async function verifyPayment(ref) {
      try {
        const res = await fetch(`${API_URL}/api/payments/verify?transaction_ref=${ref}`, {
          headers: { 'X-Firebase-Token': currentToken }
        });
        const data = await res.json();
        if(data.status === 'success') {
          showToast(`Funded +${data.credits_added} Credits!`, "success");
          fetchBalance();
        }
      } catch(e) {}
    }

    // --- UTILS ---
    window.openModal = (id) => document.getElementById(id).style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    function showToast(msg, type="success") {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.style.background = type === 'success' ? '#00ff88' : '#ff0055';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
