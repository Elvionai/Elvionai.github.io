<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Philadelphia AI - Premium Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
    <style>
        /* ========== REFINED PREMIUM DARK THEME ========== */
        :root {
            /* Sophisticated Dark Palette */
            --bg-primary: #0a0e1a;
            --bg-secondary: #0f1419;
            --bg-elevated: #141922;
            --bg-overlay: rgba(15, 20, 30, 0.95);
            
            /* Accent Colors - Refined & Elegant */
            --accent-primary: #00d4ff;
            --accent-secondary: #7c3aed;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            
            /* Text Colors - High Readability */
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --text-dim: #4b5563;
            
            /* Border & Divider */
            --border-primary: rgba(255, 255, 255, 0.1);
            --border-accent: rgba(0, 212, 255, 0.3);
            
            /* Glow Effects - Subtle & Professional */
            --glow-sm: 0 0 10px rgba(0, 212, 255, 0.2);
            --glow-md: 0 0 20px rgba(0, 212, 255, 0.3);
            --glow-lg: 0 0 30px rgba(0, 212, 255, 0.4);
            
            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            
            /* Animation Speeds */
            --speed-fast: 150ms;
            --speed-normal: 250ms;
            --speed-slow: 350ms;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== ENHANCED BACKGROUND ========== */
        #cosmos-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(ellipse at top, rgba(0, 212, 255, 0.08), transparent 50%),
                        radial-gradient(ellipse at bottom, rgba(124, 58, 237, 0.08), transparent 50%),
                        var(--bg-primary);
            overflow: hidden;
        }

        .nebula-layer {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 40%, rgba(124, 58, 237, 0.15), transparent 60%),
                        radial-gradient(circle at 70% 60%, rgba(0, 212, 255, 0.12), transparent 60%);
            animation: nebulaDrift 60s infinite alternate ease-in-out;
            opacity: 0.6;
        }

        @keyframes nebulaDrift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5%, -5%) scale(1.05); }
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: var(--accent-primary);
            animation: twinkle var(--duration, 3s) infinite ease-in-out alternate;
            box-shadow: 0 0 4px var(--accent-primary);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.2); }
        }

        /* ========== MAIN CONTAINER ========== */
        .ui-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 1024px) {
            .ui-container {
                height: 94vh;
                width: 94vw;
                max-width: 1400px;
                margin: 3vh auto;
                border-radius: 20px;
                background: rgba(10, 14, 26, 0.85);
                backdrop-filter: blur(20px);
                border: 1px solid var(--border-primary);
                box-shadow: var(--shadow-lg);
                overflow: hidden;
            }
        }

        /* ========== HEADER ========== */
        header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border-primary);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
            transition: all var(--speed-normal);
        }

        .brand-title:hover {
            filter: brightness(1.2);
            text-shadow: var(--glow-sm);
        }

        .header-welcome {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all var(--speed-fast);
        }

        .icon-btn:hover {
            color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        /* ========== CHAT VIEWPORT ========== */
        #chat-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 30px 5%;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scroll-behavior: smooth;
        }

        #chat-viewport::-webkit-scrollbar {
            width: 6px;
        }

        #chat-viewport::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-viewport::-webkit-scrollbar-thumb {
            background: var(--border-primary);
            border-radius: 3px;
        }

        #chat-viewport::-webkit-scrollbar-thumb:hover {
            background: var(--border-accent);
        }

        /* ========== MESSAGES ========== */
        .message-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 80%;
            animation: slideIn 0.3s ease-out;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-group.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-group.ai {
            align-self: flex-start;
        }

        .msg-bubble {
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 0.9375rem;
            line-height: 1.6;
            word-wrap: break-word;
            position: relative;
        }

        /* User Messages */
        .user .msg-bubble {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(124, 58, 237, 0.15));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-bottom-right-radius: 4px;
            box-shadow: var(--shadow-sm);
        }

        /* AI Messages */
        .ai .msg-bubble {
            background: var(--bg-elevated);
            border: 1px solid var(--border-primary);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }

        /* ========== TYPEWRITER & THINKING ANIMATIONS ========== */
        .thinking-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 0;
        }

        .thinking-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-primary);
            animation: thinkingBounce 1s infinite ease-in-out;
            box-shadow: 0 0 8px var(--accent-primary);
        }

        .thinking-indicator .dot:nth-child(2) { animation-delay: -0.66s; }
        .thinking-indicator .dot:nth-child(3) { animation-delay: -0.33s; }

        @keyframes thinkingBounce {
            0%, 80%, 100% { 
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% { 
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--accent-primary);
            animation: cursorBlink 0.8s infinite;
            margin-left: 2px;
            box-shadow: 0 0 8px var(--accent-primary);
        }

        @keyframes cursorBlink {
            50% { opacity: 0; }
        }

        /* ========== STATUS PILL ========== */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.8125rem;
            color: var(--accent-primary);
            margin-bottom: 12px;
            font-weight: 500;
        }

        /* ========== CODE BLOCKS ========== */
        pre {
            background: #1a1f2e;
            border-radius: 12px;
            border: 1px solid var(--border-primary);
            margin: 1.2em 0;
            padding: 16px;
            overflow-x: auto;
            position: relative;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            box-shadow: var(--shadow-md);
        }

        pre::before {
            content: attr(data-lang);
            position: absolute;
            top: 8px;
            right: 8px;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--border-accent);
            color: var(--accent-primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all var(--speed-fast);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .copy-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-primary);
            transform: translateY(-2px);
        }

        /* ========== MESSAGE CONTROLS ========== */
        .ai-msg-controls, .user-msg-controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .meta-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-right: auto;
        }

        .inline-copy-btn, .inline-share-btn, .inline-regen-btn, .inline-edit-btn, .switch-model-btn {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid var(--border-accent);
            color: var(--accent-primary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all var(--speed-fast);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .inline-copy-btn:hover, .inline-share-btn:hover, .inline-regen-btn:hover, .inline-edit-btn:hover, .switch-model-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-primary);
            transform: translateY(-2px);
            box-shadow: var(--glow-sm);
        }

        .model-switch-popup {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0;
            min-width: 200px;
            background: var(--bg-overlay);
            border: 1px solid var(--border-accent);
            border-radius: 12px;
            padding: 8px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .switch-model-btn:hover .model-switch-popup {
            display: block;
            animation: fadeSlideIn 0.2s ease-out;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .model-switch-popup button {
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 10px 14px;
            width: 100%;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all var(--speed-fast);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .model-switch-popup button:hover {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-primary);
        }

        .model-switch-popup button.active-model {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent-primary);
            font-weight: 600;
        }

        .model-switch-popup button.active-model::after {
            content: '✓';
            margin-left: auto;
        }

        /* ========== INPUT DOCK ========== */
        .input-dock {
            padding: 20px 30px;
            background: var(--bg-elevated);
            border-top: 1px solid var(--border-primary);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            backdrop-filter: blur(10px);
        }

        .capsule-input {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 20px;
            padding: 12px 60px 12px 20px;
            transition: all var(--speed-normal);
            position: relative;
        }

        .capsule-input:focus-within {
            border-color: var(--accent-primary);
            box-shadow: var(--glow-md);
        }

        .capsule-input textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.9375rem;
            resize: none;
            min-height: 24px;
            max-height: 200px;
            outline: none;
            line-height: 1.5;
            font-family: inherit;
        }

        .capsule-input textarea::placeholder {
            color: var(--text-muted);
        }

        .main-action-buttons {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 8px;
        }

        .main-action-buttons button, .main-action-buttons label {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.125rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: all var(--speed-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-action-buttons button:hover, .main-action-buttons label:hover {
            color: var(--accent-primary);
            background: rgba(0, 212, 255, 0.1);
        }

        .thruster-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--accent-primary);
            color: var(--bg-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            transition: all var(--speed-normal);
            box-shadow: var(--glow-md);
        }

        .thruster-btn:hover {
            transform: scale(1.1);
            box-shadow: var(--glow-lg);
        }

        .thruster-btn.stop {
            background: var(--accent-danger);
        }

        /* ========== SIDE PANELS ========== */
        .panel-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1200;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .panel-bg.active {
            display: block;
            opacity: 1;
        }

        .side-panel {
            position: fixed;
            top: 0;
            left: -400px;
            height: 100vh;
            width: 380px;
            background: var(--bg-overlay);
            border-right: 1px solid var(--border-primary);
            z-index: 1212;
            padding: 30px 20px;
            overflow-y: auto;
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(20px);
        }

        .side-panel.active {
            left: 0;
        }

        .panel-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .panel-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .submit-btn {
            background: var(--accent-primary);
            color: var(--bg-primary);
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--speed-normal);
            width: 100%;
            font-size: 0.9375rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-md);
        }

        /* ========== NOTIFICATION BADGE ========== */
        .notification-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-overlay);
            border: 1px solid var(--border-accent);
            border-radius: 12px;
            padding: 16px 20px;
            max-width: 320px;
            box-shadow: var(--shadow-lg);
            z-index: 9999;
            animation: slideInRight 0.4s ease-out;
            backdrop-filter: blur(20px);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification-badge .notification-title {
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 4px;
            font-size: 0.875rem;
        }

        .notification-badge .notification-body {
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        /* ========== MEDIA QUERIES ========== */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .brand-title {
                font-size: 1.25rem;
            }

            #chat-viewport {
                padding: 20px 4%;
                gap: 20px;
            }

            .message-group {
                max-width: 92%;
            }

            .msg-bubble {
                padding: 12px 16px;
                font-size: 0.875rem;
            }

            .input-dock {
                padding: 15px 20px;
            }

            .thruster-btn {
                width: 42px;
                height: 42px;
            }

            .side-panel {
                width: 100vw;
                left: -100vw;
            }
        }

        /* ========== LOADING SPINNER ========== */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-primary);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== WOW FEATURE: Particle Effects ========== */
        .particle-burst {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent-primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-primary);
            animation: particleFloat 1s ease-out forwards;
        }

        @keyframes particleFloat {
            to {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* ========== WOW FEATURE: Smooth Scrollbar ========== */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        /* ========== WOW FEATURE: Smooth Page Transitions ========== */
        .fade-transition {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="cosmos-container">
        <div class="nebula-layer"></div>
    </div>

    <div class="ui-container fade-transition">
        <header>
            <div class="icon-btn" id="openProfileMenu" title="Profile & Settings">
                <i class="fas fa-bars"></i>
            </div>
            <div style="text-align: center; flex: 1;">
                <div class="brand-title" id="brandTitle">Philadelphia AI</div>
                <div class="header-welcome" id="headerWelcome">Premium Studio</div>
            </div>
            <div class="icon-btn" id="notificationBtn" title="Notifications">
                <i class="fas fa-bell"></i>
            </div>
        </header>

        <div id="chat-viewport" class="custom-scrollbar">
            <!-- Messages will be dynamically inserted here -->
        </div>

        <div class="input-dock" id="inputDock">
            <button class="thruster-btn" id="callBtn" title="Voice Call">
                <i class="fas fa-phone"></i>
            </button>

            <div class="capsule-input">
                <textarea id="userInput" placeholder="Type your message..." autocomplete="off"></textarea>
                <div class="main-action-buttons">
                    <label for="chatFile" title="Attach File">
                        <i class="fas fa-paperclip"></i>
                    </label>
                    <input type="file" id="chatFile" accept="*/*" multiple style="display:none">
                    <button type="button" id="toolBtn" title="AI Tools">
                        <i class="fas fa-magic"></i>
                    </button>
                </div>
            </div>

            <button class="thruster-btn" id="sendBtn" title="Send Message">
                <i class="fas fa-paper-plane"></i>
            </button>
            <button class="thruster-btn stop" id="stopBtn" title="Stop Response" style="display: none;">
                <i class="fas fa-stop"></i>
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        // ========== CORE FUNCTIONALITY ==========
        const $ = id => document.getElementById(id);
        const chatViewport = $('chat-viewport');
        const userInput = $('userInput');
        const sendBtn = $('sendBtn');
        const stopBtn = $('stopBtn');

        let isAIResponding = false;
        let currentController = null;
        let typewriterInterval = null;
        let notificationsEnabled = false;

        // ========== WOW FEATURE #1: Browser Notifications ==========
        async function requestNotificationPermission() {
            if (!("Notification" in window)) {
                showNotification('Browser does not support notifications', 'error');
                return;
            }

            const permission = await Notification.requestPermission();
            notificationsEnabled = permission === "granted";
            
            if (notificationsEnabled) {
                showNotification('Notifications enabled! You\'ll be notified when AI responds.', 'success');
            }
        }

        function sendBrowserNotification(title, body) {
            if (notificationsEnabled && document.hidden) {
                new Notification(title, {
                    body: body,
                    icon: 'https://cdn-icons-png.flaticon.com/512/4712/4712027.png',
                    badge: 'https://cdn-icons-png.flaticon.com/512/4712/4712027.png'
                });
            }
        }

        $('notificationBtn').addEventListener('click', requestNotificationPermission);

        // ========== WOW FEATURE #2: In-App Notification System ==========
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = 'notification-badge';
            notification.innerHTML = `
                <div class="notification-title">${type === 'success' ? '✓ Success' : type === 'error' ? '✗ Error' : 'ℹ Info'}</div>
                <div class="notification-body">${message}</div>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideInRight 0.4s ease-out reverse';
                setTimeout(() => notification.remove(), 400);
            }, 3000);
        }

        // ========== WOW FEATURE #3: Particle Burst Effect ==========
        function createParticleBurst(x, y) {
            const burst = document.createElement('div');
            burst.className = 'particle-burst';
            burst.style.left = x + 'px';
            burst.style.top = y + 'px';
            
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const angle = (Math.PI * 2 * i) / 12;
                const distance = 50 + Math.random() * 30;
                particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                burst.appendChild(particle);
            }
            
            document.body.appendChild(burst);
            setTimeout(() => burst.remove(), 1000);
        }

        // ========== WOW FEATURE #4: Enhanced Cosmic Background ==========
        function igniteCosmos() {
            const cosmos = $('cosmos-container');
            if (!cosmos) return;
            
            cosmos.querySelectorAll('.star').forEach(s => s.remove());
            
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
                cosmos.appendChild(star);
            }
        }

        igniteCosmos();

        // ========== WOW FEATURE #5: Smart Auto-Scroll with Smooth Animation ==========
        function scrollToBottom(smooth = true) {
            if (!chatViewport) return;
            chatViewport.scrollTo({
                top: chatViewport.scrollHeight,
                behavior: smooth ? 'smooth' : 'auto'
            });
        }

        // ========== WELCOME MESSAGE ==========
        function addWelcomeMessage() {
            const welcomeMsg = `
                <div class="message-group ai" style="animation-delay: 0.1s">
                    <div class="msg-bubble">
                        <div class="ai-content-area">
                            Welcome to Philadelphia AI Premium Studio! 🚀<br><br>
                            I'm your advanced AI assistant with enhanced capabilities:<br>
                            • Real-time thinking process visualization<br>
                            • Browser notifications for responses<br>
                            • Ultra-fast typewriter effects<br>
                            • Professional code highlighting<br>
                            • Multiple AI models to choose from<br><br>
                            How can I assist you today?
                        </div>
                        <div class="ai-msg-controls">
                            <span class="meta-text">Ready</span>
                            <button type="button" class="inline-copy-btn" title="Copy">
                                <i class="fas fa-copy"></i>
                            </button>
                            <div class="switch-model-btn" title="Switch Model">
                                <i class="fas fa-exchange-alt"></i>
                                <div class="model-switch-popup">
                                    <button data-model="gemini" class="active-model">
                                        <i class="fas fa-star"></i> Philadelphia
                                    </button>
                                    <button data-model="perplexity">
                                        <i class="fas fa-brain"></i> Seraphina
                                    </button>
                                    <button data-model="bobby">
                                        <i class="fas fa-robot"></i> Bobby
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            if (chatViewport.innerHTML.trim() === '') {
                chatViewport.innerHTML = welcomeMsg;
                hookMessageControls();
            }
        }

        addWelcomeMessage();

        // ========== MESSAGE CONTROLS ==========
        function hookMessageControls() {
            document.querySelectorAll('.inline-copy-btn').forEach(btn => {
                btn.onclick = async () => {
                    const content = btn.closest('.msg-bubble').querySelector('.ai-content-area, .user-content-area');
                    if (content) {
                        await navigator.clipboard.writeText(content.innerText);
                        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                        setTimeout(() => {
                            btn.innerHTML = '<i class="fas fa-copy"></i>';
                        }, 1500);
                    }
                };
            });
        }

        // ========== AUTO-RESIZE TEXTAREA ==========
        if (userInput) {
            const autoResize = () => {
                userInput.style.height = 'auto';
                userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
            };
            userInput.addEventListener('input', autoResize);
            autoResize();
        }

        // ========== SEND MESSAGE ==========
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isAIResponding) return;

            isAIResponding = true;
            sendBtn.style.display = 'none';
            stopBtn.style.display = 'flex';

            // Create particle burst effect
            const rect = sendBtn.getBoundingClientRect();
            createParticleBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);

            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'message-group user';
            userMsg.innerHTML = `
                <div class="msg-bubble">
                    <div class="user-content-area">${escapeHTML(text)}</div>
                </div>
            `;
            chatViewport.appendChild(userMsg);
            userInput.value = '';
            userInput.style.height = 'auto';
            scrollToBottom();

            // Add AI thinking indicator
            const aiMsg = document.createElement('div');
            aiMsg.className = 'message-group ai';
            aiMsg.innerHTML = `
                <div class="msg-bubble">
                    <div class="ai-content-area">
                        <div class="thinking-indicator">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                    <div class="ai-msg-controls" style="display: none;"></div>
                </div>
            `;
            chatViewport.appendChild(aiMsg);
            scrollToBottom();

            const contentArea = aiMsg.querySelector('.ai-content-area');
            const controlsArea = aiMsg.querySelector('.ai-msg-controls');
            const startTime = performance.now();

            // Simulate AI response with typewriter effect
            setTimeout(() => {
                const response = `Thank you for your message! This is a demo response showing the enhanced typewriter effect with ultra-fast character rendering. The system now includes:\n\n• Real-time thinking visualization\n• Browser push notifications\n• Smooth particle effects\n• Enhanced code highlighting\n• Professional dark theme\n\nYour message: "${text}"`;
                
                contentArea.innerHTML = '<span class="typewriter-cursor"></span>';
                let index = 0;
                
                typewriterInterval = setInterval(() => {
                    if (index < response.length) {
                        const char = response[index];
                        const cursor = contentArea.querySelector('.typewriter-cursor');
                        if (cursor) {
                            cursor.insertAdjacentText('beforebegin', char);
                        }
                        index++;
                        scrollToBottom(false);
                    } else {
                        clearInterval(typewriterInterval);
                        const cursor = contentArea.querySelector('.typewriter-cursor');
                        if (cursor) cursor.remove();
                        
                        const duration = ((performance.now() - startTime) / 1000).toFixed(1);
                        controlsArea.innerHTML = `
                            <span class="meta-text">${duration}s</span>
                            <button type="button" class="inline-copy-btn" title="Copy">
                                <i class="fas fa-copy"></i>
                            </button>
                            <button type="button" class="inline-regen-btn" title="Regenerate">
                                <i class="fas fa-redo"></i>
                            </button>
                            <div class="switch-model-btn" title="Switch Model">
                                <i class="fas fa-exchange-alt"></i>
                                <div class="model-switch-popup">
                                    <button data-model="gemini" class="active-model">
                                        <i class="fas fa-star"></i> Philadelphia
                                    </button>
                                    <button data-model="perplexity">
                                        <i class="fas fa-brain"></i> Seraphina
                                    </button>
                                    <button data-model="bobby">
                                        <i class="fas fa-robot"></i> Bobby
                                    </button>
                                </div>
                            </div>
                        `;
                        controlsArea.style.display = 'flex';
                        hookMessageControls();
                        
                        isAIResponding = false;
                        sendBtn.style.display = 'flex';
                        stopBtn.style.display = 'none';
                        
                        // Send browser notification
                        sendBrowserNotification('Philadelphia AI', 'Your response is ready!');
                        showNotification('AI response completed in ' + duration + 's', 'success');
                        scrollToBottom();
                    }
                }, 10); // Ultra-fast 10ms per character
            }, 1500);
        }

        function escapeHTML(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        stopBtn.addEventListener('click', () => {
            if (typewriterInterval) {
                clearInterval(typewriterInterval);
                isAIResponding = false;
                sendBtn.style.display = 'flex';
                stopBtn.style.display = 'none';
            }
        });

        // Show initial notification hint
        setTimeout(() => {
            showNotification('Click the bell icon to enable browser notifications!', 'info');
        }, 2000);

        console.log('%c🚀 Philadelphia AI Premium Studio Loaded', 'color: #00d4ff; font-size: 16px; font-weight: bold;');
    </script>
</body>
</html>
