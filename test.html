<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Philadelphia AI - Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
    <style>
        /* ==========================================================================
   PHILADELPHIA AI - OTHERWORLDLY STUDIO THEME
   ========================================================================== */

:root {
    /* Deep Space Palette */
    --space-void: #030407; /* Pitch black space */
    --space-surface: rgba(14, 18, 28, 0.65); /* Frosted dark glass */
    --space-surface-solid: #0E121C;
    --space-border: rgba(255, 255, 255, 0.07);
    --space-border-highlight: rgba(255, 255, 255, 0.15);
    
    /* Otherworldly Accents */
    --accent-cyan: #00E5FF;
    --accent-indigo: #8B5CF6;
    --accent-emerald: #10B981;
    --accent-danger: #EF4444;
    
    /* Glows & Shadows */
    --holographic-glow: 0 0 20px rgba(0, 229, 255, 0.15), inset 0 0 10px rgba(139, 92, 246, 0.05);
    --studio-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.8);
    --text-glow: 0 0 12px rgba(0, 229, 255, 0.4);

    /* Text */
    --text-primary: #F8FAFC;
    --text-secondary: #94A3B8;
    --text-tertiary: #64748B;
    
    /* Code & Formatting */
    --code-bg: #090B10;
    
    /* Call Modal */
    --call-bg: radial-gradient(circle at center, #0B0F19 0%, #030407 100%);
}

/* --- GLOBAL RESET & TYPOGRAPHY --- */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; width: 100%; height: 100%; }
body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background-color: var(--space-void);
    color: var(--text-primary);
    display: flex; justify-content: center; align-items: center;
}

/* --- COSMIC BACKGROUND ENGINE (Subtle & Deep) --- */
#cosmos-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1; overflow: hidden; background-color: var(--space-void);
}
.nebula-layer {
    position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.03), transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(0, 229, 255, 0.04), transparent 50%);
    animation: drift 150s infinite linear alternate;
}
.nebula-layer:nth-child(2) {
    background: radial-gradient(circle at 20% 80%, rgba(0, 229, 255, 0.02), transparent 70%);
    animation: drift 120s infinite linear reverse alternate;
}
@keyframes drift {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(15deg); }
}
.star {
    position: absolute; border-radius: 50%; background: #FFF;
    animation: twinkle var(--duration) infinite ease-in-out alternate;
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
}
@keyframes twinkle {
    0% { opacity: 0.1; transform: scale(0.6); }
    100% { opacity: 0.8; transform: scale(1.2); }
}
.shooting-star {
    position: absolute; height: 1px; background: linear-gradient(-90deg, #FFF, transparent);
    filter: drop-shadow(0 0 6px #FFF);
    animation: shoot var(--duration) ease-out forwards; opacity: 0;
}
@keyframes shoot {
    0% { transform: translate(var(--startX), var(--startY)) rotate(-45deg); opacity: 0; width: 0; }
    10% { opacity: 1; width: var(--initialWidth); }
    100% { transform: translate(calc(var(--startX) + var(--travelX)), calc(var(--startY) + var(--travelY))) rotate(-45deg); opacity: 0; width: 0; }
}
.cosmic-eagle {
    position: absolute; width: 120px; opacity: 0.03; filter: blur(2px);
    animation: eagleFlight 300s infinite linear; pointer-events: none; mix-blend-mode: screen;
}
@keyframes eagleFlight {
    0% { transform: translate(-20vw, 80vh) scale(0.8) rotate(15deg); opacity: 0; }
    10% { opacity: 0.05; } 90% { opacity: 0.05; }
    100% { transform: translate(120vw, 20vh) scale(1.2) rotate(-10deg); opacity: 0; }
}

/* --- UI MAIN STRUCTURE (The Studio Glass) --- */
.ui-container {
    width: 100%; height: 100%; display: flex; flex-direction: column;
    position: relative; z-index: 10; max-width: 1100px;
    background: transparent;
}
@media (min-width: 1024px) {
    .ui-container {
        height: 94vh; width: 95vw; border-radius: 20px;
        background: var(--space-surface);
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--space-border);
        box-shadow: var(--studio-shadow), inset 0 1px 0 rgba(255,255,255,0.1);
        overflow: hidden;
    }
}

/* --- HEADER --- */
header {
    padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--space-border);
    background: rgba(10, 14, 23, 0.4);
    flex-shrink: 0; z-index: 100;
}
.header-center { display: flex; flex-direction: column; align-items: center; }
.brand-plasma {
    font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 700; letter-spacing: 2px;
    color: var(--text-primary); text-shadow: 0 0 10px rgba(255,255,255,0.2);
    user-select: none; display: flex; align-items: center; gap: 10px;
}
.brand-plasma i { color: var(--accent-cyan); text-shadow: var(--text-glow); font-size: 1.1rem; }
.header-welcome { font-size: 0.8rem; color: var(--text-tertiary); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
.header-actions { display: flex; gap: 20px; }
.icon-btn { 
    background: transparent; border: 1px solid transparent; color: var(--text-secondary);
    font-size: 1.2rem; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
}
.icon-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); border-color: var(--space-border); }

/* --- CHAT VIEWPORT --- */
#chat-viewport {
    flex: 1; overflow-y: auto; padding: 30px 40px; display: flex; flex-direction: column; gap: 30px;
    scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--space-border) transparent;
}
#chat-viewport::-webkit-scrollbar { width: 6px; }
#chat-viewport::-webkit-scrollbar-thumb { background: var(--space-border); border-radius: 10px; }

.message-group { display: flex; flex-direction: column; gap: 8px; max-width: 85%; animation: slideUp 0.3s ease-out; }
@keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

.message-group.system { align-self: center; font-size: 0.85rem; color: var(--text-tertiary); letter-spacing: 0.5px; }
.message-group.user { align-self: flex-end; align-items: flex-end; }
.message-group.ai { align-self: flex-start; max-width: 90%; }

.msg-bubble {
    font-size: 1.05rem; line-height: 1.6; padding: 18px 24px;
    overflow-wrap: break-word; word-break: break-word;
}

/* User Bubble */
.user .msg-bubble {
    background: rgba(255, 255, 255, 0.03); border: 1px solid var(--space-border-highlight);
    border-radius: 20px 20px 4px 20px; color: var(--text-primary);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.user .file-attachments { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; justify-content: flex-end; }
.user .file-placeholder {
    display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px;
    background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.2);
    border-radius: 10px; font-size: 0.85rem; color: var(--accent-cyan);
}

/* AI Bubble */
.ai .msg-bubble {
    background: transparent; color: var(--text-primary); padding: 5px 0;
}
.chat-media-preview { max-width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid var(--space-border); box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: block; }

/* --- THINKING, STATUS & TYPING (The AI Brain) --- */
.status-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.2);
    padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; color: var(--accent-cyan);
    margin-bottom: 16px; font-weight: 500; letter-spacing: 0.5px;
    animation: pulseBorder 2s infinite alternate;
}
@keyframes pulseBorder { from { border-color: rgba(0, 229, 255, 0.1); } to { border-color: rgba(0, 229, 255, 0.4); box-shadow: 0 0 10px rgba(0, 229, 255, 0.1); } }

think {
    display: block; border-left: 2px solid var(--accent-indigo);
    padding: 14px 18px; margin: 15px 0 20px 0; background: linear-gradient(90deg, rgba(139, 92, 246, 0.03), transparent);
    color: var(--text-secondary); font-size: 0.95rem; border-radius: 0 12px 12px 0; line-height: 1.6;
}
think::before {
    content: "THOUGHT PROCESS"; display: flex; align-items: center; gap: 6px;
    color: var(--accent-indigo); margin-bottom: 10px; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;
}

.typewriter-cursor {
    display: inline-block; width: 6px; height: 1.1em; background: var(--accent-cyan);
    animation: cursorBlink 0.8s infinite; margin-left: 4px; vertical-align: middle; border-radius: 2px;
}
@keyframes cursorBlink { 50% { opacity: 0; } }

.thinking-indicator { display: flex; align-items: center; gap: 6px; padding: 10px 0; }
.thinking-indicator .dot {
    width: 6px; height: 6px; border-radius: 50%; background-color: var(--text-tertiary);
    animation: thinkBounce 1.2s infinite ease-in-out;
}
.thinking-indicator .dot:nth-child(2) { animation-delay: -0.8s; }
.thinking-indicator .dot:nth-child(3) { animation-delay: -0.4s; }
@keyframes thinkBounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-6px); opacity: 1; background-color: var(--accent-cyan); } }
.spinner {
    display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* --- MARKDOWN & CODE BLOCKS --- */
pre {
    background: var(--code-bg); border-radius: 12px; border: 1px solid var(--space-border);
    margin: 1.5em 0; padding: 40px 20px 20px 20px; overflow-x: auto; position: relative;
    font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
}
pre::before {
    content: attr(data-lang); position: absolute; top: 12px; left: 20px;
    color: var(--text-tertiary); font-size: 0.75rem; text-transform: uppercase; font-weight: 600; letter-spacing: 1px;
}
.copy-btn {
    position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.05);
    border: 1px solid var(--space-border); color: var(--text-secondary); padding: 4px 10px; border-radius: 6px;
    font-size: 0.75rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px;
}
.copy-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
pre.highlighted code { text-shadow: none; } /* Removed old glow for cleaner look */
a { color: var(--accent-cyan); text-decoration: none; border-bottom: 1px solid transparent; transition: 0.2s; }
a:hover { border-color: var(--accent-cyan); }

/* --- INLINE CONTROLS (Under Messages) --- */
.ai-msg-controls, .user-msg-controls { display: flex; gap: 8px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
.user-msg-controls { justify-content: flex-end; }
.inline-copy-btn, .inline-share-btn, .inline-regen-btn, .inline-edit-btn, .switch-model-btn > button {
    background: transparent; border: 1px solid var(--space-border); color: var(--text-secondary);
    padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; transition: 0.2s;
    display: inline-flex; align-items: center; gap: 6px; font-weight: 500;
}
.inline-copy-btn:hover, .inline-share-btn:hover, .inline-regen-btn:hover, .inline-edit-btn:hover, .switch-model-btn > button:hover {
    background: rgba(255,255,255,0.05); color: var(--text-primary); border-color: var(--space-border-highlight);
}
.switch-model-btn { position: relative; }
.model-switch-popup {
    display: none; position: absolute; bottom: calc(100% + 8px); right: 0; width: 220px;
    background: var(--space-surface-solid); border: 1px solid var(--space-border);
    border-radius: 12px; padding: 6px; flex-direction: column; gap: 4px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 100;
}
.switch-model-btn:hover .model-switch-popup, .model-switch-popup:hover { display: flex; animation: slideUpSmall 0.2s ease-out; }
@keyframes slideUpSmall { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.model-switch-popup button {
    background: transparent; border: none; color: var(--text-secondary); padding: 10px 14px;
    text-align: left; border-radius: 8px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; transition: 0.2s;
}
.model-switch-popup button:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
.model-switch-popup button.active-model { color: var(--accent-cyan); background: rgba(0, 229, 255, 0.05); font-weight: 600; pointer-events: none; }
.model-switch-popup button.active-model::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; margin-left: auto; }

/* --- THE STUDIO INPUT DOCK --- */
.input-dock {
    padding: 20px 40px 30px 40px; background: transparent; display: flex; gap: 15px; align-items: flex-end; flex-shrink: 0; z-index: 100;
}
.capsule-input {
    flex: 1; background: rgba(10, 14, 23, 0.7); border: 1px solid var(--space-border);
    border-radius: 20px; display: flex; align-items: center; transition: 0.3s;
    padding: 5px 10px 5px 20px; position: relative; backdrop-filter: blur(10px);
}
.capsule-input:focus-within { border-color: var(--space-border-highlight); background: rgba(14, 18, 28, 0.9); box-shadow: var(--holographic-glow); }
.capsule-input textarea {
    flex: 1; background: transparent; border: none; color: var(--text-primary);
    padding: 15px 0; font-size: 1rem; resize: none; min-height: 54px; max-height: 200px;
    outline: none; line-height: 1.5; scrollbar-width: none;
}
.capsule-input textarea::-webkit-scrollbar { display: none; }
.main-action-buttons { display: flex; gap: 4px; align-items: center; margin-left: 10px; }
.main-action-buttons button, .main-action-buttons label {
    background: transparent; border: none; color: var(--text-secondary); width: 36px; height: 36px;
    border-radius: 10px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
}
.main-action-buttons button:hover, .main-action-buttons label:hover { color: var(--text-primary); background: rgba(255,255,255,0.08); }

.thruster-btn {
    width: 50px; height: 50px; border-radius: 16px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s;
    background: var(--text-primary); color: var(--space-void);
}
.thruster-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
#callBtn { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--space-border); }
#callBtn:hover { background: rgba(255,255,255,0.1); border-color: var(--space-border-highlight); box-shadow: none; transform: none;}
#stopBtn { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); border: 1px solid rgba(239, 68, 68, 0.3); }

/* --- SIDE PANELS (Tools, Profile, Links) --- */
.panel-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px); z-index: 1200; opacity: 0; transition: opacity 0.3s ease;
}
.panel-bg.active { display: block; opacity: 1; }
.side-panel {
    position: fixed; top: 0; left: -400px; height: 100vh; width: 380px;
    background: var(--space-surface-solid); border-right: 1px solid var(--space-border);
    z-index: 1212; padding: 0; overflow-y: auto; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; flex-direction: column; box-shadow: 20px 0 50px rgba(0,0,0,0.5);
}
.side-panel.active { left: 0; }

.panel-header {
    padding: 25px 30px; border-bottom: 1px solid var(--space-border);
    text-align: center; position: relative;
}
.side-panel img { width: 64px; height: 64px; border-radius: 16px; margin-bottom: 15px; border: 1px solid var(--space-border); }
.side-panel .username { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }
.side-panel .email { font-size: 0.85rem; color: var(--text-tertiary); margin-top: 4px; }

.panel-links { padding: 20px 30px; flex: 1; }
.panel-links h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--text-tertiary); font-weight: 700; margin: 25px 0 10px 0; letter-spacing: 1px; }
.panel-links h3:first-child { margin-top: 0; }
.panel-links a, .tool-link, .side-panel .submit-btn {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    color: var(--text-secondary); text-decoration: none; border-radius: 12px;
    background: transparent; border: 1px solid transparent; transition: 0.2s; font-size: 0.95rem; font-weight: 500; cursor: pointer; width: 100%;
}
.panel-links a i, .tool-link i { color: var(--text-tertiary); width: 20px; text-align: center; transition: 0.2s; }
.panel-links a:hover, .tool-link:hover, .side-panel .submit-btn:hover {
    background: rgba(255,255,255,0.03); border-color: var(--space-border); color: var(--text-primary);
}
.panel-links a:hover i, .tool-link:hover i { color: var(--accent-cyan); }

/* Forms inside panels */
.edit-form { padding: 20px 30px; }
.edit-form label { display: block; margin: 15px 0 8px 0; font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }
.edit-form input, .edit-form textarea, .edit-form select {
    width: 100%; padding: 12px 16px; background: rgba(0,0,0,0.2); border: 1px solid var(--space-border);
    border-radius: 12px; color: var(--text-primary); font-size: 0.95rem; outline: none; transition: 0.2s;
}
.edit-form input:focus, .edit-form textarea:focus, .edit-form select:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 1px rgba(0, 229, 255, 0.2); }
.submit-btn { background: var(--text-primary); color: var(--space-void); justify-content: center; font-weight: 600; margin-top: 20px; border: none; }
.submit-btn:hover { background: #FFF; border-color: transparent; }
.status-message { font-size: 0.85rem; text-align: center; margin-top: 15px; color: var(--accent-cyan); }

#chatsList { padding: 0 20px; max-height: 250px; overflow-y: auto; }
#chatsList > div { padding: 8px 12px; border-radius: 8px; transition: 0.2s; }
#chatsList > div:hover { background: rgba(255,255,255,0.03); }
#chatsList button { background: none; border: none; cursor: pointer; color: var(--text-tertiary); font-size: 0.9rem; padding: 4px; border-radius: 4px; transition: 0.2s; }
#chatsList button:hover { color: var(--text-primary); background: rgba(255,255,255,0.1); }

/* --- FILE PREVIEWS & POPUPS --- */
.chat-controls-menu {
    position: absolute; bottom: 100px; left: 40px; background: var(--space-surface-solid);
    border: 1px solid var(--space-border); border-radius: 16px; padding: 10px; box-shadow: var(--studio-shadow);
    z-index: 101; display: none; flex-wrap: wrap; gap: 5px; max-width: 250px;
}
.chat-controls-menu.active { display: flex; animation: slideUpSmall 0.2s ease-out; }
.emoji-pick { padding: 8px; cursor: pointer; border-radius: 8px; transition: 0.2s; font-size: 1.2rem; text-align: center; width: 40px; height: 40px; }
.emoji-pick:hover { background: rgba(255,255,255,0.1); }

.file-preview-floating {
    display: none; position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
    background: var(--space-surface-solid); border: 1px solid var(--space-border); border-radius: 16px;
    padding: 15px; z-index: 1210; box-shadow: var(--studio-shadow); gap: 10px; flex-direction: column; width: calc(100% - 80px); max-width: 400px;
}
.file-preview-floating.active { display: flex; animation: slideUp 0.2s ease-out; }
.file-preview-floating > div {
    display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03);
    padding: 8px 12px; border-radius: 10px; border: 1px solid var(--space-border);
}
.file-preview-floating img, .file-preview-floating video { max-width: 40px; max-height: 40px; border-radius: 6px; object-fit: cover; }
.file-preview-floating span { flex-grow: 1; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.remove-file-btn { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); border: none; width: 28px; height: 28px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
.remove-file-btn:hover { background: var(--accent-danger); color: #FFF; }

#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
#lightbox.active { display: flex; }
#lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; border: 1px solid var(--space-border); box-shadow: var(--studio-shadow); }

#ai-image-preview, #ai-comic-preview {
    display: none; position: fixed; z-index: 1210; right: 40px; bottom: 120px;
    background: var(--space-surface-solid); padding: 20px; border-radius: 20px;
    border: 1px solid var(--space-border); box-shadow: var(--studio-shadow); max-width: 350px;
}
#ai-image-preview.active, #ai-comic-preview.active { display: block; animation: slideUpSmall 0.3s ease-out; }
#ai-image-close, #ai-comic-close { position: absolute; top: 10px; right: 10px; background: transparent; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }
#ai-image-container img, #ai-comic-container img { width: 100%; border-radius: 12px; border: 1px solid var(--space-border); }
.comic-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; font-size: 0.85rem; color: var(--text-secondary); }
.comic-nav button { background: rgba(255,255,255,0.05); border: 1px solid var(--space-border); color: var(--text-primary); padding: 6px 12px; border-radius: 8px; cursor: pointer; }

/* --- CALL MODAL (The Deep Immersion) --- */
#callModal {
    display: none; position: fixed; inset: 0; background: var(--call-bg); z-index: 4000;
    flex-direction: column; align-items: center; padding: 40px 20px; opacity: 0; transition: 0.4s ease;
}
#callModal.active { display: flex; opacity: 1; }
#callHeader { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--text-primary); letter-spacing: 2px; opacity: 0.5; }
#callConversation {
    flex-grow: 1; width: 100%; max-width: 600px; overflow-y: auto; margin: 40px 0;
    display: flex; flex-direction: column; gap: 20px; scrollbar-width: none; position: relative;
}
#callConversation::-webkit-scrollbar { display: none; }
.call-msg { font-size: 1.2rem; line-height: 1.6; padding: 15px 20px; border-radius: 16px; max-width: 85%; }
.call-msg.user { background: rgba(255,255,255,0.05); color: var(--text-primary); align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid var(--space-border); }
.call-msg.bot { background: transparent; color: var(--accent-cyan); align-self: flex-start; }
.call-msg.user.interim { opacity: 0.5; font-style: italic; border-color: transparent; }
.call-msg.status { text-align: center; color: var(--text-tertiary); font-size: 0.9rem; align-self: center; background: none; }

#botImageContainer { position: relative; margin: 20px 0; }
#botImageContainer img { width: 160px; height: 160px; border-radius: 50%; border: 2px solid var(--space-border); filter: grayscale(50%); transition: 0.3s; }
#botImageContainer.speaking img { filter: grayscale(0%); border-color: var(--accent-cyan); transform: scale(1.05); }
#botSpeakingIndicator {
    position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
    border-radius: 50%; border: 2px solid var(--accent-cyan); opacity: 0; pointer-events: none;
}
#botImageContainer.speaking #botSpeakingIndicator { animation: ripple 1.5s infinite ease-out; }
@keyframes ripple { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } }

#userSpeechWave {
    height: 60px; width: 100%; max-width: 300px; margin: 0 auto;
    background: radial-gradient(ellipse at center, rgba(0, 229, 255, 0.2) 0%, transparent 70%);
    opacity: 0; transition: 0.3s; border-radius: 50%; filter: blur(10px);
}
#userSpeechWave.active { opacity: 1; animation: breathe 1s infinite alternate; }
@keyframes breathe { from { transform: scaleX(0.8) scaleY(0.5); } to { transform: scaleX(1.2) scaleY(1); } }

#callStatusMessage { font-size: 1rem; color: var(--text-secondary); margin-top: 20px; }
#tapToTalk { font-size: 1.1rem; color: var(--text-primary); margin-top: 10px; opacity: 0.7; cursor: pointer; display: none; }

#callSettings { display: flex; gap: 15px; margin-top: auto; margin-bottom: 30px; }
#callSettings select { background: rgba(255,255,255,0.05); border: 1px solid var(--space-border); color: var(--text-primary); padding: 10px 16px; border-radius: 12px; font-size: 0.9rem; outline: none; }

#callControls { display: flex; gap: 20px; }
#muteCallBtn, #endCallBtn { padding: 16px 30px; border-radius: 20px; font-size: 1.1rem; border: none; cursor: pointer; color: #FFF; display: flex; align-items: center; gap: 10px; font-weight: 500; transition: 0.2s; }
#muteCallBtn { background: rgba(255,255,255,0.1); }
#muteCallBtn.muted { background: rgba(239, 68, 68, 0.2); color: var(--accent-danger); }
#endCallBtn { background: var(--accent-danger); }
#endCallBtn:hover { background: #DC2626; transform: translateY(-2px); }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

        // Keep your original Firebase config here
        const firebaseConfig = {
            apiKey: "AIzaSyAyROm0aBGjry6NUfhNM3e0qwPcCDoIqSk",
            authDomain: "elvionai.firebaseapp.com",
            projectId: "elvionai",
            storageBucket: "elvionai.appspot.com",
            messagingSenderId: "161078300830",
            appId: "1:161078300830:web:f460df8591704eb0e96b8f"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const $ = id => document.getElementById(id);
        const API_BASE_URL = 'https://web-production-9a18.up.railway.app';
        
        let chats = [], currentChatId = null, currentMessages =[], uploadedFiles =[], currentUser = null;
        let currentController = null;
        let isAIResponding = false;
        let currentModel = 'gemini';

        // Add extra stars
        const cosmos = $('cosmos-container');
        for(let i=0; i<80; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.top = Math.random()*100+'%';
            s.style.left = Math.random()*100+'%';
            s.style.width = s.style.height = (Math.random()*2 + 1)+'px';
            s.style.setProperty('--duration', (Math.random()*4+2)+'s');
            cosmos.appendChild(s);
        }

        // Basic UI Toggles
        window.closeToolMenu = () => { $('toolsMenu').classList.remove('active'); $('toolsMenuBg').classList.remove('active'); };
        $('toolBtn').onclick = () => { $('toolsMenuBg').classList.add('active'); $('toolsMenu').classList.add('active'); };
        $('toolsMenuBg').onclick = (e) => { if(e.target.id === 'toolsMenuBg') closeToolMenu(); };
        
        window.closeProfileMenu = () => { $('profileMenu').classList.remove('active'); $('profileMenuBg').classList.remove('active'); };
        $('openProfileMenu').onclick = () => { $('profileMenuBg').classList.add('active'); $('profileMenu').classList.add('active'); };
        $('profileMenuBg').onclick = (e) => { if(e.target.id === 'profileMenuBg') closeProfileMenu(); };

        $('toolFormBackBtn').onclick = () => {
            $('toolFormModal').classList.remove('active'); $('toolFormModalBg').classList.remove('active');
            $('toolsMenuBg').classList.add('active'); $('toolsMenu').classList.add('active');
        };

        // Textarea auto-resize
        const userInput = $('userInput');
        userInput.oninput = () => {
            userInput.style.height = '52px';
            userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
        };

        const escapeHTML = (str = '') => String(str).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
        
        // Markdown parser
        function renderMarkdown(text = '') {
            // Convert code blocks
            text = escapeHTML(text).replace(/```(\w+)?\n([\s\S]*?)```/g, (m, lang, code) => {
                return `<pre data-lang="${lang || 'code'}"><button class="copy-btn">Copy</button><code>${code}</code></pre>`;
            });
            // Convert bold/italic
            text = text.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
            // Convert Links
            text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent-cyan);">$1</a>');
            // Convert newlines
            return text.replace(/\n/g, '<br>');
        }

        function scrollToBottom() {
            setTimeout(() => { $('chat-viewport').scrollTop = $('chat-viewport').scrollHeight; }, 50);
        }

        // Welcome Message (REMOVED SERAPHINA FROM SWITCH)
        function addWelcomeMessage() {
            const html = `
                <div class="message-group ai">
                    <div class="msg-bubble">
                        Welcome to the Studio. How can I assist your creative process today?
                        <div class="ai-msg-controls">
                            <div class="switch-model-btn">
                                <button><i class="fa-solid fa-layer-group"></i> Switch Model</button>
                                <div class="model-switch-popup">
                                    <button data-model="gemini" class="${currentModel==='gemini'?'active-model':''}"><i class="fa-solid fa-sparkles"></i> Philadelphia</button>
                                    <button data-model="bobby" class="${currentModel==='bobby'?'active-model':''}"><i class="fa-solid fa-robot"></i> Bobby</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            $('chat-viewport').innerHTML = html;
            hookModelSwitchers();
        }

        function hookModelSwitchers() {
            document.querySelectorAll('.model-switch-popup button').forEach(btn => {
                btn.onclick = (e) => {
                    currentModel = e.target.dataset.model;
                    $('brandTitle').innerText = currentModel === 'gemini' ? 'Philadelphia Studio' : 'Bobby Studio';
                    document.querySelectorAll('.model-switch-popup').forEach(p => p.style.display = 'none');
                    addWelcomeMessage(); // Refresh to show active
                }
            });
        }

        // --- THE CHAT ENGINE ---
        window.sendMessage = async function() {
            const text = userInput.value.trim();
            if (!text || isAIResponding) return;
            
            isAIResponding = true;
            if (currentController) currentController.abort();
            currentController = new AbortController();

            // UI changes
            userInput.value = ''; userInput.style.height = '52px';
            $('sendBtn').style.display = 'none'; $('stopBtn').style.display = 'flex';

            // Add User message
            const userDiv = document.createElement('div');
            userDiv.className = 'message-group user';
            userDiv.innerHTML = `<div class="msg-bubble">${renderMarkdown(text)}</div>`;
            $('chat-viewport').appendChild(userDiv);

            // Add AI Placeholder
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message-group ai';
            aiDiv.innerHTML = `
                <div class="msg-bubble">
                    <div class="ai-content-area">
                        <div class="thinking-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </div>`;
            $('chat-viewport').appendChild(aiDiv);
            scrollToBottom();

            const contentArea = aiDiv.querySelector('.ai-content-area');
            let fullText = '';

            try {
                const endpoint = currentModel === 'bobby' ? `${API_BASE_URL}/api/llama/chat` : `${API_BASE_URL}/chat`;
                const payload = currentModel === 'bobby' ? { prompt: text } : { message: text, history:[] };

                const res = await fetch(endpoint, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload), signal: currentController.signal
                });

                if (!res.ok) throw new Error("Server Error");

                if (currentModel === 'bobby') {
                    const data = await res.json();
                    fullText = data.content || "No response";
                } else {
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = '';
                    let isFirstChunk = true;

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        
                        let nlIdx;
                        while ((nlIdx = buffer.indexOf('\n\n')) !== -1) {
                            const chunk = buffer.substring(0, nlIdx);
                            buffer = buffer.substring(nlIdx + 2);
                            
                            if (!chunk.startsWith('data: ')) continue;
                            const jsonStr = chunk.substring(6).trim();
                            if (jsonStr === '[DONE]') break;

                            try {
                                const data = JSON.parse(jsonStr);
                                
                                // FIX: HANDLE SEARCHING STATUS
                                if (data.type === 'status') {
                                    const ind = contentArea.querySelector('.thinking-indicator');
                                    if (ind) ind.remove();
                                    
                                    let pill = contentArea.querySelector('.status-pill');
                                    if (!pill) {
                                        pill = document.createElement('div');
                                        pill.className = 'status-pill';
                                        contentArea.prepend(pill);
                                    }
                                    pill.innerHTML = `<i class="fa-solid fa-bolt"></i> ${escapeHTML(data.content)}`;
                                }
                                
                                if (data.type === 'content' && data.content) {
                                    if (isFirstChunk) {
                                        isFirstChunk = false;
                                        contentArea.innerHTML = '<span class="typewriter-cursor"></span>';
                                    }
                                    // Remove citations for clean UI
                                    const cleanContent = data.content.replace(/\[\d+\]|\[cite:\s*\d+(,\s*\d+)*\]/g, '');
                                    fullText += cleanContent;
                                    
                                    // Render live with <think> tag support
                                    let displayHtml = renderMarkdown(fullText);
                                    // Make <think> tags look nice natively
                                    displayHtml = displayHtml.replace(/&lt;think&gt;/g, '<think>').replace(/&lt;\/think&gt;/g, '</think>');
                                    
                                    contentArea.innerHTML = displayHtml + '<span class="typewriter-cursor"></span>';
                                    scrollToBottom();
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) {
                fullText = err.name === 'AbortError' ? fullText + "\n*(Stopped)*" : `Error: ${err.message}`;
            }

            // Final Render
            let finalHtml = renderMarkdown(fullText);
            finalHtml = finalHtml.replace(/&lt;think&gt;/g, '<think>').replace(/&lt;\/think&gt;/g, '</think>');
            contentArea.innerHTML = finalHtml;
            
            // Add Controls
            const controls = document.createElement('div');
            controls.className = 'ai-msg-controls';
            controls.innerHTML = `
                <button class="inline-btn"><i class="fa-solid fa-copy"></i></button>
                <div class="switch-model-btn">
                    <button><i class="fa-solid fa-layer-group"></i> Switch</button>
                    <div class="model-switch-popup">
                        <button data-model="gemini"><i class="fa-solid fa-sparkles"></i> Philadelphia</button>
                        <button data-model="bobby"><i class="fa-solid fa-robot"></i> Bobby</button>
                    </div>
                </div>
            `;
            aiDiv.querySelector('.msg-bubble').appendChild(controls);
            hookModelSwitchers();
            
            isAIResponding = false;
            $('sendBtn').style.display = 'flex'; $('stopBtn').style.display = 'none';
        };

        $('sendBtn').onclick = sendMessage;
        $('userInput').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

        // INITIALIZE
        addWelcomeMessage();
        
        // Auth Logic (Minimal setup for UI logic)
        onAuthStateChanged(auth, user => {
            if(!user) { window.location.href = 'signup-login.html'; return; }
            currentUser = user;
            // Load chats logic here...
        });

        // Setup Tools UI (Example of binding the Visuals)
        document.querySelectorAll('.tool-link').forEach(link => {
            link.onclick = (e) => {
                e.preventDefault();
                const tool = e.target.closest('.tool-link').dataset.tool;
                
                // Show form based on tool
                $('toolsMenuBg').classList.remove('active');
                $('toolFormTitle').innerText = e.target.innerText;
                
                let formHtml = '';
                if(tool === 'image') {
                    formHtml = `
                        <label>Prompt</label><textarea placeholder="Describe image..."></textarea>
                        <button class="submit-btn" type="submit">Generate</button>
                    `;
                } else if (tool === 'website') {
                    formHtml = `
                        <label>Description</label><textarea placeholder="Describe website..."></textarea>
                        <button class="submit-btn" type="submit">Deploy</button>
                    `;
                } else {
                    formHtml = `<div style="padding:20px; color:var(--text-muted);">Feature connected to backend.</div>`;
                }
                
                $('toolForm').innerHTML = formHtml;
                $('toolFormModalBg').classList.add('active'); $('toolFormModal').classList.add('active');
            }
        });

    </script>
