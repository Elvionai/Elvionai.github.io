        // --- UTILS: ESCAPING & MARKDOWN ---
        const escapeHTML = (str = '') => String(str).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');

        function inlineMarkdown(rawText = '') {
            let s = escapeHTML(String(rawText));
            // Protect <think> tags for CSS styling
            s = s.replace(/&lt;think&gt;/gi, '<think>').replace(/&lt;\/think&gt;/gi, '</think>');
            s = s.replace(/`([^`]+?)`/g, '<code>$1</code>');
            s = s.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
            s = s.replace(/(^|[\s(])\*([^*]+?)\*(?=[\s).,!?:;]|$)/g, '$1<em>$2</em>');
            s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            return s.replace(/\n/g, '<br>');
        }

        function renderMarkdown(text = '') {
            const codeBlockRegex = /```(\w+)?\n([\s\S]*?)```/g;
            let html = ''; let lastIndex = 0;
            (text || '').replace(codeBlockRegex, (match, lang, code, offset) => {
                html += inlineMarkdown(text.slice(lastIndex, offset));
                const safeCode = escapeHTML(code);
                html += `<pre data-lang="${(lang || 'code').toLowerCase().trim()}"><button class="copy-btn"><i class='fa-solid fa-copy'></i> Copy</button><code>${safeCode}</code></pre>`;
                lastIndex = offset + match.length;
                return match;
            });
            html += inlineMarkdown(text.slice(lastIndex));
            return html;
        }

        function enhanceCodeBlocks(container) {
            if (!container) return;
            container.querySelectorAll('pre').forEach(pre => {
                const codeEl = pre.querySelector('code');
                if (window.hljs && codeEl && !pre.classList.contains('highlighted')) {
                    try { hljs.highlightElement(codeEl); pre.classList.add('highlighted'); } catch (e) {}
                }
                const btn = pre.querySelector('.copy-btn');
                if (btn && codeEl) {
                    btn.onclick = async () => {
                        try {
                            await navigator.clipboard.writeText(codeEl.innerText);
                            btn.innerHTML = "<i class='fa-solid fa-check'></i> Copied";
                            setTimeout(() => { btn.innerHTML = "<i class='fa-solid fa-copy'></i> Copy"; }, 1500);
                        } catch (e) {}
                    };
                }
            });
        }

        async function loadUserChats(userId) {
            if (chatsUnsubscribe) chatsUnsubscribe();
            const q = query(collection(db, 'users', userId, 'chats'), orderBy('createdAt', 'desc'));

                if (!currentChatId || !chats.find(c => c.id === currentChatId)) currentChatId = chats[0].id;

            });
        }

                rename.innerHTML = '<i class="fa-solid fa-pen"></i>';
                rename.onclick = async (e) => {
                    e.stopPropagation();
                    const newName = prompt("Rename project:", chat.name);
                    if (newName && newName.trim()) await setDoc(doc(db, 'users', currentUser.uid, 'chats', chat.id), { name: newName.trim() }, { merge: true });
                };

                const del = document.createElement('button');
                del.innerHTML = '<i class="fa-solid fa-trash"></i>';
                del.onclick = async (e) => {
                    e.stopPropagation();
                    if (!confirm(`Delete "${chat.name}"?`)) return;
                    const msgs = await getDocs(collection(db, 'users', currentUser.uid, 'chats', chat.id, 'messages'));
                    const batch = writeBatch(db);
                    msgs.docs.forEach(d => batch.delete(d.ref));
                    await batch.commit();
                    await deleteDoc(doc(db, 'users', currentUser.uid, 'chats', chat.id));
                    if (currentChatId === chat.id) currentChatId = null;
                };

                div.append(title, rename, del);
                list.appendChild(div);
            });
        }

        function subscribeToMessages(userId, chatId) {
            if (messagesUnsubscribe) messagesUnsubscribe();
            if (!userId || !chatId) return;
            const q = query(collection(db, 'users', userId, 'chats', chatId, 'messages'), orderBy('createdAt'));
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                if (isAIResponding) return; // Prevent DOM tearing while streaming
                currentMessages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderChatBox(currentMessages);
            });
        }

        function renderChatBox(messages) {

                    const files = (msg.files ||[]).map(f => `<div class="file-placeholder"><i class="fa-solid fa-file"></i> ${escapeHTML(f.name)}</div>`).join('');
                    div.innerHTML = `
                        <div class="msg-bubble">
                            ${files ? `<div class="file-attachments">${files}</div>` : ''}
                            ${renderMarkdown(msg.text)}
                        </div>
                        <div class="user-msg-controls">
                            <button class="inline-btn" onclick="navigator.clipboard.writeText(\`${escapeHTML(msg.text).replace(/`/g, '\\`')}\`)"><i class="fa-solid fa-copy"></i></button>
                        </div>`;
                } else {
                    // Trust HTML structure from tools, parse Markdown for regular chat
                    const isToolResult = msg.text.includes('<img') || msg.text.includes('<audio') || msg.text.includes('class="tool-result-box"');
                    const content = isToolResult ? msg.text : renderMarkdown(msg.text).replace(/&lt;think&gt;/g, '<think>').replace(/&lt;\/think&gt;/g, '</think>');
                    
                    div.innerHTML = `

        // --- MAIN CHAT ENGINE (Streaming) ---
        function resetInputUI() {
            $('sendBtn').style.display = 'flex'; $('stopBtn').style.display = 'none';
            $('callBtn').style.display = 'flex';
        }

        window.sendMessage = async function() {
            const text = userInput.value.trim();
            if ((!text && uploadedFiles.length === 0) || isAIResponding) return;
            
            isAIResponding = true;
            if (currentController) currentController.abort();
            currentController = new AbortController();

            $('sendBtn').style.display = 'none'; $('stopBtn').style.display = 'flex'; $('callBtn').style.display = 'none';
            $('stopBtn').onclick = () => { currentController.abort(); };

            // Save user msg to DB
            const fileMeta = uploadedFiles.map(f => ({ name: f.name, type: f.type }));
            await addMessageToChat('user', text, fileMeta);
            
            userInput.value = ''; userInput.style.height = '48px';
            uploadedFiles =[]; renderFilePreview();

            // Create AI Placeholder
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message-group ai';
            aiDiv.innerHTML = `<div class="msg-bubble"><div class="ai-content-area"><div class="thinking-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
            $('chat-viewport').appendChild(aiDiv);
            scrollToBottom();

            const contentArea = aiDiv.querySelector('.ai-content-area');
            let fullText = '';
            const t0 = performance.now();

            try {
                const history = currentMessages.map(m => ({ role: m.role, content: m.text || '' }));
                const endpoint = currentModel === 'bobby' ? API_ENDPOINTS.bobby : API_ENDPOINTS.gemini;
                const payload = currentModel === 'bobby' ? { prompt: text } : { message: text, history };

                const res = await fetch(endpoint, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload), signal: currentController.signal
                });

                if (!res.ok) throw new Error("Server Error");

                if (currentModel === 'bobby') {
                    const data = await res.json();
                    fullText = data.content || "No response";
                } else {
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = ''; let isFirstChunk = true;

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        
                        let nlIdx;
                        while ((nlIdx = buffer.indexOf('\n\n')) !== -1) {
                            const chunk = buffer.substring(0, nlIdx);
                            buffer = buffer.substring(nlIdx + 2);
                            
                            if (!chunk.startsWith('data: ')) continue;
                            const jsonStr = chunk.substring(6).trim();
                            if (jsonStr === '[DONE]') break;

                            try {
                                const data = JSON.parse(jsonStr);
                                
                                // STATUS PILL (Searching, scraping, etc.)
                                if (data.type === 'status') {
                                    const ind = contentArea.querySelector('.thinking-indicator');
                                    if (ind) ind.remove();
                                    let pill = contentArea.querySelector('.status-pill');
                                    if (!pill) {
                                        pill = document.createElement('div'); pill.className = 'status-pill';
                                        contentArea.prepend(pill);
                                    }
                                    pill.innerHTML = `<i class="fa-solid fa-satellite-dish"></i> ${escapeHTML(data.content)}`;
                                }
                                
                                // STREAMING CONTENT
                                if (data.type === 'content' && data.content) {
                                    if (isFirstChunk) { isFirstChunk = false; contentArea.innerHTML = '<span class="typewriter-cursor"></span>'; }
                                    const cleanContent = data.content.replace(/\[\d+\]|\[cite:\s*\d+(,\s*\d+)*\]/g, '');
                                    fullText += cleanContent;
                                    
                                    let displayHtml = renderMarkdown(fullText);
                                    displayHtml = displayHtml.replace(/&lt;think&gt;/g, '<think>').replace(/&lt;\/think&gt;/g, '</think>');
                                    contentArea.innerHTML = displayHtml + '<span class="typewriter-cursor"></span>';
                                    scrollToBottom();
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) {
                fullText += err.name === 'AbortError' ? "\n\n*(Process Terminated)*" : `\n\n❌ Connection Error: ${err.message}`;
            }

            // Finish up
            aiDiv.remove(); // Remove placeholder
            const duration = ((performance.now() - t0) / 1000).toFixed(1);
            await addMessageToChat('ai', fullText,[], duration); // Re-renders cleanly via snapshot listener
            
            isAIResponding = false;
            resetInputUI();

        function blobToBase64(blob) {
            return new Promise((res, rej) => {

                reader.onerror = rej;
                reader.readAsDataURL(blob);
            });

        async function handleVideoGeneration(payload, isImageToVideo = false) {
            displayProcessingMessage('Allocating cluster resources for render...');
            try {
                const endpoint = isImageToVideo ? '/api/tools/generate-video-from-image' : '/api/tools/generate-video-from-text';
                const options = isImageToVideo 
                    ? { method: 'POST', body: (() => { const fd = new FormData(); fd.append('prompt', payload.prompt); fd.append('file', payload.file); return fd; })(), signal: currentController?.signal }
                    : { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...payload, model: "MiniMax-Hailuo-02" }), signal: currentController?.signal };

                const startRes = await fetch(API_BASE_URL + endpoint, options);
                const startData = await startRes.json();
                if (!startRes.ok || !startData.task_id) throw new Error(startData.error || 'Task failed to start.');

                await showToolResponse(`<div class="status-pill"><i class="fa-solid fa-server"></i> Render Initialized</div>\nJob assigned: \`${startData.task_id}\`. The cluster is processing this. Please wait...`);

                const pollInterval = setInterval(async () => {
                    try {
                        if (currentController?.signal.aborted) { clearInterval(pollInterval); return; }
                        const statusRes = await fetch(`${API_BASE_URL}/api/tools/video-status?task_id=${startData.task_id}`, { signal: currentController?.signal });
                        const statusData = await statusRes.json();

                        if (statusRes.ok && statusData.url) {
                            clearInterval(pollInterval);
                            await addMessageToChat('ai', `<div class="status-pill success"><i class="fa-solid fa-check-circle"></i> Render Complete</div><br><video controls src="${statusData.url}" class="chat-media-preview"></video>`);
                        } else if (!statusRes.ok || statusData.status?.toLowerCase().includes('fail')) {
                            clearInterval(pollInterval);
                            await addMessageToChat('ai', `❌ Render failed: ${statusData.error}`);
                        }
                    } catch (e) { if (e.name === 'AbortError') clearInterval(pollInterval); }
                }, 20000);
            } catch (err) {
                if (err.name !== 'AbortError') await showToolResponse(`❌ Initializer failed: ${err.message}`);
            } finally { removeProcessingMessage(); }
        }

        // ==========================================================================
        // --- LIVE CALL MODAL ENGINE ---
        // ==========================================================================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            speechRecognition = new SpeechRecognition();
            speechRecognition.continuous = true;
            speechRecognition.interimResults = true;
            speechRecognition.lang = 'en-US';

            speechRecognition.onstart = () => {
                isRecognizing = true; userSaidSomething = false;
                if (!isMuted) {
                    $('callStatusMessage').innerHTML = '<i class="fa-solid fa-microphone-lines"></i> Listening...';
                    $('userSpeechWave').classList.add('active');
                }
            };

            speechRecognition.onresult = (event) => {
                if (!isCallActive || isMuted) return;
                let interim = ''; let final = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                if (final || interim) userSaidSomething = true;

                let msgEl = $('callConversation').querySelector('.call-msg.user.interim');
                if (!msgEl) {
                    msgEl = document.createElement('div'); msgEl.className = 'call-msg user interim';
                    const wave = $('userSpeechWave');
                    if (wave) $('callConversation').insertBefore(msgEl, wave); else $('callConversation').appendChild(msgEl);
                }
                msgEl.textContent = (final + interim).trim();
                $('callConversation').scrollTop = $('callConversation').scrollHeight;
            };

            speechRecognition.onend = () => {
                isRecognizing = false;
                $('userSpeechWave').classList.remove('active');
                if (!isCallActive || isMuted) return;

                let final = '';
                const msgEl = $('callConversation').querySelector('.call-msg.user.interim');
                if (msgEl) {
                    final = msgEl.textContent.trim();
                    msgEl.classList.remove('interim');
                    if (!final) msgEl.remove();
                }
                
                if (!botIsSpeaking && final && userSaidSomething) {
                    callHistory.push({ role: 'user', content: final });
                    handleCallBotResponse();
                } else if (isCallActive && !isMuted) {
                    try { speechRecognition.start(); } catch(e){}
                }
            };

            speechRecognition.onerror = (e) => {
                isRecognizing = false; $('userSpeechWave').classList.remove('active');
                if (e.error === 'not-allowed') { $('callStatusMessage').innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Mic access denied.'; setTimeout(endCall, 3000); }
                else if (isCallActive && !isMuted && e.error !== 'aborted') { try { speechRecognition.start(); } catch(e){} }
            };
        } else {
            $('callBtn').style.display = 'none';
        }

        function addCallMsg(role, text) {
            const div = document.createElement('div');
            div.className = `call-msg ${role}`;
            div.innerHTML = escapeHTML(text).replace(/\n/g, '<br>');
            const wave = $('userSpeechWave');
            if(wave) $('callConversation').insertBefore(div, wave); else $('callConversation').appendChild(div);
            $('callConversation').scrollTop = $('callConversation').scrollHeight;
        }

        async function handleCallBotResponse() {
            if (!isCallActive) return;
            $('callStatusMessage').innerHTML = '<i class="fa-solid fa-microchip"></i> Processing semantics...';
            $('tapToTalk').style.display = 'none';
            if (isRecognizing) try { speechRecognition.stop(); } catch(e){}
            
            try {
                const reqHistory = callHistory.map(m => ({ role: m.role, content: m.content }));
                const res = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: reqHistory.at(-1).content, history: reqHistory.slice(0, -1), call_context: true })
                });
                if (!res.ok) throw new Error("Server error");
                
                const reader = res.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let fullText = ''; let buffer = '';
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    let nlIdx;
                    while ((nlIdx = buffer.indexOf('\n\n')) !== -1) {
                        const chunk = buffer.substring(0, nlIdx);
                        buffer = buffer.substring(nlIdx + 2);
                        if (chunk.startsWith('data: ')) {
                            const jsonStr = chunk.substring(6).trim();
                            if (jsonStr === '[DONE]') break;
                            try {
                                const data = JSON.parse(jsonStr);
                                if (data.type === 'content') fullText += data.content.replace(/\[\d+\]|\[cite:\s*\d+(,\s*\d+)*\]/g, '');
                            } catch(e){}
                        }
                    }
                }
                const finalText = fullText.trim() || "I'm sorry, I couldn't process that.";
                callHistory.push({ role: 'ai', content: finalText });
                addCallMsg('bot', finalText);
                speakBotResponse(finalText);
            } catch (err) {
                addCallMsg('bot', `❌ Error: ${err.message}`);
                $('callStatusMessage').innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Error. Tap to reset.';
                $('tapToTalk').style.display = 'block';
            }
        }

        async function speakBotResponse(text) {
            if (!isCallActive) return;
            botIsSpeaking = true;
            $('botImageContainer').classList.add('speaking');
            $('callStatusMessage').innerHTML = '<i class="fa-solid fa-volume-high"></i> Synthesizing audio...';
            
            try {
                const p = $('callVoiceModel').value;
                const v = $('callVoiceStyle').value;
                let res;
                if (p === 'gemini') {
                    const fd = new FormData(); fd.append('text', text); fd.append('style', v);
                    res = await fetch(`${API_BASE_URL}/voicegen`, { method: 'POST', body: fd });
                } else {
                    res = await fetch(`${API_BASE_URL}/api/tools/text-to-speech`, {
                        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text, voice_id: v})
                    });
                }
                if (!res.ok) throw new Error("Audio generation failed");
                const url = URL.createObjectURL(await res.blob());
                
                currentAudio = new Audio(url);
                currentAudio.onplay = () => $('callStatusMessage').innerHTML = '<i class="fa-solid fa-wave-square"></i> Transmitting...';
                currentAudio.onended = () => {
                    botIsSpeaking = false;
                    $('botImageContainer').classList.remove('speaking');
                    URL.revokeObjectURL(url);
                    if (isCallActive && !isMuted) {
                        $('callStatusMessage').innerHTML = '<i class="fa-solid fa-satellite-dish"></i> Standing by...';
                        $('tapToTalk').style.display = 'block';
                        if (!isRecognizing) try { speechRecognition.start(); } catch(e){}
                    }
                };
                currentAudio.play();
            } catch (err) {
                botIsSpeaking = false; $('botImageContainer').classList.remove('speaking');
                if (isCallActive && !isMuted) {
                    $('callStatusMessage').innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Audio offline. Tap to speak.';
                    $('tapToTalk').style.display = 'block';
                    if (!isRecognizing) try { speechRecognition.start(); } catch(e){}
                }
            }
        }

        function endCall() {
            isCallActive = false; botIsSpeaking = false;
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            if (isRecognizing) try { speechRecognition.abort(); } catch(e){}
            $('callModal').classList.remove('active');
            $('botImageContainer').classList.remove('speaking');
            $('userSpeechWave').classList.remove('active');
        }

        $('callBtn').onclick = () => {
            if (!SpeechRecognition) { alert("Browser not supported for voice."); return; }
            isCallActive = true; isMuted = false;
            $('muteCallBtn').classList.remove('muted'); $('muteCallBtn').innerHTML = '<i class="fa-solid fa-microphone"></i> Mute';
            $('callModal').classList.add('active');
            $('callConversation').innerHTML = `<div class="call-msg status">Initializing secure connection...</div><div id="userSpeechWave"></div>`;
            $('callStatusMessage').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Linking to server...';
            $('tapToTalk').style.display = 'none';
            callHistory =[];
            
            setTimeout(() => {
                if (!isCallActive) return;
                addCallMsg('status', 'Uplink established. You may speak.');
                $('callStatusMessage').innerHTML = '<i class="fa-solid fa-satellite-dish"></i> Standing by...';
                $('tapToTalk').style.display = 'block';
                if (!isMuted && !isRecognizing) try { speechRecognition.start(); } catch(e){}
            }, 1500);
        };

        $('endCallBtn').onclick = endCall;
        $('muteCallBtn').onclick = (e) => {
            e.stopPropagation();
            isMuted = !isMuted;
            if (isMuted) {
                $('muteCallBtn').classList.add('muted'); $('muteCallBtn').innerHTML = '<i class="fa-solid fa-microphone-slash"></i> Unmute';
                if (isRecognizing) try { speechRecognition.stop(); } catch(e){}
                $('callStatusMessage').innerHTML = '<i class="fa-solid fa-microphone-slash"></i> Audio Muted.';
                $('userSpeechWave').classList.remove('active');
            } else {
                $('muteCallBtn').classList.remove('muted'); $('muteCallBtn').innerHTML = '<i class="fa-solid fa-microphone"></i> Mute';
                if (isCallActive && !botIsSpeaking) {
                    $('callStatusMessage').innerHTML = '<i class="fa-solid fa-satellite-dish"></i> Standing by...';
                    if (!isRecognizing) try { speechRecognition.start(); } catch(e){}
                }
            }
        };

        $('callModal').onclick = (e) => {
            if(!e.target.closest('#callControls') && !e.target.closest('#callSettings')) {
                if (!isCallActive) return;
                if (currentAudio) { currentAudio.pause(); currentAudio = null; }
                botIsSpeaking = false; $('botImageContainer').classList.remove('speaking');
                const interim = $('callConversation').querySelector('.call-msg.user.interim');
                if(interim) interim.remove();
                if (!isMuted) {
                    $('callStatusMessage').innerHTML = '<i class="fa-solid fa-microphone-lines"></i> Listening...';
                    $('tapToTalk').style.display = 'none';
                    if (!isRecognizing) try { speechRecognition.start(); } catch(e){}
                }
            }
        };

        const voices = {
            gemini:["podcast", "cinematic", "upbeat", "soft", "dramatic"],
            minimax:["anime", "movie", "narrator", "knight", "elder", "sweet", "casual", "ceo", "hero", "elegant"]
        };
        $('callVoiceModel').onchange = () => {
            $('callVoiceStyle').innerHTML = voices[$('callVoiceModel').value].map(v => `<option value="${v}">${v.charAt(0).toUpperCase() + v.slice(1)}</option>`).join('');
            selectedCallVoiceProvider = $('callVoiceModel').value;
            selectedCallVoiceId = $('callVoiceStyle').value;
        };
        $('callVoiceStyle').onchange = () => selectedCallVoiceId = $('callVoiceStyle').value;
        $('callVoiceModel').dispatchEvent(new Event('change'));

    </script>
</body>
</html>
