<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enroll | Elvion Learning</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign up or log in to enroll at Elvion Learning. Secure, private, and user-friendly onboarding.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --font-brand: 'Playfair Display', serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
      --font-futuristic: 'Orbitron', sans-serif;
      
      --bg-deep: #050505;
      --bg-space: #0a0a08;
      --bg-card: rgba(15, 15, 12, 0.95);
      
      --text: #efefef;
      --muted: #888888;
      
      --accent: #c9a96e;
      --accent-soft: #e8d5b0;
      --danger: #e05a5a;
      --success: #5fb87a;
      --warning: #f59e0b;
      
      --border-glow: 0 0 15px rgba(201, 169, 110, 0.2), 0 0 30px rgba(232, 213, 176, 0.1);
      --hover-glow: 0 0 20px rgba(201, 169, 110, 0.4), 0 0 40px rgba(232, 213, 176, 0.2);
      --gradient-gold: linear-gradient(135deg, #c9a96e 0%, #e8d5b0 50%, #af8f50 100%);
      
      --radius: 16px;
    }

    html, body { height: 100%; margin: 0; }
    
    body {
      min-height: 100vh;
      font-family: var(--font-body);
      background: radial-gradient(circle at center, #11110f 0%, #050505 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient Gold Snow Canvas */
    #snow-canvas {
      position: fixed;
      width: 100vw;
      height: 100vh;
      top: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.7;
    }

    /* Auth Card Container */
    .auth-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid rgba(201, 169, 110, 0.15);
      box-shadow: var(--border-glow);
      padding: 32px 28px;
      width: 100%;
      max-width: 400px;
      z-index: 1;
      animation: fadeIn 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
      backdrop-filter: blur(10px);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header & Branding */
    .header { text-align: center; margin-bottom: 24px; }
    
    .logo-img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 12px auto;
      border: 2px solid var(--accent);
      animation: logoPulse 3s infinite alternate, floatLogo 3.4s infinite alternate;
    }
    
    @keyframes logoPulse {
      0% { box-shadow: 0 0 10px rgba(201, 169, 110, 0.3); }
      100% { box-shadow: 0 0 25px rgba(232, 213, 176, 0.6); }
    }
    
    @keyframes floatLogo {
      0% { transform: translateY(0); }
      100% { transform: translateY(-5px); }
    }
    
    .site-heading {
      font-family: var(--font-brand);
      font-size: 1.6em;
      font-weight: 800;
      background: var(--gradient-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      letter-spacing: 0.5px;
    }
    
    .subtitle {
      color: var(--text-secondary);
      font-size: 0.85em;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(201, 169, 110, 0.1);
      border-radius: 12px;
      margin-bottom: 24px;
      padding: 5px;
    }
    
    .auth-tab {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.9em;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .auth-tab.active {
      background: var(--gradient-gold);
      color: #050505;
      box-shadow: 0 2px 10px rgba(201, 169, 110, 0.3);
    }

    /* Forms */
    .form-section { width: 100%; }
    form { display: flex; flex-direction: column; gap: 16px; }
    
    .input-group { display: flex; flex-direction: column; text-align: left; }
    
    label {
      font-size: 0.8em;
      color: var(--accent-soft);
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid rgba(201, 169, 110, 0.2);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text);
      font-size: 0.95em;
      font-family: var(--font-body);
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(201, 169, 110, 0.3);
      background: rgba(0, 0, 0, 0.6);
    }
    
    input::placeholder { color: #555; }

    /* Buttons */
    .submit-btn {
      width: 100%;
      background: var(--gradient-gold);
      color: #050505;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95em;
      font-family: var(--font-body);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(201, 169, 110, 0.2);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 5px;
    }
    
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(201, 169, 110, 0.4);
    }
    
    .submit-btn:disabled {
      background: #333;
      color: #777;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* OAuth Buttons */
    .oauth-btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      padding: 11px 0;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.9em;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .oauth-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(201, 169, 110, 0.3);
      color: var(--accent-soft);
    }
    
    .oauth-btn i { font-size: 1.2em; }
    .fa-google { color: #DB4437; }
    .fa-twitter { color: #1DA1F2; }

    /* Links & Status */
    .form-links { text-align: right; margin-top: -6px; }
    .form-links span { color: var(--accent); text-decoration: none; cursor: pointer; font-size: 0.85em; }
    .form-links span:hover { text-decoration: underline; color: var(--accent-soft); }

    .terms-note { color: var(--muted); font-size: 0.75em; margin-top: 15px; text-align: center; line-height: 1.5; }
    .terms-note a { color: var(--accent); text-decoration: none; }
    .terms-note a:hover { text-decoration: underline; }

    .status-message {
      font-size: 0.85em;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
      font-weight: 500;
    }
    
    /* Responsive Adjustments */
    @media (max-width: 430px) {
      .auth-card { padding: 24px 20px; }
      .site-heading { font-size: 1.4em; }
    }
  </style>
</head>
<body>

<canvas id="snow-canvas"></canvas>

<div class="auth-card">
  <div class="header">
    <img src="https://i.postimg.cc/PqVhDskJ/file-00000000c7646246889393752cff8df2.png" class="logo-img" alt="Elvion Learning Logo">
    <h1 class="site-heading">Elvion Learning</h1>
    <p class="subtitle">Sign up or log in for instant access.</p>
  </div>
  
  <div class="auth-tabs">
    <button class="auth-tab active" id="signupTab">Sign Up</button>
    <button class="auth-tab" id="loginTab">Log In</button>
  </div>
  
  <section class="form-section">
    <!-- Sign Up Form -->
    <form id="signupForm" autocomplete="off">
      <button class="oauth-btn" id="googleSignUp" type="button"><i class="fab fa-google"></i>Sign Up with Google</button>
      <button class="oauth-btn" id="twitterSignUp" type="button"><i class="fab fa-twitter"></i>Sign Up with Twitter</button>
      
      <div style="text-align: center; color: var(--muted); font-size: 0.85em; margin: 4px 0; position: relative;">
        <span style="background: var(--bg-card); padding: 0 10px; position: relative; z-index: 1;">or</span>
        <div style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(201,169,110,0.15); z-index: 0;"></div>
      </div>

      <div class="input-group">
        <label for="signup-name">Full Name</label>
        <input type="text" id="signup-name" placeholder="Your name" required>
      </div>
      <div class="input-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="Email address" required>
      </div>
      <div class="input-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="Min. 6 characters" required minlength="6">
      </div>
      <button type="submit" class="submit-btn">Create Account</button>
      
      <div class="status-message" id="signupStatus"></div>
      <div class="terms-note">
        By signing up, you agree to our <a href="terms.html" target="_blank">Terms</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>.
      </div>
    </form>
    
    <!-- Log In Form (initially hidden) -->
    <form id="loginForm" style="display:none;" autocomplete="off">
      <button class="oauth-btn" id="googleLogin" type="button"><i class="fab fa-google"></i>Log In with Google</button>
      <button class="oauth-btn" id="twitterLogin" type="button"><i class="fab fa-twitter"></i>Log In with Twitter</button>
      
      <div style="text-align: center; color: var(--muted); font-size: 0.85em; margin: 4px 0; position: relative;">
        <span style="background: var(--bg-card); padding: 0 10px; position: relative; z-index: 1;">or</span>
        <div style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(201,169,110,0.15); z-index: 0;"></div>
      </div>

      <div class="input-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="Email address" required>
      </div>
      <div class="input-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Password" required>
      </div>
      <div class="form-links">
        <span id="forgotPassword">Forgot password?</span>
      </div>
      <button type="submit" class="submit-btn">Log In</button>
      
      <div class="status-message" id="loginStatus"></div>
      <div class="terms-note" style="margin-bottom:0;">
        By continuing, you accept our <a href="terms.html" target="_blank">Terms of Service</a>.
      </div>
    </form>
  </section>
</div>

<script type="module">
  // Ambient Background Animation (Falling Gold Snow)
  document.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById("snow-canvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let flakes = [];
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      flakes = [];
      for (let i = 0; i < 70; i++) {
        flakes.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 2 + 0.5,
          speed: Math.random() * 1.2 + 0.3,
          wind: Math.random() * 0.4 - 0.2,
          opacity: Math.random() * 0.5 + 0.1
        });
      }
    }
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      flakes.forEach(f => {
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201, 169, 110, ${f.opacity})`;
        ctx.shadowBlur = 6;
        ctx.shadowColor = "rgba(201, 169, 110, 0.4)";
        ctx.fill();
        f.y += f.speed;
        f.x += f.wind;
        if (f.y > canvas.height) { f.y = -5; f.x = Math.random() * canvas.width; }
        if (f.x < 0) f.x = canvas.width;
        if (f.x > canvas.width) f.x = 0;
      });
      requestAnimationFrame(draw);
    }
    resize();
    window.addEventListener("resize", resize);
    draw();
  });

  // TAB SWITCHER
  const signupTab = document.getElementById('signupTab');
  const loginTab = document.getElementById('loginTab');
  const signupForm = document.getElementById('signupForm');
  const loginForm = document.getElementById('loginForm');
  
  signupTab.onclick = function() {
    signupTab.classList.add('active'); loginTab.classList.remove('active');
    signupForm.style.display = 'flex'; loginForm.style.display = 'none';
  };
  loginTab.onclick = function() {
    signupTab.classList.remove('active'); loginTab.classList.add('active');
    signupForm.style.display = 'none'; loginForm.style.display = 'flex';
  };

  // FIREBASE AUTH
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signInWithPopup,
    sendEmailVerification,
    sendPasswordResetEmail,
    GoogleAuthProvider,
    TwitterAuthProvider,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAyROm0aBGjry6NUfhNM3e0qwPcCDoIqSk",
    authDomain: "elvionai.firebaseapp.com",
    projectId: "elvionai",
    storageBucket: "elvionai.firebasestorage.app",
    messagingSenderId: "161078300830",
    appId: "1:161078300830:web:f460df8591704eb0e96b8f"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // OAUTH HELPERS
  async function handleOAuth(provider, statusDiv) {
    try {
      const result = await signInWithPopup(auth, provider);
      if (result.user) {
        await setDoc(doc(db, "users", result.user.uid), {
          name: result.user.displayName,
          email: result.user.email,
          createdAt: new Date()
        }, { merge: true });
      }
      window.location.href = "studyingatelvion.html";
    } catch (error) {
      if (error.code !== 'auth/popup-closed-by-user') {
          statusDiv.textContent = error.message;
          statusDiv.style.color = "var(--danger)";
      }
    }
  }
  document.getElementById('googleSignUp').onclick = (e) => { e.preventDefault(); handleOAuth(new GoogleAuthProvider(), document.getElementById('signupStatus')); };
  document.getElementById('googleLogin').onclick = (e) => { e.preventDefault(); handleOAuth(new GoogleAuthProvider(), document.getElementById('loginStatus')); };
  document.getElementById('twitterSignUp').onclick = (e) => { e.preventDefault(); handleOAuth(new TwitterAuthProvider(), document.getElementById('signupStatus')); };
  document.getElementById('twitterLogin').onclick = (e) => { e.preventDefault(); handleOAuth(new TwitterAuthProvider(), document.getElementById('loginStatus')); };

  // EMAIL/PASSWORD SIGNUP
  signupForm.onsubmit = async function(e) {
    e.preventDefault();
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const status = document.getElementById('signupStatus');
    status.textContent = 'Creating account...';
    status.style.color = "var(--accent)";
    
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(userCredential.user, { displayName: name });
      await setDoc(doc(db, "users", userCredential.user.uid), {
        name,
        email,
        createdAt: new Date()
      }, { merge: true });
      await sendEmailVerification(userCredential.user, { url: window.location.origin });
      
      status.textContent = "Account created! Please check your email to verify before logging in.";
      status.style.color = "var(--success)";
      
      setTimeout(() => {
        signupTab.classList.remove('active');
        loginTab.classList.add('active');
        signupForm.style.display = 'none';
        loginForm.style.display = 'flex';
        status.textContent = '';
      }, 4000);
    } catch (error) {
      status.textContent = error.message;
      status.style.color = "var(--danger)";
    }
  };

  // EMAIL/PASSWORD LOGIN
  loginForm.onsubmit = function(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const status = document.getElementById('loginStatus');
    status.textContent = 'Logging in...';
    status.style.color = "var(--accent)";
    
    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {
        if (!userCredential.user.emailVerified) {
             status.textContent = 'Please verify your email before logging in. Check your inbox.';
             status.style.color = 'var(--warning)';
        } else {
             window.location.href = 'studyingatelvion.html';
        }
      }).catch((error) => {
        status.textContent = error.message;
        status.style.color = "var(--danger)";
      });
  };

  // FORGOT PASSWORD
  document.getElementById('forgotPassword').onclick = function() {
    const email = document.getElementById('login-email').value;
    const status = document.getElementById('loginStatus');
    if (!email) {
      status.textContent = 'Please enter your email above first.';
      status.style.color = "var(--warning)";
      return;
    }
    status.textContent = 'Sending reset link...';
    status.style.color = "var(--accent)";
    
    sendPasswordResetEmail(auth, email)
      .then(() => {
        status.textContent = 'Password reset email sent!';
        status.style.color = "var(--success)";
      })
      .catch((error) => {
        status.textContent = error.message;
        status.style.color = "var(--danger)";
      });
  };
</script>
</body>
</html>
