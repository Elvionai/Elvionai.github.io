<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Philadelphia AI - Studio Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
    <style>
        /* ==========================================================================
           PROFESSIONAL STUDIO THEME (Elegant Dark Mode)
           ========================================================================== */
        :root {
            /* Base Colors - Refined Slate/Onyx */
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --bg-surface-hover: #27272a;
            --bg-panel: rgba(24, 24, 27, 0.85);
            
            /* Borders & Dividers */
            --border-light: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(255, 255, 255, 0.2);
            
            /* Text Colors */
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            
            /* Accents */
            --accent-cyan: #06b6d4;
            --accent-glow: rgba(6, 182, 212, 0.4);
            --accent-danger: #ef4444;
            --accent-success: #10b981;
            
            /* Message Bubbles */
            --msg-user-bg: #27272a;
            --msg-ai-bg: transparent;
            
            /* Code */
            --code-bg: #0d0d0f;
            
            /* Animations */
            --transition-smooth: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --transition-fast: 0.15s ease-out;
        }

        /* --- GLOBAL RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; width: 100%; overflow: hidden; background-color: var(--bg-base); color: var(--text-primary); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        /* --- SUBTLE AMBIENT GLOW --- */
        .ambient-glow {
            position: fixed; top: -20%; left: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            opacity: 0.15; filter: blur(80px); z-index: 0; pointer-events: none;
        }
        .ambient-glow.bottom { top: auto; bottom: -20%; left: auto; right: -10%; background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, transparent 70%); }

        /* --- MAIN UI CONTAINER --- */
        .ui-container {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            position: relative; z-index: 10; max-width: 1200px; margin: 0 auto;
        }
        @media (min-width: 1024px) {
            .ui-container { height: 96vh; margin-top: 2vh; border-radius: 16px; border: 1px solid var(--border-light); background: var(--bg-base); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow: hidden; }
        }

        /* --- HEADER --- */
        header {
            padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(9, 9, 11, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light); z-index: 100;
        }
        .brand-title { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .brand-title i { color: var(--accent-cyan); font-size: 0.9em; }
        .header-actions { display: flex; gap: 16px; }
        .icon-btn { background: transparent; border: none; color: var(--text-secondary); font-size: 1.1rem; cursor: pointer; transition: var(--transition-fast); padding: 8px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { color: var(--text-primary); background: var(--bg-surface-hover); }

        /* --- CHAT VIEWPORT --- */
        #chat-viewport {
            flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px;
            scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--border-focus) transparent;
        }
        #chat-viewport::-webkit-scrollbar { width: 6px; }
        #chat-viewport::-webkit-scrollbar-thumb { background: var(--border-focus); border-radius: 10px; }

        .message-group { display: flex; flex-direction: column; gap: 8px; max-width: 85%; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .message-group.ai { align-self: flex-start; max-width: 90%; }
        .message-group.user { align-self: flex-end; align-items: flex-end; }

        .msg-bubble { font-size: 0.95rem; line-height: 1.6; overflow-wrap: break-word; color: var(--text-primary); }

        /* User Bubble */
        .user .msg-bubble { background: var(--msg-user-bg); padding: 12px 18px; border-radius: 16px 16px 4px 16px; border: 1px solid var(--border-light); }
        
        /* AI Bubble */
        .ai .msg-bubble { background: var(--msg-ai-bg); padding: 4px 0; }

        /* Links & Formatting */
        a { color: var(--accent-cyan); text-decoration: none; transition: var(--transition-fast); }
        a:hover { text-decoration: underline; }
        strong { font-weight: 600; color: #fff; }

        /* --- THE "THINKING" BLOCK --- */
        think {
            display: block; border-left: 2px solid var(--border-focus); padding: 12px 16px; margin: 16px 0;
            background: rgba(255, 255, 255, 0.02); color: var(--text-secondary); font-size: 0.9rem;
            border-radius: 0 8px 8px 0; line-height: 1.5; font-style: italic;
        }
        think::before {
            content: "\f0eb  Thought Process"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            display: block; color: var(--text-muted); margin-bottom: 8px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; font-style: normal;
        }

        /* --- TYPEWRITER & TIMERS --- */
        .typewriter-cursor {
            display: inline-block; width: 6px; height: 1.1em; background: var(--accent-cyan);
            animation: blink 0.8s infinite; margin-left: 4px; vertical-align: middle; border-radius: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .processing-indicator { display: flex; align-items: center; gap: 8px; color: var(--accent-cyan); font-size: 0.85rem; font-weight: 500; }
        .spinner { width: 14px; height: 14px; border: 2px solid rgba(6, 182, 212, 0.3); border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- CODE BLOCKS (macOS style) --- */
        pre {
            background: var(--code-bg); border-radius: 12px; border: 1px solid var(--border-light); margin: 16px 0;
            padding: 36px 16px 16px 16px; overflow-x: auto; position: relative; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        pre::before {
            content: attr(data-lang); position: absolute; top: 10px; left: 16px;
            color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px;
        }
        .copy-code-btn {
            position: absolute; top: 6px; right: 8px; background: transparent; border: 1px solid var(--border-light);
            color: var(--text-secondary); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; transition: var(--transition-fast);
        }
        .copy-code-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); }

        /* --- CONTROLS --- */
        .msg-controls { display: flex; gap: 6px; margin-top: 8px; align-items: center; opacity: 0; transition: var(--transition-smooth); }
        .message-group:hover .msg-controls { opacity: 1; }
        .user .msg-controls { justify-content: flex-end; }
        
        .control-btn { background: transparent; border: 1px solid var(--border-light); color: var(--text-secondary); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: var(--transition-fast); display: inline-flex; align-items: center; gap: 6px; }
        .control-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
        .timer-text { font-size: 0.75rem; color: var(--text-muted); margin-right: auto; font-family: 'JetBrains Mono', monospace; }

        /* --- DOCK & INPUT --- */
        .input-dock {
            padding: 16px 32px 24px 32px; background: linear-gradient(to top, var(--bg-base) 60%, transparent);
            position: relative; z-index: 100;
        }
        .input-wrapper {
            background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: 20px;
            display: flex; flex-direction: column; transition: var(--transition-smooth); padding: 4px 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .input-wrapper:focus-within { border-color: var(--border-focus); box-shadow: 0 4px 25px rgba(0,0,0,0.4); }
        
        .input-wrapper textarea {
            width: 100%; background: transparent; border: none; color: var(--text-primary); padding: 12px 0;
            font-size: 0.95rem; resize: none; min-height: 48px; max-height: 200px; outline: none; line-height: 1.5; font-family: inherit;
        }
        .input-wrapper textarea::-webkit-scrollbar { display: none; }
        
        .dock-toolbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; }
        .toolbar-group { display: flex; gap: 4px; }
        
        .action-btn {
            background: transparent; border: none; color: var(--text-secondary); width: 32px; height: 32px;
            border-radius: 8px; cursor: pointer; transition: var(--transition-fast); display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }
        .action-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
        
        .send-btn {
            background: var(--text-primary); color: var(--bg-base); border: none; width: 32px; height: 32px;
            border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: var(--transition-fast); font-size: 0.9rem;
        }
        .send-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,255,255,0.1); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .send-btn.stop-btn { background: var(--accent-danger); color: white; }

        /* Media Previews inside Chat */
        .chat-media { max-width: 100%; border-radius: 12px; margin-top: 12px; border: 1px solid var(--border-light); }

        /* --- SIDE PANELS --- */
        .panel-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 1000; opacity: 0; pointer-events: none; transition: var(--transition-smooth);
        }
        .panel-overlay.active { opacity: 1; pointer-events: auto; }
        
        .side-panel {
            position: fixed; top: 0; right: -350px; width: 320px; height: 100vh; background: var(--bg-panel);
            border-left: 1px solid var(--border-light); z-index: 1001; transition: var(--transition-smooth);
            display: flex; flex-direction: column; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .side-panel.active { right: 0; }
        .side-panel.left { right: auto; left: -350px; border-left: none; border-right: 1px solid var(--border-light); }
        .side-panel.left.active { left: 0; }
        
        .panel-header { padding: 20px 24px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { font-size: 1rem; font-weight: 600; }
        .panel-content { padding: 24px; flex: 1; overflow-y: auto; }

        /* Panel Links / Tool Buttons */
        .panel-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-secondary);
            text-decoration: none; border-radius: 10px; transition: var(--transition-fast); font-size: 0.9rem; font-weight: 500; cursor: pointer; border: 1px solid transparent; margin-bottom: 8px;
        }
        .panel-link i { font-size: 1.1rem; width: 20px; text-align: center; }
        .panel-link:hover { background: var(--bg-surface-hover); color: var(--text-primary); border-color: var(--border-light); }
        .section-title { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; letter-spacing: 1px; margin: 24px 0 8px 4px; }

        /* Forms in Panels */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
        .form-control {
            width: 100%; background: var(--bg-base); border: 1px solid var(--border-light); color: var(--text-primary);
            padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; outline: none; transition: var(--transition-fast); font-family: inherit;
        }
        .form-control:focus { border-color: var(--border-focus); box-shadow: 0 0 0 1px rgba(255,255,255,0.05); }
        textarea.form-control { resize: vertical; min-height: 80px; }
        
        .btn-primary {
            width: 100%; background: var(--text-primary); color: var(--bg-base); border: none; padding: 12px;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: var(--transition-fast); font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,255,255,0.1); }

        /* Notification Toast */
        #toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: var(--accent-success); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; transition: var(--transition-smooth); z-index: 2000; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        #toast.show { bottom: 20px; }

        /* Responsive */
        @media (max-width: 768px) {
            header { padding: 12px 16px; }
            #chat-viewport { padding: 20px 16px; }
            .message-group { max-width: 95%; }
            .msg-bubble { font-size: 0.9rem; }
            .input-dock { padding: 12px 16px 16px 16px; }
            .side-panel { width: 85vw; }
            .msg-controls { opacity: 1; } /* Always show controls on mobile */
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow bottom"></div>

    <div class="ui-container">
        <header>
            <button class="icon-btn" id="btn-profile" title="Menu"><i class="fa-solid fa-bars-staggered"></i></button>
            <div class="brand-title"><i class="fa-solid fa-layer-group"></i> Studio Dashboard</div>
            <button class="icon-btn" id="btn-tools" title="Tools"><i class="fa-solid fa-screwdriver-wrench"></i></button>
        </header>

        <div id="chat-viewport">
            </div>

        <div class="input-dock">
            <div class="input-wrapper">
                <textarea id="chat-input" placeholder="Type a command or query..." rows="1"></textarea>
                <div class="dock-toolbar">
                    <div class="toolbar-group">
                        <label for="file-upload" class="action-btn" title="Attach File"><i class="fa-solid fa-paperclip"></i></label>
                        <input type="file" id="file-upload" style="display: none;" multiple>
                        <button class="action-btn" id="btn-model" title="Switch Model"><i class="fa-solid fa-microchip"></i></button>
                    </div>
                    <button class="send-btn" id="btn-send"><i class="fa-solid fa-arrow-up"></i></button>
                    <button class="send-btn stop-btn" id="btn-stop" style="display: none;"><i class="fa-solid fa-square"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="panel-overlay" id="overlay"></div>

    <aside class="side-panel left" id="panel-profile">
        <div class="panel-header">
            <h2>Workspace</h2>
            <button class="icon-btn close-panel"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="panel-content">
            <button class="btn-primary" id="btn-new-chat" style="margin-bottom: 24px; background: var(--bg-surface-hover); color: var(--text-primary); border: 1px solid var(--border-light);"><i class="fa-solid fa-plus"></i> New Project</button>
            
            <div class="section-title">Recent History</div>
            <div id="history-list" style="display: flex; flex-direction: column; gap: 8px;">
                <div style="font-size: 0.8rem; color: var(--text-muted); font-style: italic;">No history yet.</div>
            </div>
        </div>
    </aside>

    <aside class="side-panel" id="panel-tools">
        <div class="panel-header">
            <h2>Creative Suite</h2>
            <button class="icon-btn close-panel"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="panel-content">
            <div class="section-title">Visuals</div>
            <div class="panel-link tool-trigger" data-tool="image"><i class="fa-solid fa-image"></i> Generate Image</div>
            <div class="panel-link tool-trigger" data-tool="edit"><i class="fa-solid fa-wand-magic-sparkles"></i> Edit Photo</div>
            
            <div class="section-title">Media</div>
            <div class="panel-link tool-trigger" data-tool="video"><i class="fa-solid fa-film"></i> Text to Video</div>
            <div class="panel-link tool-trigger" data-tool="music"><i class="fa-solid fa-music"></i> Synthesize Music</div>
            
            <div class="section-title">Intelligence</div>
            <div class="panel-link tool-trigger" data-tool="research"><i class="fa-solid fa-flask"></i> Deep Research</div>
            <div class="panel-link tool-trigger" data-tool="web"><i class="fa-solid fa-globe"></i> Deploy Website</div>
        </div>
    </aside>

    <aside class="side-panel" id="panel-tool-form">
        <div class="panel-header">
            <button class="icon-btn" id="btn-back-tools"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 id="tool-form-title">Tool</h2>
            <div style="width: 32px;"></div>
        </div>
        <div class="panel-content">
            <form id="dynamic-tool-form"></form>
        </div>
    </aside>

    <div id="toast">Copied to clipboard</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        // --- DOM Elements ---
        const $ = id => document.getElementById(id);
        const viewport = $('chat-viewport');
        const input = $('chat-input');
        const btnSend = $('btn-send');
        const btnStop = $('btn-stop');
        const overlay = $('overlay');
        
        // Panels
        const panelProfile = $('panel-profile');
        const panelTools = $('panel-tools');
        const panelToolForm = $('panel-tool-form');
        
        // --- State ---
        let isGenerating = false;
        let abortController = null;
        let liveTimerInterval = null;
        let generationSeconds = 0;
        let currentModel = 'gemini'; // gemini, seraphina, bobby

        // --- Notification API Setup ---
        function requestNotificationPermission() {
            if ("Notification" in window && Notification.permission === "default") {
                Notification.requestPermission();
            }
        }
        
        function notifyUser(title, body) {
            if ("Notification" in window && Notification.permission === "granted" && document.hidden) {
                new Notification(title, { body: body, icon: "https://cdn-icons-png.flaticon.com/512/1164/1164620.png" });
            }
        }

        // --- UI Interactions ---
        function showToast(msg) {
            const toast = $('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function togglePanel(panelElement) {
            const isActive = panelElement.classList.contains('active');
            // Close all first
            document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
            if (!isActive) {
                panelElement.classList.add('active');
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        $('btn-profile').onclick = () => togglePanel(panelProfile);
        $('btn-tools').onclick = () => togglePanel(panelTools);
        overlay.onclick = document.querySelectorAll('.close-panel').forEach(btn => btn.onclick = () => togglePanel(null));

        // Auto-resize input
        input.addEventListener('input', function() {
            this.style.height = '48px';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            btnSend.disabled = this.value.trim() === '';
        });

        // --- Markdown & Parsing (Robust) ---
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        }

        function parseMarkdown(text) {
            let html = escapeHTML(text);
            
            // 1. Native <think> tag handling
            html = html.replace(/&lt;think&gt;([\s\S]*?)&lt;\/think&gt;/g, '<think>$1</think>');
            
            // 2. Code blocks (macOS style handled via CSS)
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre data-lang="${lang || 'plaintext'}"><button class="copy-code-btn">Copy</button><code class="language-${lang || 'plaintext'}">${code}</code></pre>`;
            });
            
            // 3. Inline formatting
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            html = html.replace(/`([^`]+)`/g, '<code style="background:var(--bg-surface-hover);padding:2px 4px;border-radius:4px;font-family:monospace;font-size:0.85em;">$1</code>');
            
            // 4. Links (Fetching links feature visually)
            html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank">$1 <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:0.7em;"></i></a>');
            
            // 5. Newlines
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function initCodeHighlighting(container) {
            container.querySelectorAll('pre code').forEach(block => {
                if(!block.classList.contains('hljs')) {
                    hljs.highlightElement(block);
                    const copyBtn = block.parentElement.querySelector('.copy-code-btn');
                    if(copyBtn) {
                        copyBtn.onclick = () => {
                            navigator.clipboard.writeText(block.textContent);
                            copyBtn.textContent = 'Copied!';
                            setTimeout(() => copyBtn.textContent = 'Copy', 2000);
                        };
                    }
                }
            });
        }

        function scrollToBottom() {
            setTimeout(() => { viewport.scrollTop = viewport.scrollHeight; }, 10);
        }

        // --- Chat Engine (Typing & Rendering) ---
        function appendMessage(role, content = '', isPlaceholder = false) {
            const div = document.createElement('div');
            div.className = `message-group ${role}`;
            
            let inner = '';
            if (role === 'user') {
                inner = `<div class="msg-bubble">${parseMarkdown(content)}</div>
                         <div class="msg-controls"><button class="control-btn" onclick="navigator.clipboard.writeText('${escapeHTML(content)}'); showToast('Copied');"><i class="fa-solid fa-copy"></i></button></div>`;
            } else {
                if (isPlaceholder) {
                    inner = `
                        <div class="msg-bubble">
                            <div class="processing-indicator"><div class="spinner"></div> <span class="status-text">Thinking...</span></div>
                        </div>
                        <div class="msg-controls" style="display:none;">
                            <span class="timer-text">0.0s</span>
                            <button class="control-btn copy-msg"><i class="fa-solid fa-copy"></i> Copy</button>
                            <button class="control-btn"><i class="fa-solid fa-arrows-rotate"></i> Retry</button>
                        </div>`;
                } else {
                    inner = `<div class="msg-bubble">${parseMarkdown(content)}</div>`;
                }
            }
            
            div.innerHTML = inner;
            viewport.appendChild(div);
            scrollToBottom();
            return div;
        }

        // Feature: Fast Typewriter Effect
        async function typeWriterStream(element, fullText, controlsElement) {
            const bubble = element.querySelector('.msg-bubble');
            const timerEl = controlsElement.querySelector('.timer-text');
            bubble.innerHTML = ''; // clear placeholder
            
            let currentText = '';
            const chunkSize = 3; // Type 3 chars at a time for "hyper-fast" feel
            
            for (let i = 0; i < fullText.length; i += chunkSize) {
                if (abortController.signal.aborted) break;
                
                currentText += fullText.substring(i, i + chunkSize);
                bubble.innerHTML = parseMarkdown(currentText) + '<span class="typewriter-cursor"></span>';
                
                // Update timer live
                timerEl.textContent = (generationSeconds / 10).toFixed(1) + 's';
                
                scrollToBottom();
                await new Promise(r => setTimeout(r, 10)); // 10ms delay
            }
            
            // Finalize
            bubble.innerHTML = parseMarkdown(fullText);
            initCodeHighlighting(bubble);
            controlsElement.style.display = 'flex';
            controlsElement.querySelector('.copy-msg').onclick = () => { navigator.clipboard.writeText(fullText); showToast('Copied'); };
        }

        async function handleSend() {
            const text = input.value.trim();
            if (!text || isGenerating) return;
            requestNotificationPermission();

            // UI Updates
            input.value = '';
            input.style.height = '48px';
            btnSend.style.display = 'none';
            btnStop.style.display = 'flex';
            isGenerating = true;
            abortController = new AbortController();

            // Add user message
            appendMessage('user', text);
            
            // Add AI placeholder
            const aiMsgEl = appendMessage('ai', '', true);
            const controlsEl = aiMsgEl.querySelector('.msg-controls');
            
            // Live Timer
            generationSeconds = 0;
            liveTimerInterval = setInterval(() => { generationSeconds++; }, 100);

            try {
                // SIMULATED FETCH FOR THIS DEMO.
                // Replace this block with your actual fetch to API_ENDPOINTS[currentModel]
                aiMsgEl.querySelector('.status-text').textContent = 'Connecting to cluster...';
                await new Promise(r => setTimeout(r, 800)); // Simulate network latency
                
                // Simulate a response that includes a <think> block and markdown
                const mockResponse = `<think>
Analyzing the user's request.
The user wants me to acknowledge their message and demonstrate my capabilities.
I will structure a polite response with some code to trigger the highlighter.
</think>
Request acknowledged. The studio dashboard is fully operational. Here is an example of a secure connection function written in Node.js:

\`\`\`javascript
async function establishConnection(config) {
    try {
        console.log("Initializing secure socket...");
        const socket = await Network.connect(config.port, config.host);
        return { status: 200, connection: socket };
    } catch (error) {
        throw new Error("Cluster unreachable: " + error.message);
    }
}
\`\`\`

If you need any specific backend modules generated, let me know.`;

                // Stream the response to the UI
                await typeWriterStream(aiMsgEl, mockResponse, controlsEl);
                
                // Notification Feature
                notifyUser("Studio Dashboard", "Task completed successfully.");

            } catch (err) {
                if (err.name === 'AbortError') {
                    aiMsgEl.querySelector('.msg-bubble').innerHTML = '<span style="color:var(--text-muted); font-style:italic;">Generation stopped by user.</span>';
                } else {
                    aiMsgEl.querySelector('.msg-bubble').innerHTML = `<span style="color:var(--accent-danger);"><i class="fa-solid fa-triangle-exclamation"></i> Error: ${err.message}</span>`;
                }
            } finally {
                // Cleanup
                clearInterval(liveTimerInterval);
                isGenerating = false;
                btnSend.style.display = 'flex';
                btnStop.style.display = 'none';
                abortController = null;
                scrollToBottom();
            }
        }

        btnSend.onclick = handleSend;
        input.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
        btnStop.onclick = () => { if (abortController) abortController.abort(); };

        // --- Tool Interactions ---
        document.querySelectorAll('.tool-trigger').forEach(el => {
            el.onclick = () => {
                const toolName = el.textContent.trim();
                $('tool-form-title').textContent = toolName;
                
                // Dynamic Form Generation based on tool
                const form = $('dynamic-tool-form');
                form.innerHTML = '';
                
                if (el.dataset.tool === 'image') {
                    form.innerHTML = `
                        <div class="form-group"><label>Visual Prompt</label><textarea class="form-control" placeholder="A cinematic shot of a cyberpunk city..."></textarea></div>
                        <div class="form-group"><label>Engine</label><select class="form-control"><option>V1 (Fast)</option><option>V2 (Creative)</option></select></div>
                        <button type="button" class="btn-primary" onclick="togglePanel(null); input.value='Render image: Cinematic cyberpunk city'; handleSend();"><i class="fa-solid fa-bolt"></i> Execute Render</button>
                    `;
                } else {
                    form.innerHTML = `<div style="color:var(--text-muted); font-size:0.9rem; margin-bottom:16px;">Interface loaded for ${toolName}. Awaiting backend connection.</div>
                    <button type="button" class="btn-primary" onclick="togglePanel(null);"><i class="fa-solid fa-check"></i> Acknowledge</button>`;
                }
                
                $('panel-tools').classList.remove('active');
                $('panel-tool-form').classList.add('active');
            };
        });

        $('btn-back-tools').onclick = () => {
            $('panel-tool-form').classList.remove('active');
            $('panel-tools').classList.add('active');
        };

        // Init Welcome
        appendMessage('ai', 'Studio initialized. Systems online and ready for input.');

    </script>
